<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>春涧中 — 上传</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #fefefe; --accent: #b08d57; --text: #2c2a24; --muted: #9a9080; --light: #f5f0e8; --border: #e8e0d0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { padding: 1.2rem 2rem; display: flex; align-items: center; gap: 2.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(254,254,254,0.92); backdrop-filter: blur(12px); z-index: 100; }
    .logo { font-family: 'ZCOOL XiaoWei', serif; font-size: 1.35rem; color: var(--accent); text-decoration: none; letter-spacing: 0.15em; }
    .logo span { font-size: 0.65em; display: block; color: var(--muted); font-weight: 300; margin-top: -2px; letter-spacing: 0.25em; }
    .nav-links { display: flex; gap: 0.3rem; margin-left: auto; }
    .nav-links a { font-size: 0.82rem; color: var(--muted); text-decoration: none; padding: 0.4rem 0.8rem; border-radius: 4px; transition: all 0.2s; letter-spacing: 0.08em; }
    .nav-links a:hover { color: var(--text); background: var(--light); }
    .nav-links a.active { color: var(--accent); }
    .dropdown { position: relative; }
    .dropdown-btn { cursor: pointer; display: flex; align-items: center; gap: 0.3rem; }
    .dropdown-btn::after { content: '▾'; font-size: 0.7em; }
    .dropdown-menu { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0; min-width: 120px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .dropdown:hover .dropdown-menu { display: block; }
    .dropdown-menu a { display: block; padding: 0.5rem 1.2rem; font-size: 0.82rem; color: var(--muted); text-decoration: none; transition: all 0.15s; white-space: nowrap; text-align: center; }
    .dropdown-menu a:hover { color: var(--accent); background: var(--light); }
    .container { max-width: 960px; margin: 0 auto; padding: 3rem 2rem 5rem; flex: 1; width: 100%; }
    .page-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 2.2rem; color: var(--text); text-align: center; margin-bottom: 0.5rem; letter-spacing: 0.2em; }
    .page-subtitle { text-align: center; color: var(--muted); font-size: 0.82rem; margin-bottom: 3rem; font-weight: 300; letter-spacing: 0.12em; }

    /* Token */
    .token-section { margin-bottom: 2.5rem; }
    .token-box { background: var(--light); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
    .token-header { display: flex; align-items: center; justify-content: space-between; }
    .token-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 0.95rem; color: var(--text); letter-spacing: 0.12em; display: flex; align-items: center; gap: 0.5rem; }
    .token-hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
    .token-status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; }
    .token-dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; }
    .token-dot.saved { background: #2e7d32; }
    .token-dot.error { background: #c0392b; }
    .token-input-row { display: flex; gap: 0.6rem; align-items: center; }
    .token-input { flex: 1; padding: 0.55rem 0.8rem; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 0.82rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
    .token-input:focus { border-color: var(--accent); }
    .save-token-btn { padding: 0.55rem 1.2rem; border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 8px; font-family: 'Noto Serif SC', serif; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .save-token-btn:hover { background: #96703e; }
    .clear-token-btn { background: none; border: none; color: var(--muted); font-size: 0.72rem; cursor: pointer; text-decoration: underline; padding: 0.2rem; }
    .clear-token-btn:hover { color: #c0392b; }
    #tokenSavedMsg { display: none; font-size: 0.75rem; color: #2e7d32; }
    #tokenErrorMsg { display: none; font-size: 0.75rem; color: #c0392b; margin-top: 0.3rem; }
    #tokenTestMsg { display: none; font-size: 0.72rem; margin-top: 0.3rem; color: #666; }

    /* 上传区 */
    .upload-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.3s; background: var(--light); margin-bottom: 2rem; }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: #faf5ed; }
    /* iOS Safari 兼容：文件输入直接可见但在视觉上融入背景 */
    #fileInput {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.5rem 0;
      border: none;
      background: transparent;
      font-size: 1rem;
      color: var(--accent);
      cursor: pointer;
      text-align: center;
      -webkit-appearance: none;
    }
    #fileInput::-webkit-file-upload-button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 0.5rem 1.5rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.85rem;
      cursor: pointer;
      -webkit-appearance: none;
    }
    .upload-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .upload-text { color: var(--muted); font-size: 0.9rem; line-height: 1.8; }
    .upload-text strong { color: var(--accent); }

    /* 照片卡片 */
    .photo-list { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }
    .photo-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .photo-card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; }
    .photo-preview { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); flex-shrink: 0; }
    .photo-meta { flex: 1; min-width: 0; }
    .photo-name { font-size: 0.82rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .photo-filename { font-size: 0.72rem; color: var(--accent); margin-top: 0.2rem; font-family: monospace; }
    .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; padding: 0.3rem; border-radius: 4px; transition: all 0.2s; flex-shrink: 0; }
    .remove-btn:hover { color: #c0392b; background: #fdf0ee; }

    /* 表单网格 */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }
    .form-group input, .form-group select, .form-group textarea { padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-family: 'Noto Serif SC', serif; font-size: 0.88rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; width: 100%; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
    .form-row { display: flex; gap: 0.6rem; align-items: flex-end; }
    .form-row .form-group { flex: 1; }

    /* AI 按钮 */
    .ai-btn-row { display: flex; justify-content: flex-end; margin-top: 0.8rem; }
    .ai-btn { font-size: 0.75rem; color: var(--accent); background: none; border: 1px solid var(--accent); border-radius: 20px; padding: 0.25rem 0.8rem; cursor: pointer; transition: all 0.2s; }
    .ai-btn:hover { background: var(--accent); color: #fff; }
    .batch-ai-bar { display: none; gap: 1rem; justify-content: center; margin-bottom: 2.5rem; }
    .batch-ai-bar.show { display: flex; }
    .batch-ai-btn { background: var(--accent); color: #fff; border: none; border-radius: 24px; padding: 0.7rem 2rem; font-family: 'Noto Serif SC', serif; font-size: 0.88rem; cursor: pointer; transition: all 0.3s; letter-spacing: 0.1em; }
    .batch-ai-btn:hover { background: #96703e; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(176,141,87,0.3); }
    .batch-ai-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* 进度条 */
    .upload-progress { display: none; margin-bottom: 2rem; }
    .upload-progress.show { display: block; }
    .progress-box { background: var(--light); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .progress-step { display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem 0; font-size: 0.85rem; color: var(--muted); }
    .progress-step.done { color: #2e7d32; }
    .progress-step.active { color: var(--accent); }
    .progress-step.error { color: #c0392b; }
    .step-icon { width: 20px; text-align: center; font-size: 0.9rem; flex-shrink: 0; }
    .step-msg { flex: 1; }
    .step-detail { font-size: 0.72rem; color: var(--muted); margin-left: 1.8rem; }
    .progress-bar-wrap { margin-top: 1rem; background: var(--border); border-radius: 8px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 8px; transition: width 0.4s ease; width: 0%; }
    .progress-final { margin-top: 1.2rem; text-align: center; font-size: 0.88rem; color: #2e7d32; }

    .submit-bar { display: none; justify-content: center; margin-top: 1rem; }
    .submit-bar.show { display: flex; }
    .submit-btn { background: var(--text); color: var(--bg); border: none; border-radius: 24px; padding: 0.85rem 3.5rem; font-family: 'ZCOOL XiaoWei', serif; font-size: 1.05rem; cursor: pointer; transition: all 0.3s; letter-spacing: 0.25em; }
    .submit-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44,42,36,0.2); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Toast */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text); color: var(--bg); padding: 0.8rem 2rem; border-radius: 24px; font-size: 0.85rem; opacity: 0; transition: all 0.4s; z-index: 999; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c0392b; }

    .back-home-bar { text-align: center; padding: 2.5rem 0 1rem; border-top: 1px solid var(--border); margin-top: 1rem; }
    .back-home-link { font-family: 'Noto Serif SC', serif; font-size: 0.82rem; color: var(--muted); text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s; padding: 0.5rem 1.2rem; border: 1px solid var(--border); border-radius: 20px; }
    .back-home-link:hover { color: var(--accent); border-color: var(--accent); }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      nav { padding: 1rem; gap: 1rem; }
      .token-input-row { flex-direction: column; }
      .save-token-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">桂花落<span>Bird Singing in the Spring Ravine</span></a>
    <div class="nav-links">
      <div class="dropdown">
        <a href="index.html" class="dropdown-btn">作品</a>
        <div class="dropdown-menu">
          <a href="gallery-city.html">城市</a>
          <a href="gallery-nature.html">自然</a>
          <a href="gallery-people.html">人物</a>
          <a href="gallery-arch.html">建筑</a>
          <a href="gallery-food.html">饮食</a>
        </div>
      </div>
      <a href="upload.html" class="active">春涧中</a>
      <a href="index.html#about">关于</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title">春涧中</h1>
    <p class="page-subtitle">上传照片 · 静候春风</p>

    <!-- Token -->
    <div class="token-section">
      <div class="token-box">
        <div class="token-header">
          <div>
            <div class="token-title">🔑 GitHub 上传授权</div>
            <div class="token-hint">Token 仅存储在本地浏览器 · 保存时自动验证</div>
          </div>
          <div class="token-status">
            <span class="token-dot" id="tokenDot"></span>
            <span id="tokenStatusText">未设置</span>
          </div>
        </div>
        <div class="token-input-row">
          <input type="password" class="token-input" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
          <button class="save-token-btn" id="saveTokenBtn">保存</button>
        </div>
        <div id="tokenSavedMsg">✓ Token 验证通过，已保存</div>
        <div id="tokenErrorMsg"></div>
        <button class="clear-token-btn" id="clearTokenBtn">清除 Token</button>
      </div>
    </div>

    <!-- 上传区域 -->
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📷</div>
      <p class="upload-text">
        点击下方按钮选择照片<br>
        <strong>支持多选 · 从相册直接选取</strong>
      </p>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>

    <div class="photo-list" id="photoList"></div>

    <div class="batch-ai-bar" id="batchBar">
      <button class="batch-ai-btn" id="batchAiBtn">✦ 一键填充所有描述</button>
    </div>

    <div class="upload-progress" id="uploadProgress">
      <div class="progress-box">
        <div class="progress-step" id="step1"><span class="step-icon">○</span><span class="step-msg">验证仓库访问权限…</span></div>
        <div class="progress-step" id="step2"><span class="step-icon">○</span><span class="step-msg">上传图片文件…</span></div>
        <div class="progress-step" id="step3"><span class="step-icon">○</span><span class="step-msg">写入照片数据…</span></div>
        <div class="progress-step" id="step4"><span class="step-icon">○</span><span class="step-msg">完成部署…</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-final" id="progressFinal"></div>
      </div>
    </div>

    <div class="submit-bar" id="submitBar">
      <button class="submit-btn" id="submitBtn">上 传</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="back-home-bar">
    <a href="index.html" class="back-home-link">← 返回作品集</a>
  </div>

  <script>
    const CATS = { city: '城市', nature: '自然', people: '人物', arch: '建筑', food: '饮食' };

    const EN_MAP = {
      city: ['Urban Whispers', 'City Lights', 'Street Symphony', 'Concrete Garden', 'Neon Dusk', 'Silent Lane', 'Urban Poetry', 'Night Bloom', 'Morning Rush', 'Quiet Corner'],
      nature: ['Morning Mist', 'Quiet Stream', 'Wild Whisper', 'Dawn Breath', 'Green Symphony', 'Forest Whispers', 'Quiet Earth', 'Wild Bloom', 'River Song', 'Quiet Growth'],
      people: ['Quiet Moment', 'Still Life', 'Face of a Story', 'Silent Gaze', 'Between Words', 'Unspoken', 'Quiet Presence', 'Glimmer', 'Still Waters', 'Quiet Story'],
      arch: ['Geometry of Light', 'Silent Towers', 'Ascent', 'Line and Shadow', 'Urban Cathedral', 'Steel Garden', 'Light & Form', 'Concrete Poetry', 'Vertical World', 'Glass & Sky'],
      food: ['Quiet Flavors', 'Still Life', 'Taste of Place', 'Table Poetry', 'Simple Pleasures', 'Flavor Notes', 'Quiet Appetite', 'Slow Morning', 'Table Still Life', 'Local Flavors']
    };

    const DESC_MAP = {
      city: [
        '城市的纹理在光影中展开，\n钢铁与玻璃映照出另一种天空。',
        '人流如织，光影交错。\n城市的呼吸在每一条街道上留下痕迹。',
        '夜色降临，万家灯火。\n喧嚣在此时化为宁静的旋律。',
        '晨光穿透高楼的缝隙，\n新的一天在城市上空悄然展开。',
        '雨后的街道，\n倒映出一个湿润而柔软的城市。',
        '小巷深处，\n时光在这里缓缓流淌。',
        '云层之下，\n高楼的轮廓切割出天空的形状。',
        '城市从不睡眠，\n只是在深夜换了一种呼吸的方式。',
        '玻璃幕墙映出云的形状，\n天空与地面在这里互换位置。',
        '人群散去，\n街道恢复了它本来的样子。'
      ],
      nature: [
        '风过林梢，\n万物在寂静中生长。',
        '流水潺潺，\n山涧里藏着春天的私语。',
        '晨雾缭绕，\n山与天在朦胧中融为一体。',
        '草叶上的露珠，\n折射出整个清晨的光芒。',
        '花开花落，\n自然的节奏从不曾停歇。',
        '溪水绕过石头，\n唱着一支无人听见的歌。',
        '光穿过枝叶，\n在地上写下一行无字的诗。',
        '山静，水流，\n天地间只有风声。',
        '雨后的山林，\n每一棵树都在深呼吸。',
        '黄昏的光，\n为每一片叶子镀上金边。'
      ],
      people: [
        '目光交汇的瞬间，\n故事已在无声中展开。',
        '城市的一角，\n有人在等待一个回眸。',
        '口罩之上，\n眼睛依然在说着什么。',
        '背影比正面更有故事，\n因为那里藏着所有的想象。',
        '地铁车厢里，\n每个人都携带着自己的宇宙。',
        '低头的一瞬，\n世界仿佛按下了静音键。',
        '人群中的孤独，\n是最安静的陪伴。',
        '街头的陌生人，\n也是某个人漫长一天里的光。',
        '静默中，\n人与人之间传递着无需言语的温暖。',
        '光影落在肩上，\n时间在这里短暂停留。'
      ],
      arch: [
        '线条向天空延伸，\n光影在玻璃幕墙上作画。',
        '高楼林立，\n都市的森林在夜色中闪烁。',
        '仰视之际，\n世界的边界悄然向上敞开。',
        '几何与光，\n在建筑中找到了最美的语言。',
        '钢铁与混凝土，\n编织出现代城市的天际线。',
        '窗外的世界，\n被一格格地切割成画框。',
        '光影在建筑表面流转，\n时间是唯一的设计师。',
        '天空的蓝与玻璃的灰，\n在某个高度达成了和解。',
        '建筑是凝固的音乐，\n而光线是它唯一的演奏者。',
        '垂直的线条，\n书写着城市最简洁的诗篇。'
      ],
      food: [
        '简单的食材，\n在厨师的手中化为诗篇。',
        '热气腾腾的街头，\n烟火气是最真实的人间。',
        '色彩与香气的对话，\n在一盘一碟中展开。',
        '清晨的菜市场，\n是一天中最有生命力的风景。',
        '咖啡的香气，\n开启一个城市的早晨。',
        '一碗热汤，\n足以抚慰所有的疲惫。',
        '食物是最好的语言，\n不需要翻译，\n全世界都懂。',
        '热气升腾，\n模糊了视线，\n也模糊了时间的边界。',
        '一张桌子，\n几道菜，\n便是一个小小的宇宙。',
        '街头小食，\n藏着人间最朴素而真实的风味。'

    };

    const GH_OWNER = '46832632';
    const GH_REPO = 'photo-portfolio';

    let photos = [];
    let savedToken = localStorage.getItem('gh_upload_token') || '';
    let nextSeq = 1;

    // DOM 元素
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const photoList = document.getElementById('photoList');
    const batchBar = document.getElementById('batchBar');
    const submitBar = document.getElementById('submitBar');
    const submitBtn = document.getElementById('submitBtn');
    const batchAiBtn = document.getElementById('batchAiBtn');
    const toast = document.getElementById('toast');
    const tokenInput = document.getElementById('tokenInput');
    const saveTokenBtn = document.getElementById('saveTokenBtn');
    const clearTokenBtn = document.getElementById('clearTokenBtn');
    const tokenDot = document.getElementById('tokenDot');
    const tokenStatusText = document.getElementById('tokenStatusText');
    const tokenSavedMsg = document.getElementById('tokenSavedMsg');
    const tokenErrorMsg = document.getElementById('tokenErrorMsg');
    const uploadProgress = document.getElementById('uploadProgress');
    const progressBar = document.getElementById('progressBar');
    const progressFinal = document.getElementById('progressFinal');

    // ===== 核心修复：使用 Basic Auth 代替 Bearer =====
    // GitHub API 对 PUT 请求 + Authorization 头会触发 CORS preflight
    // Safari/iOS 对此处理有问题，改为 Basic Auth 完全避免 preflight
    function b64EncodeUnicode(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
        (_, p1) => String.fromCharCode(parseInt(p1, 16))));
    }
    function makeBasicAuth(token) {
      // GitHub Basic Auth: username = 任意值，password = token
      return 'Basic ' + b64EncodeUnicode('x-access:' + token);
    }

    function ghHeaders() {
      return {
        'Authorization': makeBasicAuth(savedToken),
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json',
        'User-Agent': 'photo-portfolio-uploader/1.0'
      };
    }

    async function ghGet(path) {
      try {
        const r = await fetch('https://api.github.com' + path, {
          headers: {
            'Authorization': makeBasicAuth(savedToken),
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            'User-Agent': 'photo-portfolio-uploader/1.0'
          }
        });
        const text = await r.text();
        if (!r.ok) {
          let msg = text;
          try { msg = JSON.parse(text).message || msg; } catch {}
          throw new Error('GitHub ' + r.status + ': ' + msg);
        }
        return JSON.parse(text);
      } catch (e) {
        if (e.message === 'Failed to fetch' || e.message.includes('NetworkError') || e.message.includes('fetch')) {
          throw new Error('无法连接 GitHub，请检查网络或开启 VPN（GitHub 在国内需要 VPN 才能访问）');
        }
        throw e;
      }
    }

    async function ghPut(path, body) {
      try {
        const r = await fetch('https://api.github.com' + path, {
          method: 'PUT',
          headers: {
            'Authorization': makeBasicAuth(savedToken),
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            'Content-Type': 'application/json',
            'User-Agent': 'photo-portfolio-uploader/1.0'
          },
          body: JSON.stringify(body)
        });
        const text = await r.text();
        if (!r.ok) {
          let msg = text;
          try { msg = JSON.parse(text).message || msg; } catch {}
          throw new Error('GitHub ' + r.status + ': ' + msg);
        }
        return JSON.parse(text);
      } catch (e) {
        if (e.message === 'Failed to fetch' || e.message.includes('NetworkError') || e.message.includes('fetch')) {
          throw new Error('无法连接 GitHub，请检查网络或开启 VPN（GitHub 在国内需要 VPN 才能访问）');
        }
        throw e;
      }
    }

    // ===== Token 验证（纯格式检查，不需要联网，国内可用）=====
    function checkTokenFormat(token) {
      if (!token || !token.startsWith('ghp_')) return 'Token 必须以 ghp_ 开头';
      if (token.length !== 40) return 'Token 长度应为 40 位，当前 ' + token.length + ' 位';
      return null;
    }

    // Token 初始化（只显示已保存，不自动联网验证）
    function initToken() {
      if (savedToken) {
        tokenInput.value = savedToken;
        const err = checkTokenFormat(savedToken);
        if (!err) {
          tokenDot.classList.add('saved');
          tokenStatusText.textContent = '✓ 已保存（未联网验证）';
          tokenSavedMsg.style.display = 'block';
          tokenSavedMsg.style.color = '#888';
          tokenSavedMsg.textContent = '⚡ Token 格式正确，已本地保存（联网验证在上传时自动进行）';
        } else {
          tokenDot.classList.add('error');
          tokenStatusText.textContent = '格式错误';
          tokenErrorMsg.style.display = 'block';
          tokenErrorMsg.textContent = err;
        }
      }
    }
    initToken();

    saveTokenBtn.addEventListener('click', async () => {
      const val = tokenInput.value.trim();
      if (!val) { showToast('请输入 Token', 'error'); return; }

      const err = checkTokenFormat(val);
      if (err) {
        tokenDot.classList.remove('saved');
        tokenDot.classList.add('error');
        tokenStatusText.textContent = '格式错误';
        tokenSavedMsg.style.display = 'none';
        tokenErrorMsg.style.display = 'block';
        tokenErrorMsg.textContent = err;
        showToast(err, 'error');
        return;
      }

      savedToken = val;
      localStorage.setItem('gh_upload_token', savedToken);
      tokenDot.classList.add('saved');
      tokenDot.classList.remove('error');
      tokenStatusText.textContent = '✓ 已保存';
      tokenSavedMsg.style.display = 'block';
      tokenSavedMsg.style.color = '#2e7d32';
      tokenSavedMsg.textContent = '⚡ Token 格式正确，已本地保存（上传时自动联网验证）';
      tokenErrorMsg.style.display = 'none';
      showToast('✓ Token 已保存（联网验证将在上传时进行）', 'success');
    });

    clearTokenBtn.addEventListener('click', () => {
      savedToken = '';
      localStorage.removeItem('gh_upload_token');
      tokenInput.value = '';
      tokenDot.classList.remove('saved', 'error');
      tokenStatusText.textContent = '未设置';
      tokenSavedMsg.style.display = 'none';
      tokenErrorMsg.style.display = 'none';
      tokenTestMsg.style.display = 'none';
      showToast('Token 已清除', '');
    });

    // 初始化序号
    async function initSeq() {
      try {
        const data = await ghGet('/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/data/photos.json');
        const r = await fetch(data.download_url);
        const json = await r.json();
        const maxSeq = (json.photos || []).reduce((m, p) => Math.max(m, p.seq || 0), 0);
        nextSeq = maxSeq + 1;
      } catch {}
    }
    initSeq();

    // 文件选择处理
    fileInput.addEventListener('change', e => {
      handleFiles(e.target.files);
      fileInput.value = '';
    });

    // 拖拽支持
    uploadZone.addEventListener('dragover', e => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
    });
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function handleFiles(files) {
      if (!files || files.length === 0) return;

      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) {
          showToast('「' + file.name + '」不是图片文件，已跳过', 'error');
          return;
        }
        const id = 'p' + Date.now() + Math.random().toString(36).slice(2, 6);
        const cat = 'city';
        const year = new Date().getFullYear().toString();
        photos.push({
          id, file, seq: nextSeq++,
          category: cat,
          titleZh: '',
          titleEn: randItem(EN_MAP[cat]),
          location: '曼谷',
          year,
          desc: randItem(DESC_MAP[cat])
        });
      });

      renderPhotoList();
      if (photos.length > 0) {
        showToast('✓ 已添加 ' + files.length + ' 张照片，请填写标题', 'success');
      }
    }

    function renderPhotoList() {
      if (photos.length === 0) {
        photoList.innerHTML = '';
        batchBar.classList.remove('show');
        submitBar.classList.remove('show');
        return;
      }

      const catCodeMap = { city: 'C', nature: 'N', people: 'P', arch: 'A', food: 'F' };

      photoList.innerHTML = photos.map((p) => {
        const catCode = catCodeMap[p.category] || 'C';
        const ext = (p.file.name.split('.').pop() || 'jpg').toLowerCase();
        const filename = 'IMG_' + catCode + '_' + String(p.seq).padStart(3, '0') + '_' + Date.now().toString(36).slice(0, 5) + '.' + ext;
        const titleZhEsc = p.titleZh.replace(/"/g, '&quot;');
        const titleEnEsc = p.titleEn.replace(/"/g, '&quot;');
        const locationEsc = p.location.replace(/"/g, '&quot;');
        const yearEsc = p.year.replace(/"/g, '&quot;');
        const descEsc = p.desc.replace(/"/g, '&quot;');
        return '<div class="photo-card" data-id="' + p.id + '">' +
          '<div class="photo-card-header">' +
            '<img src="" data-id="' + p.id + '" class="photo-preview" alt="preview">' +
            '<div class="photo-meta">' +
              '<div class="photo-name">' + p.file.name.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
              '<div class="photo-filename">' + filename + '</div>' +
            '</div>' +
            '<button class="remove-btn" data-id="' + p.id + '" type="button">✕</button>' +
          '</div>' +
          '<div class="form-grid">' +
            '<div class="form-group">' +
              '<label>序号</label>' +
              '<input type="number" value="' + p.seq + '" min="1" data-id="' + p.id + '" data-field="seq">' +
            '</div>' +
            '<div class="form-group">' +
              '<label>分类</label>' +
              '<select data-id="' + p.id + '" data-field="category">' +
                Object.entries(CATS).map(([k, v]) => '<option value="' + k + '"' + (p.category === k ? ' selected' : '') + '>' + v + '</option>').join('') +
              '</select>' +
            '</div>' +
            '<div class="form-group full">' +
              '<label>中文标题（必填）</label>' +
              '<input type="text" value="' + titleZhEsc + '" placeholder="如：夜归、晨雾…" data-id="' + p.id + '" data-field="titleZh">' +
            '</div>' +
            '<div class="form-group">' +
              '<label>英文副标题</label>' +
              '<input type="text" value="' + titleEnEsc + '" data-id="' + p.id + '" data-field="titleEn">' +
            '</div>' +
            '<div class="form-group">' +
              '<label>拍摄地点</label>' +
              '<input type="text" value="' + locationEsc + '" data-id="' + p.id + '" data-field="location">' +
            '</div>' +
            '<div class="form-group">' +
              '<label>年份</label>' +
              '<input type="text" value="' + yearEsc + '" data-id="' + p.id + '" data-field="year">' +
            '</div>' +
            '<div class="form-group full">' +
              '<label>诗意描述</label>' +
              '<textarea data-id="' + p.id + '" data-field="desc">' + descEsc.replace(/&lt;br&gt;/g, '\n') + '</textarea>' +
            '</div>' +
          '</div>' +
          '<div class="ai-btn-row">' +
            '<button class="ai-btn" data-id="' + p.id + '" type="button">✦ 重新生成</button>' +
          '</div>' +
        '</div>';
      }).join('');

      // 异步加载缩略图
      photos.forEach(p => {
        const img = document.querySelector('.photo-preview[data-id="' + p.id + '"]');
        if (img) {
          img.src = URL.createObjectURL(p.file);
          img.onerror = function() {
            this.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60"><rect fill="#f5f0e8" width="80" height="60"/><text x="40" y="35" text-anchor="middle" fill="#9a9080" font-size="11">预览</text></svg>');
          };
        }
      });

      batchBar.classList.add('show');
      submitBar.classList.add('show');

      // 绑定表单事件（用事件委托）
      photoList.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('change', onFieldChange);
        el.addEventListener('input', onFieldChange);
      });
      photoList.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => removePhoto(btn.dataset.id));
      });
      photoList.querySelectorAll('.ai-btn').forEach(btn => {
        btn.addEventListener('click', () => regenerateAi(btn.dataset.id));
      });
    }

    function onFieldChange(e) {
      const id = e.target.dataset.id;
      const field = e.target.dataset.field;
      let val = e.target.value;
      if (e.target.type === 'number') val = parseInt(val) || 1;
      updatePhoto(id, field, val);
    }

    function removePhoto(id) {
      photos = photos.filter(p => p.id !== id);
      renderPhotoList();
    }

    function updatePhoto(id, key, val) {
      const p = photos.find(x => x.id === id);
      if (p) p[key] = val;
    }

    function regenerateAi(id) {
      const p = photos.find(x => x.id === id);
      if (!p) return;
      p.titleEn = randItem(EN_MAP[p.category]);
      p.desc = randItem(DESC_MAP[p.category]);
      renderPhotoList();
      showToast('✨ 描述已重新生成');
    }

    batchAiBtn.addEventListener('click', () => {
      photos.forEach(p => {
        p.titleEn = randItem(EN_MAP[p.category]);
        p.desc = randItem(DESC_MAP[p.category]);
      });
      renderPhotoList();
      showToast('✨ 所有描述已重新生成');
    });

    // ===== 进度显示 =====
    function setStep(id, state, icon, detail) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = 'progress-step ' + state;
      el.querySelector('.step-icon').textContent = icon;
      const msgEl = el.querySelector('.step-msg');
      if (detail) {
        let detailEl = el.querySelector('.step-detail');
        if (!detailEl) {
          detailEl = document.createElement('div');
          detailEl.className = 'step-detail';
          el.appendChild(detailEl);
        }
        detailEl.textContent = detail;
      }
    }

    function setProgress(pct) { progressBar.style.width = pct + '%'; }

    // ===== 上传流程 =====
    async function uploadToGitHub() {
      if (!savedToken) { showToast('请先保存 GitHub Token', 'error'); return; }

      const missingTitle = photos.some(p => !p.titleZh.trim());
      if (missingTitle) { showToast('请填写所有照片的中文标题', 'error'); return; }
      if (photos.length === 0) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '上传中…';
      uploadProgress.classList.add('show');
      progressFinal.textContent = '';
      setProgress(0);
      ['step1', 'step2', 'step3', 'step4'].forEach(id => setStep(id, '', '○'));
      document.querySelectorAll('.step-detail').forEach(el => el.remove());

      try {
        // Step 1: 验证仓库访问 + 获取现有 photos.json
        setStep('step1', 'active', '◐');
        let photosJson = { photos: [] };
        let photosSha = null;
        try {
          const existing = await ghGet('/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/data/photos.json');
          photosSha = existing.sha;
          const r = await fetch(existing.download_url);
          photosJson = await r.json();
          setStep('step1', 'done', '✓', '已连接 ' + GH_OWNER + '/' + GH_REPO);
        } catch (err) {
          if (err.message && err.message.includes('404')) {
            setStep('step1', 'done', '✓', '新建 photos.json');
          } else {
            throw err;
          }
        }
        setProgress(10);

        // Step 2: 上传图片
        setStep('step2', 'active', '◐');
        const newEntries = [];
        const catCodeMap = { city: 'C', nature: 'N', people: 'P', arch: 'A', food: 'F' };

        for (let i = 0; i < photos.length; i++) {
          const p = photos[i];
          const catCode = catCodeMap[p.category] || 'C';
          const ext = (p.file.name.split('.').pop() || 'jpg').toLowerCase();
          const ts = Date.now().toString(36).slice(0, 5);
          const filename = 'IMG_' + catCode + '_' + String(p.seq).padStart(3, '0') + '_' + ts + '.' + ext;
          const imagePath = 'images/' + filename;

          // Base64 编码（GitHub 要求标准 Base64，不能用 URL-safe 格式）
          const arrayBuffer = await p.file.arrayBuffer();
          const uint8 = new Uint8Array(arrayBuffer);
          let binary = '';
          for (let j = 0; j < uint8.length; j++) {
            binary += String.fromCharCode(uint8[j]);
          }
          const base64 = btoa(binary);

          try {
            await ghPut('/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + imagePath, {
              message: 'upload: ' + filename,
              content: base64,
              branch: 'main'
            });
          } catch (err) {
            throw new Error('图片「' + p.titleZh + '」上传失败：' + err.message);
          }

          newEntries.push({
            id: 'img_' + Date.now() + '_' + i,
            filename,
            seq: p.seq,
            titleZh: p.titleZh.trim(),
            titleEn: p.titleEn.trim() || '',
            location: p.location.trim() || '',
            year: p.year.trim() || '',
            category: p.category,
            catLabel: CATS[p.category] || p.category,
            desc: p.desc.replace(/\n/g, '\\n'),
            date: new Date().toISOString().slice(0, 10)
          });

          setProgress(10 + Math.round((i + 1) / photos.length * 40));
        }
        setStep('step2', 'done', '✓', newEntries.length + ' 张图片已上传');
        setProgress(55);

        // Step 3: 写入 photos.json
        setStep('step3', 'active', '◐');
        const allPhotos = [...(photosJson.photos || []), ...newEntries];
        const newContent = JSON.stringify({ photos: allPhotos }, null, 2);
        const encoder = new TextEncoder();
        const uint8Content = encoder.encode(newContent);
        let binaryContent = '';
        for (let j = 0; j < uint8Content.length; j++) {
          binaryContent += String.fromCharCode(uint8Content[j]);
        }
        const newBase64 = btoa(binaryContent);

        await ghPut('/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/data/photos.json', {
          message: 'docs: add ' + newEntries.length + ' photo(s)',
          content: newBase64,
          sha: photosSha,
          branch: 'main'
        });
        setStep('step3', 'done', '✓', '已写入 ' + allPhotos.length + ' 条记录');
        setProgress(75);

        // Step 4: 完成
        setStep('step4', 'active', '◐');
        setStep('step4', 'done', '✓', 'GitHub Actions 自动部署中');
        setProgress(100);

        progressFinal.innerHTML = '✓ ' + newEntries.length + ' 张照片已上传至首页！<br>' +
          '<span style="font-size:0.78rem;color:var(--muted)">GitHub Actions 正在部署，约 1-2 分钟后刷新首页查看</span><br>' +
          '<a href="index.html" style="display:inline-block;margin-top:0.8rem;font-size:0.8rem;color:var(--accent);text-decoration:none;border:1px solid var(--accent);border-radius:20px;padding:0.3rem 1rem;" target="_blank">→ 前往首页查看</a>';
        showToast('✓ ' + newEntries.length + ' 张照片上传成功！', 'success');
        photos = [];
        renderPhotoList();

      } catch (e) {
        console.error('上传失败:', e);
        ['step1', 'step2', 'step3', 'step4'].forEach(id => {
          const el = document.getElementById(id);
          if (el && !el.classList.contains('done')) {
            el.className = 'progress-step error';
            el.querySelector('.step-icon').textContent = '✕';
          }
        });
        progressFinal.innerHTML = '<span style="color:#c0392b">上传失败：' + e.message + '</span>';
        showToast('❌ ' + e.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '上 传';
        setTimeout(() => uploadProgress.classList.remove('show'), 8000);
      }
    }

    submitBtn.addEventListener('click', uploadToGitHub);

    function showToast(msg, cls) {
      toast.textContent = msg;
      toast.className = 'toast show ' + (cls || '');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.className = 'toast', 4000);
    }
  </script>
</body>
