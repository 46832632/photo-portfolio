<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人物 — 桂花落</title>
  <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>:root{--bg:#fefefe;--bg-cream:#fafaf8;--text:#2c2a24;--text-dim:#888;--accent:#b08d57;--border:rgba(0,0,0,0.06)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Serif SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.8;min-height:100vh}nav{position:sticky;top:0;z-index:100;padding:1.2rem 2.5rem;display:flex;align-items:center;gap:2.5rem;background:rgba(254,254,254,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}.logo{font-family:'ZCOOL XiaoWei',serif;font-size:1.1rem;color:var(--text);text-decoration:none;letter-spacing:.2em}.nav-links{display:flex;gap:.5rem;margin-left:auto}.nav-links a{font-size:.8rem;color:var(--text-dim);text-decoration:none;padding:.4rem .8rem;border-radius:4px;transition:all .2s;letter-spacing:.1em}.nav-links a:hover{color:var(--text);background:var(--bg-cream)}.nav-links a.active{color:var(--accent)}.page-header{text-align:center;padding:5rem 2rem 3rem;background:var(--bg-cream)}.page-header h1{font-family:'ZCOOL XiaoWei',serif;font-size:2.5rem;letter-spacing:.3em;margin-bottom:.5rem}.page-header p{font-size:.85rem;color:var(--text-dim);letter-spacing:.2em;font-weight:300}.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2rem;max-width:1100px;margin:0 auto;padding:3rem 2rem 6rem}.photo-card{border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .4s}.photo-card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.1);transform:translateY(-4px)}.photo-card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}.photo-card-body{padding:1.2rem 1.4rem}.photo-card h3{font-family:'ZCOOL XiaoWei',serif;font-size:1.2rem;letter-spacing:.2em;margin-bottom:.2rem}.photo-card .sub{font-size:.72rem;color:var(--text-dim);margin-bottom:.8rem;letter-spacing:.08em}.photo-card p{font-size:.82rem;color:var(--text-dim);font-weight:300;line-height:1.8}.empty{text-align:center;padding:5rem 2rem;color:var(--text-dim);font-size:.9rem}.footer{text-align:center;padding:3rem 2rem;border-top:1px solid var(--border);background:var(--bg-cream)}.footer a{font-family:'ZCOOL XiaoWei',serif;font-size:.85rem;color:var(--text-dim);text-decoration:none;letter-spacing:.2em;transition:color .2s}.footer a:hover{color:var(--accent)}@media(max-width:640px){.photo-grid{grid-template-columns:1fr;padding:2rem 1rem}nav{padding:1rem 1.2rem;gap:1rem}.page-header{padding:3rem 1rem 2rem}.page-header h1{font-size:1.8rem}}</style>
</head>
<body>
  <nav><a href="index.html" class="logo">桂花落</a><div class="nav-links"><a href="index.html">作品</a><a href="gallery-city.html">城市</a><a href="gallery-nature.html">自然</a><a href="gallery-people.html" class="active">人物</a><a href="gallery-arch.html">建筑</a><a href="gallery-food.html">饮食</a><a href="upload.html">春涧中</a></div></nav>
  <div class="page-header"><h1>人物</h1><p>Portrait & Street Photography</p></div>
  <div class="photo-grid" id="photoGrid"><p class="empty">加载中...</p></div>
  <div class="footer"><a href="index.html">← 返回作品集</a></div>
  <script>async function loadPhotos(){try{const r=await fetch('/api/photos?category=people');const d=await r.json();const grid=document.getElementById('photoGrid');if(!d.photos||d.photos.length===0){grid.innerHTML='<p class="empty">暂无人物摄影作品</p>';return}grid.innerHTML=d.photos.map(p=>`<div class="photo-card" onclick="openLightbox('${p.id}')"><img src="${p.imageUrl}" alt="${p.titleZh}" loading="lazy"><div class="photo-card-body"><h3>${p.titleZh}</h3><p class="sub">${p.titleEn||''} · ${p.location||''} ${p.year?'· '+p.year:''}</p><p>${(p.desc||'').split('\n').filter(Boolean).join('<br>')}</p></div></div>`).join('')}catch(e){document.getElementById('photoGrid').innerHTML='<p class="empty">加载失败</p>'}}function openLightbox(id){window.location.href='index.html#'+id}loadPhotos()</script>
</body>
</html>
