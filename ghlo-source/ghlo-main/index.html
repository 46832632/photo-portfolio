<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸟鸣涧 · 王维</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d5 50%, #f0ebe3 100%);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            width: 20px; height: 20px;
            background: radial-gradient(ellipse at 30% 30%, #f4d03f, #d4ac0d);
            border-radius: 50% 0 50% 50%;
            opacity: 0.6;
            animation: fall linear infinite;
            z-index: 2;
        }
        .petal:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; transform: rotate(45deg); }
        .petal:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 2s; transform: rotate(120deg); }
        .petal:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 1s; transform: rotate(200deg); }
        .petal:nth-child(4) { left: 55%; animation-duration: 14s; animation-delay: 3s; transform: rotate(80deg); }
        .petal:nth-child(5) { left: 70%; animation-duration: 11s; animation-delay: 0.5s; transform: rotate(150deg); }
        .petal:nth-child(6) { left: 85%; animation-duration: 13s; animation-delay: 2.5s; transform: rotate(30deg); }
        .petal:nth-child(7) { left: 15%; animation-duration: 16s; animation-delay: 4s; transform: rotate(220deg); }
        .petal:nth-child(8) { left: 60%; animation-duration: 9s; animation-delay: 1.5s; transform: rotate(100deg); }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 5;
        }

        .poem { text-align: center; padding: 60px; }

        .poem-title {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: clamp(3.5rem, 10vw, 8rem);
            color: #3d3225;
            line-height: 1.3;
            letter-spacing: 0.2em;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.15), -1px -1px 2px rgba(255,255,255,0.5);
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards;
            animation-delay: 0.3s;
        }

        .poem-line {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            color: #5d4e37;
            line-height: 1.8;
            letter-spacing: 0.25em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1), -1px -1px 1px rgba(255,255,255,0.4);
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards;
        }
        .poem-line:nth-child(2) { animation-delay: 0.8s; }
        .poem-line:nth-child(3) { animation-delay: 1.3s; }
        .poem-line:nth-child(4) { animation-delay: 1.8s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .author {
            margin-top: 50px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            font-weight: 300;
            color: #9a8b7a;
            letter-spacing: 0.6em;
            opacity: 0;
            animation: fadeInUp 1.5s ease 2.3s forwards;
        }

        .divider {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, #b0a090, transparent);
            margin: 30px auto 0;
            opacity: 0;
            animation: fadeInUp 1s ease 2.0s forwards;
        }

        .seal {
            position: absolute;
            bottom: 60px; right: 60px;
            width: 80px; height: 80px;
            border: 3px solid #c41e3a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 2rem;
            color: #c41e3a;
            opacity: 0;
            animation: stamp 0.5s ease 2.8s forwards;
            transform: rotate(-5deg);
            z-index: 10;
        }

        @keyframes stamp {
            from { opacity: 0; transform: scale(2) rotate(-5deg); }
            to { opacity: 0.8; transform: scale(1) rotate(-5deg); }
        }

        @media (max-width: 768px) {
            .poem { padding: 40px 20px; }
            .seal { width: 60px; height: 60px; font-size: 1.5rem; bottom: 40px; right: 40px; }
        }
    </style>
</head>
<body>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>

    <div class="hero">
        <div class="poem">
            <div class="poem-title">人闲桂花落</div>
            <div class="poem-line">夜静春山空</div>
            <div class="poem-line">月出惊山鸟</div>
            <div class="poem-line">时鸣春涧中</div>
            <div class="divider"></div>
            <div class="author">唐 · 王维《鸟鸣涧》</div>
        </div>
    </div>

    <div class="seal">龙</div>
</body>
</html>
