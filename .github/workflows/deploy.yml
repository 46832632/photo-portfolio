name: Deploy Photo Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

# 并发控制：同一时间只允许一个部署运行，新的会取消旧的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify data/photos.json
        run: |
          if [ -f "data/photos.json" ]; then
            echo "data/photos.json exists"
            cat data/photos.json | head -5
          else
            echo "Warning: data/photos.json not found"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
