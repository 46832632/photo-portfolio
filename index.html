<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>桂落春山 · 摄影作品集</title>
    <meta name="description" content="人闲桂花落，夜静春山空 — 一个关于光影与时间的摄影手记">

    <!-- Google Fonts: Noto Serif SC + ZCOOL XiaoWei (via Chinese mirror) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ========== 导航栏 ========== -->
    <nav id="navbar" class="navbar">
        <div class="navbar-inner">
            <a href="#" class="navbar-brand">
                <span class="brand-text">桂落春山</span>
            </a>
            <button class="navbar-toggle" id="navToggle" aria-label="打开菜单">
                <span class="hamburger"></span>
                <span class="hamburger"></span>
                <span class="hamburger"></span>
            </button>
            <ul class="navbar-links" id="navLinks">
                <li><a href="#hero" class="nav-link">首页</a></li>
                <li><a href="#gallery" class="nav-link">作品</a></li>
                <li><a href="#footer" class="nav-link">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- ========== 首屏意境区 ========== -->
    <header id="hero" class="hero">
        <div class="hero-content">
            <p class="hero-poem">人闲桂花落</p>
            <p class="hero-poem">夜静春山空</p>
            <p class="hero-subtitle">一个关于光影与时间的摄影手记</p>
        </div>
    </header>

    <!-- ========== 分类筛选栏 ========== -->
    <section id="filter-bar" class="filter-bar">
        <div class="filter-bar-inner">
            <button class="filter-btn active" data-category="all">全部</button>
        </div>
    </section>

    <!-- ========== 摄影作品展示区 ========== -->
    <main id="gallery" class="gallery">
        <div class="gallery-grid" id="galleryGrid">
            <!-- 作品卡片由 JS 动态渲染 -->
        </div>
    </main>

    <!-- ========== 灯箱 ========== -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="图片预览">
        <div class="lightbox-mask" id="lightboxMask"></div>
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose" aria-label="关闭">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <button class="lightbox-prev" id="lightboxPrev" aria-label="上一张">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <button class="lightbox-next" id="lightboxNext" aria-label="下一张">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polyline points="9 6 15 12 9 18"/>
                </svg>
            </button>
            <div class="lightbox-image-wrap">
                <img src="" alt="" id="lightboxImg">
            </div>
            <div class="lightbox-info">
                <h3 class="lightbox-title" id="lightboxTitle"></h3>
                <p class="lightbox-meta">
                    <span class="lightbox-id" id="lightboxId"></span>
                    <span class="lightbox-category" id="lightboxCategory"></span>
                    <span class="lightbox-date" id="lightboxDate"></span>
                </p>
                <p class="lightbox-desc" id="lightboxDesc"></p>
            </div>
        </div>
    </div>

    <!-- ========== 页脚 ========== -->
    <footer id="footer" class="footer">
        <p>&copy; 2026 桂落春山 &middot; All rights reserved</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
