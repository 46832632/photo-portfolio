<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>春涧 · Photography</title>
  <meta name="description" content="人闲桂花落，夜静春山空 · 个人摄影作品">
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+SC:wght@300;400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #111;
      --dim: #999;
      --light: #ccc;
      --accent: #b08d57;
      --border: rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
    body { font-family: 'Noto Serif SC', serif; background: #fff; color: var(--text); overflow-x: hidden; }

    /* Header */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 2.5rem;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.1rem; color: var(--text);
      text-decoration: none; letter-spacing: 0.25em;
    }
    .nav-links { list-style: none; display: flex; gap: 2rem; }
    .nav-links a {
      font-size: 0.75rem; color: var(--dim); text-decoration: none;
      letter-spacing: 0.12em; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .progress-bar {
      position: fixed; top: 0; left: 0; height: 2px;
      background: var(--accent); z-index: 300;
      width: 0; transition: width 0.1s linear;
    }

    /* Photo pages */
    .photo-page {
      height: 100vh; scroll-snap-align: start;
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }
    .photo-wrap {
      flex: 1; overflow: hidden; position: relative;
    }
    .photo-wrap img {
      width: 100%; height: 100%; object-fit: contain;
      display: block; cursor: zoom-in;
      transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .photo-wrap img:hover { transform: scale(1.02); }
    .photo-meta {
      padding: 1.2rem 2.5rem 1.8rem;
      display: flex; align-items: baseline;
      gap: 1.5rem; border-top: 1px solid var(--border);
      min-height: 64px;
    }
    .photo-title-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 300; font-style: italic;
      color: var(--text); letter-spacing: 0.06em;
      min-width: 160px;
    }
    .photo-location, .photo-year {
      font-size: 0.72rem; color: var(--dim); letter-spacing: 0.12em;
    }
    .photo-sep { color: var(--light); font-size: 0.7rem; }

    /* Loading */
    .loading-screen {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
    }
    .loading-screen p { font-size: 0.8rem; color: var(--dim); letter-spacing: 0.2em; }

    /* Footer */
    .site-footer {
      min-height: 100vh; scroll-snap-align: start;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.8rem;
      padding: 5rem 2rem; text-align: center;
      border-top: 1px solid var(--border);
    }
    .footer-title {
      font-family: 'ZCOOL XiaoWei', serif; font-size: 1.3rem;
      letter-spacing: 0.4em; color: var(--text); text-indent: 0.4em;
    }
    .footer-verse {
      font-size: 0.75rem; color: var(--light); letter-spacing: 0.15em;
    }
    .footer-admin {
      margin-top: 2rem;
      font-size: 0.7rem; color: var(--dim); text-decoration: none;
      letter-spacing: 0.1em; border-bottom: 1px solid var(--border);
      padding-bottom: 1px; transition: all 0.2s;
    }
    .footer-admin:hover { color: var(--accent); border-color: var(--accent); }
    .footer-count {
      font-size: 0.7rem; color: var(--light); letter-spacing: 0.15em;
    }

    /* Page indicator */
    .page-indicator {
      position: fixed; right: 2rem; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 0.5rem; z-index: 200;
    }
    .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--light); cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active { background: var(--accent); height: 16px; border-radius: 2px; }

    /* Mobile */
    @media (max-width: 768px) {
      header { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .photo-meta { padding: 1rem 1.5rem 1.4rem; flex-wrap: wrap; gap: 0.5rem; }
      .photo-title-en { font-size: 0.95rem; min-width: unset; }
      .page-indicator { display: none; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<header>
  <a href="#" class="logo">春涧</a>
  <ul class="nav-links">
    <li><a href="#" onclick="scrollToPage(0);return false;">Home</a></li>
  </ul>
</header>

<div id="photoContainer">
  <div class="loading-screen">
    <p>LOADING</p>
  </div>
</div>

<div class="page-indicator" id="pageIndicator"></div>

<section class="site-footer">
  <p class="footer-title">人闲桂花落</p>
  <p class="footer-verse">夜静春山空 · 月出惊山鸟</p>
  <p class="footer-count" id="footerCount"></p>
  <a href="admin.html" class="footer-admin">Admin →</a>
</section>

<script>
var CONTAINER = document.getElementById('photoContainer');
var PROGRESS = document.getElementById('progressBar');
var INDICATOR = document.getElementById('pageIndicator');
var FOOTER_COUNT = document.getElementById('footerCount');
var allPhotos = [];
var pageCount = 0;

async function loadPhotos() {
  console.log('[LOBSTER] loadPhotos called');
  try {
    console.log('[LOBSTER] fetching photos.json...');
    var r = await fetch('data/photos.json');
    console.log('[LOBSTER] fetch status:', r.status);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    console.log('[LOBSTER] photos loaded:', data.photos ? data.photos.length : 0);
    allPhotos = (data.photos || []).sort(function(a,b){ return (a.seq||999)-(b.seq||999); });
    FOOTER_COUNT.textContent = allPhotos.length + ' works';
    console.log('[LOBSTER] calling renderPages...');
    renderPages();
    console.log('[LOBSTER] done');
  } catch(e) {
    console.error('[LOBSTER] loadPhotos error:', e);
    CONTAINER.innerHTML = '<div class="loading-screen"><p>Load failed: ' + e.message + '<br><small>Try refreshing</small></p></div>';
  }
}
}

function renderPages() {
  var i, p, title, location, year, metaParts, pageHTML;
  var dotsHTML = '';
  var pagesHTML = '';
  for (i = 0; i < allPhotos.length; i++) {
    dotsHTML += '<div class="dot' + (i === 0 ? ' active' : '') + '" onclick="scrollToPage(' + i + ')"></div>';
    p = allPhotos[i];
    title = p.titleEn || p.titleZh || '';
    location = p.location || '';
    year = p.year || '';
    metaParts = [location, year].filter(Boolean);
    pagesHTML += '<section class="photo-page" id="page' + i + '">' +
      '<div class="photo-wrap">' +
        '<img src="images/' + p.filename + '?t=' + Date.now() + '" alt="' + title + '" loading="' + (i < 2 ? 'eager' : 'lazy') + '" onerror="this.style.display='none'">' +
      '</div>' +
      '<div class="photo-meta">' +
        '<span class="photo-title-en">' + title + '</span>' +
        (metaParts.length ? '<span class="photo-sep">&#183;</span>' : '') +
        (location ? '<span class="photo-location">' + location + '</span>' : '') +
        (location && year ? '<span class="photo-sep">&#183;</span>' : '') +
        (year ? '<span class="photo-year">' + year + '</span>' : '') +
      '</div>' +
    '</section>';
  }
  INDICATOR.innerHTML = dotsHTML;
  CONTAINER.innerHTML = pagesHTML;
  pageCount = allPhotos.length;
  setupScroll();
}

function setupScroll() {
  var pages = document.querySelectorAll('.photo-page');
  var dots = document.querySelectorAll('.dot');
  window.addEventListener('scroll', function() {
    var scrollTop = window.scrollY;
    var docH = document.documentElement.scrollHeight - window.innerHeight;
    PROGRESS.style.width = (scrollTop / docH * 100) + '%';
    var activePage = 0;
    for (var i = 0; i < pages.length; i++) {
      if (pages[i].offsetTop <= scrollTop + 10) activePage = i;
    }
    for (var j = 0; j < dots.length; j++) {
      dots[j].classList.toggle('active', j === activePage);
    }
  }, { passive: true });
}

function scrollToPage(index) {
  var target = document.getElementById('page' + index) || document.querySelector('.site-footer');
  if (target) target.scrollIntoView({ behavior: 'smooth' });
}

loadPhotos();
</script>
</body>
</html>
