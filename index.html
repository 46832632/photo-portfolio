<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>桂花落 · Photography</title>
<link rel="preconnect" href="https://fonts.loli.net">
<link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow:hidden;height:100%}
body{font-family:'Noto Serif SC',serif;color:#1a1a1a;height:100%;overflow-y:auto;scroll-snap-type:y mandatory}
header{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06)}
.logo{font-size:.8rem;letter-spacing:.35em;color:#1a1a1a;text-decoration:none;text-transform:uppercase}
.nav{list-style:none;display:flex;gap:2.5rem}
.nav a{font-size:.78rem;letter-spacing:.2em;color:#888;text-decoration:none}
.nav a.active{color:#1a1a1a}
.menu{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:0}
.menu span{width:22px;height:1px;background:#1a1a1a}
.mnav{display:none;position:fixed;top:58px;left:0;right:0;background:white;padding:2rem;flex-direction:column;gap:1.5rem;text-align:center;z-index:99}
.mnav.on{display:flex}
.mnav a{font-size:.95rem;letter-spacing:.3em;color:#888;text-decoration:none}
.photo{min-height:100vh;display:flex;align-items:center;justify-content:center;scroll-snap-align:start;padding:0 2rem}
.inner{max-width:900px;width:100%}
.photo img{width:100%;display:block;opacity:0;transition:opacity .8s}
.photo img.loaded{opacity:1}
.info{padding:1.5rem 0 1rem;text-align:center}
.cama{font-size:.72rem;color:#888;letter-spacing:.1em;margin-bottom:.5rem}
.num{font-size:.68rem;color:#c9a84c;letter-spacing:.2em;margin-bottom:.4rem}
h2{font-size:1.2rem;letter-spacing:.2em;margin-bottom:.3rem}
.sub{font-size:.72rem;color:#888;letter-spacing:.2em}
.about{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;scroll-snap-align:start;padding:3rem 2rem}
.about h2{font-size:1.8rem;letter-spacing:.3em;margin-bottom:1rem}
.about p{font-size:.72rem;color:#888;letter-spacing:.3em;line-height:2.5;text-align:center}
.about .div{width:1px;height:40px;background:linear-gradient(to bottom,transparent,#c9a84c,transparent);margin:1.5rem auto}
.about .link{margin-top:3rem;font-size:.72rem}
.about .link a{color:#888;text-decoration:none;border-bottom:1px solid rgba(0,0,0,.15);padding-bottom:2px}
.loading-msg{text-align:center;color:#888;font-size:.8rem;letter-spacing:.3em;padding:4rem}
@media(max-width:640px){header{padding:1rem 1.5rem}.nav{display:none}.menu{display:flex}.photo{padding:80px 0 0}}
</style>
</head>
<body>
<header>
  <a href="#" class="logo">桂 花 落</a>
  <ul class="nav">
    <li><a href="#" class="active">作品</a></li>
    <li><a href="#about">春山空</a></li>
    <li><a href="upload-local.html">春涧中</a></li>
  </ul>
  <button class="menu" onclick="document.getElementById('mnav').classList.toggle('on')">
    <span></span><span></span><span></span>
  </button>
</header>
<nav class="mnav" id="mnav">
  <a href="#">作品</a>
  <a href="#about">春山空</a>
  <a href="upload-local.html">春涧中</a>
</nav>

<div id="gallery"><p class="loading-msg">加载中...</p></div>

<div class="about" id="about">
  <h2>春山空</h2>
  <p>月出惊山鸟<br>时鸣春涧中</p>
  <div class="div"></div>
  <p>桂 花 落 · Photography Portfolio<br><br>
  <span class="link"><a href="upload-local.html">→ 上传新照片</a></span></p>
</div>

<script>
(function(){
  var REPO = "46832632/photo-portfolio";
  var BRANCH = "main";
  var IMG_BASE = "https://raw.githubusercontent.com/" + REPO + "/" + BRANCH + "/images/";
  var gallery = document.getElementById("gallery");

  function errImg(img) {
    img.style.background = "#f5f5f3";
    img.alt = "image not found";
    img.style.minHeight = "200px";
    img.style.opacity = "1";
  }

  fetch("https://api.github.com/repos/" + REPO + "/contents/images?ref=" + BRANCH)
    .then(function(r){ return r.json(); })
    .then(function(files) {
      if (!Array.isArray(files)) {
        gallery.innerHTML = "<p class='loading-msg'>暂无照片 · <a href='upload-local.html' style='color:#c9a84c'>去上传</a></p>";
        return;
      }
      var imgs = files.filter(function(f){ return /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name) && f.size > 0; });
      if (imgs.length === 0) {
        gallery.innerHTML = "<p class='loading-msg'>暂无照片 · <a href='upload-local.html' style='color:#c9a84c'>去上传</a></p>";
        return;
      }
      var html = "";
      imgs.forEach(function(file, i) {
        var num = i + 1;
        var title = file.name.replace(/\.[^.]+$/, "").replace(/[_\-]+/g, " ").replace(/^[0-9]+/, "").trim().slice(0, 24) || ("第" + num + "张");
        html += "<div class='photo' id='p" + num + "'>";
        html += "<div class='inner'>";
        html += "<img src='" + IMG_BASE + encodeURIComponent(file.name) + "?v=" + Date.now() + "' ";
        html += "alt='" + title + "' onclick='this.classList.toggle(\"loaded\")' ";
        html += "onerror='errImg(this)' onload='this.classList.add(\"loaded\")'>";
        html += "<div class='info'>";
        html += "<p class='cama'>SONY A7R IV · 35mm f/2.8</p>";
        html += "<p class='num'>" + num + " / " + imgs.length + "</p>";
        html += "<h2>" + title + "</h2>";
        html += "<p class='sub'></p>";
        html += "</div></div></div>";
      });
      gallery.innerHTML = html;
    })
    .catch(function() {
      gallery.innerHTML = "<p class='loading-msg'>加载失败 · 请检查网络</p>";
    });
})();
</script>
</body>
</html>
