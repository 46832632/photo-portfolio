<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>人闲桂花落 · 夜静春山空 | Photography Portfolio</title>
  <meta name="description" content="个人摄影作品集，人闲桂花落，夜静春山空">
  <meta name="theme-color" content="#ffffff">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #ffffff;
      --bg-cream: #fafaf8;
      --text: #1a1a1a;
      --text-dim: #888;
      --text-light: #aaa;
      --accent: #c9a84c;
      --border: rgba(0,0,0,0.06);
      --shadow: 0 8px 40px rgba(0,0,0,0.08);
      --shadow-hover: 0 16px 60px rgba(0,0,0,0.12);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html {
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
    }
    
    body {
      font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1.2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    
    .logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--text);
      text-decoration: none;
      transition: opacity 0.3s;
    }
    
    .logo:hover { opacity: 0.6; }
    
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    
    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      transition: color 0.3s;
    }
    
    .nav-links a:hover { color: var(--text); }
    
    .menu-btn {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 40px;
      height: 40px;
      background: none;
      border: none;
      cursor: pointer;
      gap: 6px;
      padding: 0;
    }
    
    .menu-btn span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--text);
      transition: all 0.3s;
    }
    
    .menu-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    
    .menu-btn.active span:nth-child(2) { opacity: 0; }
    
    .menu-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }
    
    .mobile-nav {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1rem;
      transform: translateY(-100%);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 999;
      border-bottom: 1px solid var(--border);
    }
    
    .mobile-nav.active {
      transform: translateY(0);
      opacity: 1;
      visibility: visible;
    }
    
    .mobile-nav a {
      display: block;
      padding: 1rem;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-align: center;
      border-bottom: 1px solid var(--border);
      transition: color 0.3s;
    }
    
    .mobile-nav a:last-child { border-bottom: none; }
    .mobile-nav a:hover { color: var(--text); }
    
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      scroll-snap-align: start;
      background: var(--bg);
    }
    
    .hero-tag {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      color: var(--text-light);
      margin-bottom: 2rem;
      text-transform: uppercase;
    }
    
    .hero-title {
      font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
      color: var(--text);
      line-height: 1.3;
    }
    
    .hero-subtitle {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.4em;
    }
    
    .scroll-hint {
      position: absolute;
      bottom: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-light);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      animation: bounce 2.5s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(8px); opacity: 1; }
    }
    
    .photo-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 3rem;
      scroll-snap-align: start;
      background: var(--bg);
    }
    
    .photo-container {
      display: flex;
      align-items: center;
      gap: 5rem;
      max-width: 1400px;
      width: 100%;
    }
    
    .photo-wrapper {
      flex: 1.2;
      position: relative;
    }
    
    .photo-wrapper img {
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      box-shadow: var(--shadow);
      transition: box-shadow 0.4s, transform 0.4s;
      cursor: zoom-in;
    }
    
    .photo-wrapper img:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
    }
    
    .photo-info {
      flex: 0.5;
      max-width: 320px;
    }
    
    .photo-number {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--text-light);
      margin-bottom: 1.2rem;
    }
    
    .photo-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 2.2rem;
      font-weight: 400;
      margin-bottom: 0.3rem;
      letter-spacing: 0.08em;
    }
    
    .photo-subtitle {
      font-size: 0.9rem;
      color: var(--accent);
      margin-bottom: 1.5rem;
      letter-spacing: 0.15em;
      font-style: italic;
    }
    
    .photo-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 1.8rem;
      letter-spacing: 0.05em;
      line-height: 1.8;
    }
    

    .camera-params {
      font-size: 0.7rem;
      color: var(--text-light);
      letter-spacing: 0.08em;
      text-align: right;
      margin-top: 1.5rem;
      opacity: 0.6;
    }
    
    .camera-params .camera-icon {
      opacity: 0.5;
      margin-right: 0.2rem;
    }
    
    .camera-params span {
      display: inline;
      margin-left: 1rem;
    }

    .photo-meta span {
      display: inline-block;
      margin-right: 1.5rem;
    }
    
    .photo-desc {
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 2;
      font-weight: 300;
    }
    
    .camera-icon {
      display: inline-block;
      margin-right: 0.5rem;
      opacity: 0.6;
    }
    
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      cursor: zoom-out;
    }
    
    .lightbox.active {
      opacity: 1;
      visibility: visible;
    }
    
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    
    .lightbox-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      width: 50px;
      height: 50px;
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    
    .lightbox-close:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.6);
    }
    
    .footer {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      scroll-snap-align: start;
      background: var(--bg-cream);
    }
    
    .footer-tag {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: var(--text-light);
      margin-bottom: 2rem;
      text-transform: uppercase;
    }
    
    .footer-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      color: var(--text-dim);
      line-height: 2.5;
      font-weight: 300;
      max-width: 500px;
    }
    
    .footer-divider {
      width: 60px;
      height: 1px;
      background: var(--border);
      margin: 2.5rem auto;
    }
    
    .footer-copy {
      font-size: 0.75rem;
      color: var(--text-light);
      letter-spacing: 0.15em;
    }
    
    .progress-bar {
      position: fixed;
      top: 60px;
      left: 0;
      height: 2px;
      background: var(--accent);
      z-index: 999;
      width: 0%;
      transition: width 0.1s;
    }
    
    .page-dots {
      position: fixed;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 99;
    }
    
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .dot:hover { background: rgba(0,0,0,0.35); }
    .dot.active { 
      background: var(--text); 
      transform: scale(1.4);
    }
    
    @media (max-width: 1024px) {
      .photo-container {
        flex-direction: column;
        gap: 2rem;
        text-align: center;
      }
      
      .photo-wrapper {
        width: 100%;
        flex: none;
      }
      
      .photo-wrapper img {
        max-height: 55vh;
      }
      
      .photo-info {
        flex: none;
        max-width: 100%;
      }
    }
    
    @media (max-width: 768px) {
      header {
        padding: 1rem 1.5rem;
      }
      
      .nav-links { display: none; }
      .menu-btn { display: flex; }
      
      .hero {
        padding: 5rem 1.5rem 3rem;
      }
      
      .hero-tag { font-size: 0.6rem; letter-spacing: 0.3em; }
      .hero-title { letter-spacing: 0.15em; }
      .hero-subtitle { font-size: 0.9rem; letter-spacing: 0.2em; }
      
      .photo-section {
        padding: 4rem 1.2rem;
        min-height: auto;
      }
      
      .photo-wrapper img {
        max-height: 45vh;
      }
      
      .photo-title { font-size: 1.6rem; }
      .photo-subtitle { font-size: 0.85rem; }
      .photo-meta { font-size: 0.75rem; }
      .photo-meta span { display: block; margin-right: 0; margin-bottom: 0.3rem; }
      .photo-desc { font-size: 0.85rem; }
      
      .camera-params { 
        text-align: center; 
        margin-top: 1rem;
        font-size: 0.65rem;
        letter-spacing: 0.05em;
      }
      .camera-params span { margin: 0 0.4rem; }
      
      .page-dots { display: none; }
      
      .scroll-hint { bottom: 2rem; }
      
      .footer { padding: 3rem 1.5rem; }
      .footer-text { font-size: 1rem; }
    }
    
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    ::-webkit-scrollbar {
      width: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.1);
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0,0,0,0.2);
    }
  </style>
</head><body><nav class="mobile-nav" id="mobileNav">
    <a href="#hero" onclick="toggleMenu()">首页</a>
    <a href="#photo1" onclick="toggleMenu()">作品</a>
    <a href="#about" onclick="toggleMenu()">关于</a>
  </nav><section class="hero" id="hero">
    <p class="hero-tag">Photography Portfolio</p>
    <h1 class="hero-title">人闲桂花落</h1>
    <p class="hero-subtitle">夜静春山空</p>
    <div class="scroll-hint">
      <span>SCROLL</span>
      <span>↓</span>
    </div>
  </section><section class="photo-section fade-in" id="photo1">
    <div class="photo-container">
      <div class="photo-wrapper">
        <img src="images/hero-01.jpg" alt="万家灯火" loading="lazy" onclick="openLightbox(this.src)">
      </div>
      <div class="camera-params"><span class="camera-icon">📷</span> <span>Sony A7R IV</span> <span>35mm</span> <span>f/11</span> <span>1/125s</span> <span>ISO 200</span></div>
      <div class="photo-info">
        <p class="photo-number">壹 / 拾伍</p>
        <h2 class="photo-title">静</h2>
        <p class="photo-subtitle">Stillness</p>
        <p class="photo-desc">万籁俱寂，唯有灯火未眠。</p>
      </div>
    </div>
  </section><section class="photo-section fade-in" id="photo2">
    <div class="photo-container">
      <div class="photo-wrapper">
        <img src="images/gallery-02.jpg" alt="线的诗学" loading="lazy" onclick="openLightbox(this.src)">
      </div>
      <div class="camera-params"><span class="camera-icon">📷</span> <span>Sony A7R IV</span> <span>50mm</span> <span>f/2.0</span> <span>1/60s</span> <span>ISO 800</span></div>
      <div class="photo-info">
        <p class="photo-number">贰 / 拾伍</p>
        <h2 class="photo-title">痕</h2>
        <p class="photo-subtitle">Trace</p>
        <p class="photo-desc">线过留痕，痕即永恒。</p>
      </div>
    </div>
  </section><section class="photo-section fade-in" id="photo3">
    <div class="photo-container">
      <div class="photo-wrapper">
        <img src="images/gallery-03.jpg" alt="人间烟火" loading="lazy" onclick="openLightbox(this.src)">
      </div>
      <div class="camera-params"><span class="camera-icon">📷</span> <span>Sony A7R IV</span> <span>28mm</span> <span>f/4</span> <span>8s</span> <span>ISO 400</span></div>
      <div class="photo-info">
        <p class="photo-number">叁 / 拾伍</p>
        <h2 class="photo-title">暖</h2>
        <p class="photo-subtitle">Warmth</p>
        <p class="photo-desc">一点微光，温暖人间。</p>
      </div>
    </div>
  </section><script>
// 淡入动画
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

// 移动端菜单
function toggleMenu() {
  document.getElementById('mobileNav').classList.toggle('active');
}

// 灯箱
function openLightbox(src) {
  // 简化版，直接在新窗口打开
  window.open(src, '_blank');
}
</script>
</body></html>
