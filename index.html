<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桂花落 · 夜静春山空</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --accent: #a08060;
      --accent-light: #d4c4a8;
      --text: #2c2a26;
      --muted: #8a8278;
      --light: #f0ede6;
      --border: #e8e3db;
      --ink: #3d3830;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif SC', serif;
      min-height: 100vh;
      line-height: 1.8;
    }

    /* 导航 */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(250,249,247,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.5rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.2em;
    }

    .logo-sub {
      font-size: 0.55em;
      color: var(--muted);
      display: block;
      letter-spacing: 0.35em;
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .nav-links a {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .nav-links a:hover { color: var(--text); background: var(--light); }
    .nav-links a.active { color: var(--accent); }

    .dropdown { position: relative; }
    .dropdown-btn { 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .dropdown-btn:hover { color: var(--text); background: var(--light); }
    .dropdown-btn::after { content: '▾'; font-size: 0.65em; }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0;
      min-width: 100px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .dropdown:hover .dropdown-menu { display: block; }
    .dropdown-menu a {
      display: block;
      padding: 0.5rem 1.2rem;
      font-size: 0.8rem;
      text-align: center;
    }

    /* 英雄区 */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 2rem;
    }

    .hero-poem {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      color: var(--ink);
      letter-spacing: 0.3em;
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .hero-en {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 4rem;
    }

    .hero-scroll {
      position: absolute;
      bottom: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      animation: float 2s ease-in-out infinite;
    }

    .hero-scroll::after {
      content: '';
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--muted), transparent);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    /* 关于区 */
    .about {
      max-width: 680px;
      margin: 0 auto;
      padding: 6rem 2rem;
      text-align: center;
    }

    .about-title {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 2rem;
      letter-spacing: 0.2em;
    }

    .about-text {
      font-size: 1rem;
      color: var(--muted);
      line-height: 2.2;
      font-weight: 300;
    }

    /* 画廊 */
    .gallery-section {
      padding: 4rem 2rem 6rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.5rem;
      color: var(--text);
      letter-spacing: 0.15em;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
      aspect-ratio: 1;
      background: var(--light);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .gallery-item:hover::after { opacity: 1; }

    .gallery-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      color: white;
      z-index: 1;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s;
    }

    .gallery-item:hover .gallery-overlay {
      transform: translateY(0);
      opacity: 1;
    }

    .gallery-overlay h4 {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .gallery-overlay p {
      font-size: 0.75rem;
      opacity: 0.8;
    }

    /* 灯箱 */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10,10,8,0.95);
      align-items: center;
      justify-content: center;
    }

    .lightbox.active { display: flex; }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.2); }

    .lightbox-content {
      max-width: 90vw;
      max-height: 85vh;
    }

    .lightbox-content img {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
    }

    .lightbox-info {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
    }

    .lightbox-info h3 {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 0.3rem;
    }

    .lightbox-info p {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    /* 页脚 */
    footer {
      text-align: center;
      padding: 3rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* 加载状态 */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .loading::before {
      content: '···';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '·'; }
      40% { content: '··'; }
      60%, 100% { content: '···'; }
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .logo { font-size: 1.2rem; }
      .nav-links { gap: 0.2rem; }
      .nav-links a { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .lightbox-nav { width: 40px; height: 40px; font-size: 1.2rem; }
    }

    /* 分类筛选器 */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Noto Serif SC', serif;
      font-size: 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(160,128,96,0.08);
    }
  </style>
</head>
<body>
  <!-- 导航 -->
  <nav>
    <a href="index.html" class="logo">
      桂花落
      <span class="logo-sub">PHOTOGRAPHY</span>
    </a>
    <div class="nav-links">
      <a href="#about">关于</a>
      <div class="dropdown">
        <span class="dropdown-btn">作品</span>
        <div class="dropdown-menu">
          <a href="?cat=city">城市</a>
          <a href="?cat=nature">自然</a>
          <a href="?cat=people">人物</a>
          <a href="?cat=arch">建筑</a>
          <a href="?cat=food">饮食</a>
        </div>
      </div>
      <a href="admin.html">管理</a>
    </div>
  </nav>

  <!-- 英雄区 -->
  <section class="hero">
    <p class="hero-poem">人闲桂花落</p>
    <p class="hero-poem" style="margin-top:-1rem; color: var(--muted);">夜静春山空</p>
    <p class="hero-en">Photography Portfolio</p>
    <div class="hero-scroll">SCROLL</div>
  </section>

  <!-- 关于区 -->
  <section class="about" id="about">
    <h2 class="about-title">关于</h2>
    <p class="about-text">
      人闲桂花落，夜静春山空。<br>
      月出惊山鸟，时鸣春涧中。<br><br>
      用镜头捕捉静谧中的诗意，<br>
      在光影间寻找内心的宁静。
    </p>
  </section>

  <!-- 画廊区 -->
  <section class="gallery-section">
    <div class="section-header">
      <h2 class="section-title">作品集</h2>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-cat="all">全部</button>
      <button class="filter-btn" data-cat="city">城市</button>
      <button class="filter-btn" data-cat="nature">自然</button>
      <button class="filter-btn" data-cat="people">人物</button>
      <button class="filter-btn" data-cat="arch">建筑</button>
      <button class="filter-btn" data-cat="food">饮食</button>
    </div>

    <div class="gallery-grid" id="gallery">
      <div class="loading">正在加载作品集</div>
    </div>
  </section>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-nav lightbox-prev">&#8249;</button>
    <button class="lightbox-nav lightbox-next">&#8250;</button>
    <div class="lightbox-content">
      <img src="" alt="" id="lightbox-img">
    </div>
    <div class="lightbox-info">
      <h3 id="lightbox-title"></h3>
      <p id="lightbox-meta"></p>
    </div>
  </div>

  <!-- 页脚 -->
  <footer>
    <p>&copy; 2026 桂花落 · Photography Portfolio</p>
  </footer>

  <script>
    // 配置
    const CONFIG = {
      GITHUB_OWNER: '46832632',
      GITHUB_REPO: 'photo-portfolio',
      BRANCH: 'main'
    };

    // 分类映射
    const CAT_MAP = {
      city: '城市',
      nature: '自然',
      people: '人物',
      arch: '建筑',
      food: '饮食'
    };

    // 全局状态
    let allPhotos = [];
    let currentIndex = 0;
    let currentCat = 'all';

    // DOM 元素
    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxTitle = document.getElementById('lightbox-title');
    const lightboxMeta = document.getElementById('lightbox-meta');
    const filterBtns = document.querySelectorAll('.filter-btn');

    // 获取URL参数
    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    // 加载照片
    async function loadPhotos() {
      try {
        const response = await fetch(`https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/contents/data/photos.json`);
        const data = await response.json();
        const content = atob(data.content);
        const json = JSON.parse(content);
        allPhotos = json.photos || [];
        allPhotos.sort((a, b) => (a.seq || 999) - (b.seq || 999));
        renderGallery();
      } catch (e) {
        gallery.innerHTML = '<p style="text-align:center;color:var(--muted);padding:3rem;">加载失败，请刷新重试</p>';
      }
    }

    // 渲染画廊
    function renderGallery() {
      const filtered = currentCat === 'all' 
        ? allPhotos 
        : allPhotos.filter(p => p.category === currentCat);

      if (filtered.length === 0) {
        gallery.innerHTML = '<p style="text-align:center;color:var(--muted);padding:3rem;">该分类下暂无作品</p>';
        return;
      }

      gallery.innerHTML = filtered.map((photo, i) => `
        <div class="gallery-item" data-index="${allPhotos.indexOf(photo)}">
          <img src="images/${photo.filename}" alt="${photo.titleZh || photo.titleEn}" loading="lazy"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0ede6%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%238a8278%22 font-size=%2212%22>Image</text></svg>'">
          <div class="gallery-overlay">
            <h4>${photo.titleZh || photo.titleEn || ''}</h4>
            <p>${photo.location || ''} · ${photo.year || ''}</p>
          </div>
        </div>
      `).join('');

      // 绑定点击事件
      gallery.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', () => {
          currentIndex = parseInt(item.dataset.index);
          openLightbox();
        });
      });
    }

    // 打开灯箱
    function openLightbox() {
      const photo = allPhotos[currentIndex];
      if (!photo) return;

      lightboxImg.src = `images/${photo.filename}`;
      lightboxImg.alt = photo.titleZh || photo.titleEn;
      lightboxTitle.textContent = photo.titleZh || photo.titleEn || '';
      lightboxMeta.textContent = `${photo.location || ''} · ${photo.year || ''} · ${photo.catLabel || CAT_MAP[photo.category] || ''}`;
      
      if (photo.desc) {
        lightboxMeta.textContent += '<br>' + photo.desc.replace(/\\n/g, ' · ');
      }

      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // 关闭灯箱
    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    // 导航
    function navigate(direction) {
      const filtered = currentCat === 'all' 
        ? allPhotos 
        : allPhotos.filter(p => p.category === currentCat);
      const currentInFiltered = filtered.indexOf(allPhotos[currentIndex]);
      
      let newIndex;
      if (direction === 'next') {
        newIndex = (currentInFiltered + 1) % filtered.length;
      } else {
        newIndex = (currentInFiltered - 1 + filtered.length) % filtered.length;
      }
      
      currentIndex = allPhotos.indexOf(filtered[newIndex]);
      openLightbox();
    }

    // 事件绑定
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        renderGallery();
      });
    });

    lightbox.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
    lightbox.querySelector('.lightbox-prev').addEventListener('click', () => navigate('prev'));
    lightbox.querySelector('.lightbox-next').addEventListener('click', () => navigate('next'));

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate('prev');
      if (e.key === 'ArrowRight') navigate('next');
    });

    // 初始化
    const urlCat = getUrlParam('cat');
    if (urlCat && CAT_MAP[urlCat]) {
      currentCat = urlCat;
      filterBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.cat === urlCat);
      });
    }

    loadPhotos();
  </script>
</body>
</html>
