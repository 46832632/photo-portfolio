<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂落春山 · 摄影作品集</title>
    <meta name="description" content="人闲桂花落，夜静春山空 — 一个关于光影与时间的摄影手记">
    <meta name="theme-color" content="#FAFAF8">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="桂落春山 · 摄影作品集">
    <meta property="og:description" content="人闲桂花落，夜静春山空 — 一个关于光影与时间的摄影手记">
    <meta property="og:locale" content="zh_CN">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar"></div>
    
    <!-- 跳过导航 -->
    <a href="#gallery" class="skip-link">跳转到作品</a>
    
    <!-- 导航栏 -->
    <nav id="navbar" class="navbar">
        <div class="container navbar-inner">
            <a href="#hero" class="brand">桂落春山</a>
            <button class="menu-toggle" id="menuToggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="#hero">首页</a></li>
                <li><a href="#stats">统计</a></li>
                <li><a href="#gallery">作品</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
        </div>
    </nav>
    
    <!-- 首屏 -->
    <header id="hero" class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <p class="hero-poem">人闲桂花落</p>
            <p class="hero-poem">夜静春山空</p>
            <p class="hero-sub">一个关于光影与时间的摄影手记</p>
            <a href="#gallery" class="scroll-hint">↓</a>
        </div>
    </header>
    
    <!-- 统计概览 -->
    <section id="stats" class="stats">
        <div class="container">
            <div class="stats-grid" id="statsGrid"></div>
        </div>
    </section>
    
    <!-- 分类筛选 -->
    <section class="filter-section">
        <div class="container">
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-category="all">全部</button>
            </div>
        </div>
    </section>
    
    <!-- 作品画廊 -->
    <main id="gallery" class="gallery">
        <div class="container">
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </main>
    
    <!-- 灯箱 -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="图片预览">
        <div class="lb-mask" id="lbMask"></div>
        <div class="lb-content">
            <button class="lb-close" id="lbClose" aria-label="关闭">✕</button>
            <div class="lb-left">
                <img src="" alt="" id="lbImg" class="lb-img">
                <button class="lb-nav lb-prev" id="lbPrev" aria-label="上一张">‹</button>
                <button class="lb-nav lb-next" id="lbNext" aria-label="下一张">›</button>
            </div>
            <div class="lb-right">
                <h3 class="lb-title" id="lbTitle"></h3>
                <div class="lb-meta">
                    <span class="lb-id" id="lbId"></span>
                    <span class="lb-cat" id="lbCat"></span>
                    <span class="lb-date" id="lbDate"></span>
                </div>
                <p class="lb-desc" id="lbDesc"></p>
                <p class="lb-equip" id="lbEquip"></p>
            </div>
        </div>
    </div>
    
    <!-- 关于页脚 -->
    <footer id="about" class="footer">
        <div class="container">
            <div class="poem-block">
                <p>人闲桂花落，</p>
                <p>夜静春山空。</p>
                <p>月出惊山鸟，</p>
                <p>时鸣春涧中。</p>
            </div>
            <p class="footer-text">用镜头捕捉静谧中的诗意，在光影间寻找内心的宁静。</p>
            <div class="divider"></div>
            <p class="copyright">© 2026 桂落春山 · All rights reserved</p>
        </div>
    </footer>
    
    <script src="js/main.js"></script>
</body>
</html>
