<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人闲桂花落 | 摄影作品集</title>
<meta name="description" content="人闲桂花落，夜静春山空 - 摄影作品集">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Serif SC','STSong',serif;font-weight:300;background:#fff;color:#1a1a1a;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{display:block}
button{font-family:inherit;cursor:pointer}
::selection{background:rgba(200,169,110,0.15)}

/* ── Progress ── */
#progressBar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#c8a96e,#e8d5a3);width:0;z-index:10002;transition:width 0.12s linear}

/* ── Nav ── */
#siteNav{position:fixed;top:0;left:0;right:0;z-index:1000;height:60px;background:rgba(255,255,255,0.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;transition:box-shadow 0.3s,transform 0.4s}
#siteNav.shadowed{box-shadow:0 1px 16px rgba(0,0,0,0.06)}
#siteNav.hidden{transform:translateY(-100%)}
.logo{font-family:'ZCOOL XiaoWei',serif;font-size:1.2rem;letter-spacing:0.12em}
.nav-right{display:flex;align-items:center;gap:2rem;font-size:0.8rem;color:#666}
.nav-right a{transition:color 0.2s}
.nav-right a:hover{color:#c8a96e}
.admin-btn{padding:0.3rem 0.8rem;border:1px solid rgba(0,0,0,0.1);border-radius:20px;transition:all 0.2s}
.admin-btn:hover{border-color:#c8a96e;color:#c8a96e}

/* ── Carousel ── */
#carousel{position:relative;height:calc(100vh - 60px);min-height:400px;max-height:860px;overflow:hidden;background:#fafaf8}
#carouselTrack{position:absolute;inset:0}
.carousel-slide{position:absolute;inset:0;opacity:0;transition:opacity 0.9s;cursor:pointer}
.carousel-slide.active{opacity:1}
.carousel-slide img{width:100%;height:100%;object-fit:cover;object-position:center}
.carousel-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 25%,rgba(0,0,0,0.2) 55%,rgba(0,0,0,0.6) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:3rem 3rem;pointer-events:none}
.carousel-meta{color:rgba(255,255,255,0.7);font-size:0.72rem;letter-spacing:0.2em;margin-bottom:0.5rem;opacity:0;transform:translateY(8px);transition:opacity 0.6s 0.3s,transform 0.6s 0.3s}
.carousel-title{font-family:'ZCOOL XiaoWei',serif;font-size:clamp(1.5rem,4vw,2.8rem);color:#fff;letter-spacing:0.2em;text-shadow:0 2px 20px rgba(0,0,0,0.3);opacity:0;transform:translateY(12px);transition:opacity 0.7s 0.5s,transform 0.7s 0.5s}
.carousel-sub{font-size:0.78rem;color:rgba(255,255,255,0.6);letter-spacing:0.2em;margin-top:0.4rem;opacity:0;transform:translateY(8px);transition:opacity 0.7s 0.7s,transform 0.7s 0.7s}
.carousel-slide.active .carousel-meta,
.carousel-slide.active .carousel-title,
.carousel-slide.active .carousel-sub{opacity:1;transform:translateY(0)}

.carousel-dots{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);display:flex;gap:0.5rem;z-index:10}
.c-dot{width:28px;height:2px;background:rgba(255,255,255,0.4);border:none;border-radius:1px;cursor:pointer;transition:all 0.35s}
.c-dot.active{background:#fff;width:40px}
.c-dot:hover{background:rgba(255,255,255,0.8)}

.c-arrow{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:50%;color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;backdrop-filter:blur(4px);transition:background 0.2s}
.c-arrow:hover{background:rgba(255,255,255,0.35)}
.c-arrow.prev{left:1.5rem}
.c-arrow.next{right:1.5rem}

/* ── Filter ── */
#filterBar{position:sticky;top:60px;z-index:998;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.05);padding:0.85rem 2.5rem;display:flex;justify-content:center;gap:0.4rem;flex-wrap:wrap}
.f-btn{background:transparent;border:1px solid rgba(0,0,0,0.09);color:#999;font-size:0.75rem;font-family:inherit;padding:0.35rem 0.9rem;letter-spacing:0.06em;border-radius:2px;cursor:pointer;transition:all 0.2s}
.f-btn:hover{border-color:#c8a96e;color:#c8a96e}
.f-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* ── Grid ── */
#photoGrid{padding:2.5rem 2rem 6rem;max-width:1560px;margin:0 auto;columns:3;column-gap:0.65rem}
@media(max-width:1100px){#photoGrid{columns:2}}
@media(max-width:580px){#photoGrid{columns:1;padding:1.5rem 1rem 5rem}}

.p-card{break-inside:avoid;margin-bottom:0.65rem;position:relative;overflow:hidden;border-radius:3px;cursor:pointer;opacity:0;transform:translateY(16px);transition:opacity 0.55s,transform 0.55s,box-shadow 0.3s}
.p-card.visible{opacity:1;transform:translateY(0)}
.p-card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.p-card img{width:100%;height:auto;display:block;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
.p-card:hover img{transform:scale(1.04)}
.p-info{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.65) 0%,transparent 50%);opacity:0;transition:opacity 0.3s;display:flex;flex-direction:column;justify-content:flex-end;padding:1.2rem}
.p-card:hover .p-info{opacity:1}
.p-ttl{font-family:'ZCOOL XiaoWei',serif;font-size:0.95rem;color:#fff;letter-spacing:0.08em}
.p-sub{font-size:0.7rem;color:rgba(255,255,255,0.65);margin-top:0.2rem;letter-spacing:0.04em}
.no-result{text-align:center;padding:5rem 2rem;color:#999;font-size:0.9rem;column-span:all;-webkit-column-span:all}

/* ── Lightbox ── */
#lightbox{position:fixed;inset:0;z-index:9999;background:rgba(255,255,255,0.97);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s}
#lightbox.active{opacity:1;pointer-events:all}
#lbImgWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:68px 80px 0;overflow:hidden;min-height:0;cursor:grab}
#lbImgWrap:active{cursor:grabbing}
#lbImg{max-width:100%;max-height:100%;object-fit:contain;border-radius:2px;transform:scale(0.96);opacity:0;transition:transform 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.4s;user-select:none;-webkit-user-drag:none}
#lbImg.loaded{transform:scale(1);opacity:1}
#lbBar{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 2rem 1.2rem;border-top:1px solid rgba(0,0,0,0.06);gap:1rem;flex-shrink:0}
.lb-info{flex:1;min-width:0}
#lbTitle{font-family:'ZCOOL XiaoWei',serif;font-size:1.05rem;letter-spacing:0.1em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#lbMeta{font-size:0.72rem;color:#999;margin-top:0.2rem;letter-spacing:0.04em}
.lb-actions{display:flex;align-items:center;gap:0.5rem;flex-shrink:0}
.lb-btn{width:38px;height:38px;background:transparent;border:1px solid rgba(0,0,0,0.1);border-radius:50%;color:#666;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.lb-btn:hover{border-color:#c8a96e;color:#c8a96e}
#lbClose{font-size:1.3rem}

/* ── Footer ── */
footer{text-align:center;padding:3.5rem 2rem;border-top:1px solid rgba(0,0,0,0.05);color:#999;font-size:0.72rem;letter-spacing:0.12em}
footer em{color:#c8a96e;font-style:normal}

/* ── Responsive ── */
@media(max-width:768px){
  #siteNav{padding:0 1.2rem}
  .nav-right{font-size:0.75rem;gap:1rem}
  .carousel-overlay{padding:2rem 1.5rem}
  .carousel-title{font-size:1.5rem}
  .c-arrow{width:40px;height:40px;font-size:1rem}
  .c-arrow.prev{left:0.75rem}
  .c-arrow.next{right:0.75rem}
  #lbImgWrap{padding:60px 0.75rem 0}
  #lbBar{padding:0.7rem 1rem 1rem}
  #lbTitle{font-size:0.95rem}
}
</style>
</head>
<body>

<div id="progressBar"></div>

<!-- Nav -->
<nav id="siteNav">
  <a href="/" class="logo">人闲桂花落</a>
  <div class="nav-right">
    <a href="#carousel">作品</a>
    <a href="#photoGrid">影集</a>
    <a href="admin.html" class="admin-btn">管理</a>
  </div>
</nav>

<!-- Carousel Banner -->
<section id="carousel">
  <div id="carouselTrack"></div>
  <button class="c-arrow prev" id="cPrev">&#8592;</button>
  <button class="c-arrow next" id="cNext">&#8594;</button>
  <div class="carousel-dots" id="carouselDots"></div>
</section>

<!-- Filter -->
<nav id="filterBar">
  <button class="f-btn active" data-cat="all">全部</button>
  <button class="f-btn" data-cat="city">城市</button>
  <button class="f-btn" data-cat="nature">自然</button>
  <button class="f-btn" data-cat="people">人物</button>
  <button class="f-btn" data-cat="arch">建筑</button>
  <button class="f-btn" data-cat="food">饮食</button>
</nav>

<!-- Grid -->
<main id="photoGrid"><p class="no-result">正在加载作品集...</p></main>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lbImgWrap">
    <img id="lbImg" src="" alt="" draggable="false">
  </div>
  <div id="lbBar">
    <div class="lb-info">
      <p id="lbTitle"></p>
      <p id="lbMeta"></p>
    </div>
    <div class="lb-actions">
      <button class="lb-btn" id="lbPrevBtn">&#8592;</button>
      <button class="lb-btn" id="lbNextBtn">&#8594;</button>
      <button class="lb-btn" id="lbClose">&#215;</button>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>人闲桂花落<em> · </em>夜静春山空<em> · </em>2024–2026</p>
</footer>

<script>
(function(){
  /* ── Data ── */
  var allPhotos = [
    {id:'001',filename:'hero-01.jpg',titleZh:'静',titleEn:'Stillness',category:'city',location:'杭州',year:2024,seq:1},
    {id:'002',filename:'gallery-02.jpg',titleZh:'痕',titleEn:'Trace',category:'nature',location:'杭州',year:2024,seq:2},
    {id:'003',filename:'gallery-03.jpg',titleZh:'暖',titleEn:'Warmth',category:'nature',location:'杭州',year:2024,seq:3},
    {id:'004',filename:'01.jpg',titleZh:'留',titleEn:'Remain',category:'city',location:'杭州',year:2024,seq:4},
    {id:'005',filename:'02.jpg',titleZh:'念',titleEn:'Memories',category:'people',location:'杭州',year:2024,seq:5}
  ];
  var IMG = 'https://raw.githubusercontent.com/46832632/photo-portfolio/main/images';

  /* ── State ── */
  var currentCat = 'all';
  var visiblePhotos = [];
  var carouselIdx = 0;
  var lbIdx = 0;
  var lbPhotos = [];
  var carouselTimer = null;

  /* ── DOM ── */
  var $ = function(id){return document.getElementById(id);};
  var grid = $('photoGrid');
  var track = $('carouselTrack');
  var dots = $('carouselDots');
  var lb = $('lightbox');
  var lbImgEl = $('lbImg');

  /* ── Init ── */
  allPhotos.sort(function(a,b){return (a.seq||999)-(b.seq||999);});
  buildCarousel();
  bindEvents();

  /* ── Carousel ── */
  function buildCarousel(){
    track.innerHTML = '';
    dots.innerHTML = '';
    for(var i=0;i<allPhotos.length;i++){
      var p = allPhotos[i];
      var slide = document.createElement('div');
      slide.className = 'carousel-slide' + (i===0?' active':'');
      slide.dataset.index = i;
      slide.onclick = function(e){e.stopPropagation(); openLbxFromAll(this.dataset.index);};
      slide.innerHTML =
        '<img src="'+IMG+'/'+p.filename+'?v=20260416" alt="'+p.titleZh+'" '+
        'loading="eager" fetchpriority="high" width="1600" height="1067">'+
        '<div class="carousel-overlay">'+
        '<p class="carousel-meta">'+(p.location||'')+(p.year?' · '+p.year:'')+'</p>'+
        '<h2 class="carousel-title">'+p.titleZh+'</h2>'+
        '<p class="carousel-sub">'+p.titleEn+'</p></div>';
      track.appendChild(slide);

      var dot = document.createElement('button');
      dot.className = 'c-dot' + (i===0?' active':'');
      dot.setAttribute('aria-label','第'+(i+1)+'张');
      dot.onclick = function(ev){ev.stopPropagation(); goCarousel(+this.dataset.i);};
      dot.dataset.i = i;
      dots.appendChild(dot);
    }
    startTimer();
  }

  function goCarousel(idx){
    var slides = track.querySelectorAll('.carousel-slide');
    var dotEls = dots.querySelectorAll('.c-dot');
    if(idx<0||idx>=slides.length) return;
    slides.forEach(function(s){s.classList.remove('active');});
    dotEls.forEach(function(d){d.classList.remove('active');d.style.width='';});
    slides[idx].classList.add('active');
    dotEls[idx].classList.add('active');
    dotEls[idx].style.width='40px';
    carouselIdx = idx;
    resetTimer();
  }

  function startTimer(){
    clearInterval(carouselTimer);
    carouselTimer = setInterval(function(){
      goCarousel((carouselIdx+1)%allPhotos.length);
    },4000);
  }
  function resetTimer(){startTimer();}

  /* ── Grid ── */
  function render(){
    visiblePhotos = currentCat==='all'?allPhotos:allPhotos.filter(function(p){return p.category===currentCat;});
    if(visiblePhotos.length===0){
      grid.innerHTML='<p class="no-result">暂无该分类作品</p>';
      return;
    }
    grid.innerHTML='';
    visiblePhotos.forEach(function(p,i){
      var card = document.createElement('div');
      card.className='p-card';
      card.style.transitionDelay=(i*55)+'ms';
      card.innerHTML=
        '<img src="'+IMG+'/'+p.filename+'?v=20260416" alt="'+p.titleZh+'" '+
        'loading="lazy" width="1600" height="1067">'+
        '<div class="p-info">'+
        '<p class="p-ttl">'+p.titleZh+'</p>'+
        '<p class="p-sub">'+(p.location||'')+(p.year?' · '+p.year:'')+'</p></div>';
      card.onclick=(function(idx){return function(){openLbx(idx);};})(i);
      grid.appendChild(card);
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){card.classList.add('visible');});
      });
    });
  }

  /* ── Filter ── */
  $('filterBar').onclick = function(e){
    if(!e.target.classList.contains('f-btn')) return;
    var cat = e.target.dataset.cat;
    currentCat = cat;
    [].forEach.call(document.querySelectorAll('.f-btn'),function(b){
      b.classList.toggle('active',b===e.target);
    });
    grid.style.opacity='0';
    setTimeout(function(){render();grid.style.opacity='1';},180);
  };

  /* ── Lightbox ── */
  function openLbx(idx){
    lbPhotos = visiblePhotos; lbIdx = idx; updateLbx();
    lb.classList.add('active');
    document.body.style.overflow='hidden';
  }

  function openLbxFromAll(idx){
    lbPhotos = allPhotos; lbIdx = idx; updateLbx();
    lb.classList.add('active');
    document.body.style.overflow='hidden';
  }

  function updateLbx(){
    var p = lbPhotos[lbIdx];
    lbImgEl.classList.remove('loaded');
    lbImgEl.src = IMG+'/'+p.filename+'?v=20260416';
    lbImgEl.onload = function(){lbImgEl.classList.add('loaded');};
    $('lbTitle').textContent = p.titleZh+' · '+p.titleEn;
    $('lbMeta').textContent = (p.location||'')+(p.year?' · '+p.year:'');
  }

  function lbNav(dir){
    lbIdx = (lbIdx+dir+lbPhotos.length)%lbPhotos.length;
    updateLbx();
  }

  function closeLbx(){
    lb.classList.remove('active');
    document.body.style.overflow='';
  }

  /* ── Events ── */
  function bindEvents(){
    $('cPrev').onclick = function(e){e.stopPropagation(); goCarousel((carouselIdx-1+allPhotos.length)%allPhotos.length);};
    $('cNext').onclick = function(e){e.stopPropagation(); goCarousel((carouselIdx+1)%allPhotos.length);};
    $('lbPrevBtn').onclick = function(){lbNav(-1);};
    $('lbNextBtn').onclick = function(){lbNav(1);};
    $('lbClose').onclick = closeLbx;
    lb.onclick = function(e){
      if(e.target===lb||e.target===$('lbImgWrap')) closeLbx();
    };
    document.onkeydown = function(e){
      if(!lb.classList.contains('active')) return;
      if(e.key==='Escape') closeLbx();
      if(e.key==='ArrowLeft') lbNav(-1);
      if(e.key==='ArrowRight') lbNav(1);
    };
    // Touch swipe on lightbox
    var tx=0;
    lb.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
    lb.addEventListener('touchend',function(e){
      var d=e.changedTouches[0].clientX-tx;
      if(Math.abs(d)>50) lbNav(d>0?-1:1);
    },{passive:true});
    // Progress bar
    window.addEventListener('scroll',function(){
      var st=window.scrollY;
      var docH=document.documentElement.scrollHeight-window.innerHeight;
      $('progressBar').style.width=(docH>0?(st/docH*100):0)+'%';
    },{passive:true});
    // Nav shadow
    var lastS=0;
    var nav=$('siteNav');
    window.addEventListener('scroll',function(){
      var s=window.scrollY;
      nav.classList.toggle('shadowed',s>4);
      nav.classList.toggle('hidden',s>lastS&&s>180);
      lastS=s;
    },{passive:true});
    // IntersectionObserver for grid cards
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting&&e.target.classList)e.target.classList.add('visible');});
    },{threshold:0.05,rootMargin:'0px 0px -40px 0px'});
    var mo=new MutationObserver(function(){
      [].forEach.call(grid.querySelectorAll('.p-card:not(.visible)'),function(c){obs.observe(c);});
    });
    mo.observe(grid,{childList:true,subtree:false});
  }
})();
</script>
</body>
</html>
