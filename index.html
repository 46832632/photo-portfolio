<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂花落 | Photography Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #fefefe;
            --bg-secondary: #faf9f7;
            --text-primary: #2c2a24;
            --text-secondary: #6b6560;
            --accent: #b08d57;
            --accent-light: #d4b896;
            --border: #e8e4df;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* 导航 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, var(--bg-primary) 0%, transparent 100%);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* 首屏 */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 6rem 2rem;
            position: relative;
        }

        .hero-content {
            max-width: 600px;
        }

        .hero h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 400;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .hero .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .hero .poetic-line {
            font-size: 1rem;
            font-weight: 300;
            font-style: italic;
            color: var(--accent);
            letter-spacing: 0.1em;
            margin-bottom: 4rem;
            opacity: 0.8;
        }

        .scroll-hint {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        /* 分类区域 */
        .categories {
            padding: 8rem 4rem;
            background-color: var(--bg-secondary);
        }

        .section-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
        }

        .section-header p {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-card {
            position: relative;
            aspect-ratio: 4/5;
            background-color: var(--bg-primary);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }

        .category-card .image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e8e4df 0%, #d4cfc8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-card .image-placeholder::after {
            content: '照片';
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
        }

        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .category-card:hover img {
            transform: scale(1.05);
        }

        .category-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(to top, rgba(44,42,36,0.9) 0%, transparent 100%);
            color: var(--bg-primary);
        }

        .category-info h3 {
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
        }

        .category-info .poetic-name {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            opacity: 0.7;
        }

        /* 页脚 */
        footer {
            padding: 4rem;
            text-align: center;
            background-color: var(--bg-primary);
            border-top: 1px solid var(--border);
        }

        footer p {
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
        }

        footer .social-links {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        footer .social-links a {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        footer .social-links a:hover {
            color: var(--accent);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 2rem;
            }

            .nav-links {
                display: none;
            }

            .hero {
                padding: 5rem 1.5rem;
            }

            .hero h1 {
                font-size: 2rem;
                letter-spacing: 0.2em;
            }

            .categories {
                padding: 5rem 1.5rem;
            }

            .category-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            footer {
                padding: 3rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav>
        <a href="#" class="logo">桂花<span>落</span></a>
        <ul class="nav-links">
            <li><a href="#works">作品</a></li>
            <li><a href="#about">关于</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>
    </nav>

    <!-- 首屏 -->
    <section class="hero">
        <div class="hero-content">
            <h1>桂花落</h1>
            <p class="subtitle">人闲桂花落，夜静春山空</p>
            <p class="poetic-line">月出惊山鸟，时鸣春涧中</p>
        </div>
        <div class="scroll-hint">SCROLL</div>
    </section>

    <!-- 分类展示 -->
    <section class="categories" id="works">
        <div class="section-header">
            <h2>作品集</h2>
            <p>WORKS COLLECTION</p>
        </div>
        
        <div class="category-grid">
            <div class="category-card">
                <img src="images/nature-2.jpg" alt="自然">
                <div class="category-info">
                    <h3>自然</h3>
                    <p class="poetic-name">碧海蓝天间 · NATURE</p>
                </div>
            </div>
            
            <div class="category-card">
                <img src="images/nature-1.jpg" alt="自然">
                <div class="category-info">
                    <h3>自然</h3>
                    <p class="poetic-name">一跃入清凉 · NATURE</p>
                </div>
            </div>
            
            <div class="category-card">
                <img src="images/portrait-1.jpg" alt="人物">
                <div class="category-info">
                    <h3>人物</h3>
                    <p class="poetic-name">冰雪映红颜 · PORTRAIT</p>
                </div>
            </div>
            
            <div class="category-card">
                <img src="images/nature-3.jpg" alt="自然">
                <div class="category-info">
                    <h3>自然</h3>
                    <p class="poetic-name">枯木卧白沙 · NATURE</p>
                </div>
            </div>
            
            <div class="category-card">
                <img src="images/nature-4.jpg" alt="自然">
                <div class="category-info">
                    <h3>自然</h3>
                    <p class="poetic-name">剑指苍穹处 · NATURE</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 桂花落 · Photography Portfolio</p>
        <div class="social-links">
            <a href="#">微信</a>
            <a href="#">微博</a>
            <a href="#">Instagram</a>
        </div>
    </footer>
</body>
</html>
