<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>桂花落 · Photography</title>
  <meta name="description" content="人闲桂花落，夜静春山空 — 个人摄影作品集">
  <meta name="theme-color" content="#faf9f7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --bg-card: #f3f2ef;
      --text: #2c2c2c;
      --text-dim: #999;
      --accent: #8b7355;
      --border: rgba(0,0,0,0.06);
      --serif: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:var(--serif);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    ::selection{background:var(--accent);color:#fff}

    /* ── Nav ── */
    header{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(250,249,247,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:transform .4s ease}
    header.hidden{transform:translateY(-100%)}
    .logo{font-size:.95rem;font-weight:400;color:var(--text);text-decoration:none;letter-spacing:.35em}
    nav{display:flex;gap:2rem}
    nav a{font-size:.78rem;color:var(--text-dim);text-decoration:none;letter-spacing:.18em;transition:color .2s;position:relative}
    nav a:hover{color:var(--text)}
    nav a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--accent);transition:width .3s ease}
    nav a:hover::after{width:100%}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;width:22px;height:16px;position:relative}
    .menu-btn span{display:block;width:100%;height:1px;background:var(--text);position:absolute;left:0;transition:all .3s}
    .menu-btn span:nth-child(1){top:0}
    .menu-btn span:nth-child(2){top:50%}
    .menu-btn span:nth-child(3){bottom:0}
    .menu-btn.active span:nth-child(1){top:50%;transform:rotate(45deg)}
    .menu-btn.active span:nth-child(2){opacity:0}
    .menu-btn.active span:nth-child(3){bottom:50%;transform:rotate(-45deg)}

    /* ── Hero ── */
    .hero{height:100vh;position:relative;overflow:hidden;background:#1a1a1a}
    .hero-img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 1.2s ease}
    .hero-img.loaded{opacity:1}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,transparent 40%,transparent 55%,rgba(0,0,0,.35) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:4rem}
    .hero-title{font-family:var(--serif);font-size:clamp(2rem,5vw,3.8rem);font-weight:300;color:#fff;letter-spacing:.5em;text-indent:.5em;opacity:0;transform:translateY(24px);animation:fadeUp .9s ease .4s forwards}
    .hero-sub{font-size:.82rem;font-weight:300;color:rgba(255,255,255,.6);letter-spacing:.3em;margin-top:.6rem;opacity:0;transform:translateY(24px);animation:fadeUp .9s ease .7s forwards}
    .scroll-line{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);width:1px;height:44px;background:linear-gradient(to bottom,rgba(255,255,255,.5),transparent);animation:pulse 2.2s ease-in-out infinite}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}

    /* ── Gallery ── */
    .gallery{padding:5rem 2.5rem 6rem;max-width:1400px;margin:0 auto}
    .section-label{font-size:.72rem;color:var(--text-dim);letter-spacing:.35em;margin-bottom:2.5rem}
    .photo-grid{column-count:3;column-gap:1.2rem}
    .photo-item{break-inside:avoid;margin-bottom:1.2rem;position:relative;overflow:hidden;border-radius:2px;cursor:pointer;background:var(--bg-card);opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
    .photo-item.show{opacity:1;transform:translateY(0)}
    .photo-item img{width:100%;display:block;transition:transform .7s cubic-bezier(.25,.46,.45,.94)}
    .photo-item:hover img{transform:scale(1.025)}
    .photo-item .cap{position:absolute;inset:0;background:rgba(0,0,0,.25);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:1.3rem}
    .photo-item:hover .cap{opacity:1}
    .cap-title{font-size:1.05rem;font-weight:300;color:#fff;letter-spacing:.2em}
    .cap-meta{font-size:.68rem;color:rgba(255,255,255,.55);letter-spacing:.1em;margin-top:.25rem}

    /* ── About ── */
    .about{padding:6rem 2.5rem 8rem;max-width:640px;margin:0 auto;border-top:1px solid var(--border)}
    .about p{font-size:.92rem;font-weight:300;line-height:2.2;color:#555}

    /* ── Footer ── */
    footer{padding:2.5rem;text-align:center;border-top:1px solid var(--border)}
    footer p{font-size:.7rem;color:var(--text-dim);letter-spacing:.15em}

    /* ── Lightbox ── */
    .lb{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.97);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s ease}
    .lb.on{opacity:1;pointer-events:all}
    .lb img{max-width:92vw;max-height:90vh;object-fit:contain;transform:scale(.96);transition:transform .35s ease}
    .lb.on img{transform:scale(1)}
    .lb-x{position:absolute;top:1.5rem;right:2rem;font-size:1.3rem;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer;transition:color .2s;font-family:var(--serif)}
    .lb-x:hover{color:#fff}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:1.8rem;color:rgba(255,255,255,.25);background:none;border:none;cursor:pointer;transition:color .2s;padding:2rem;font-family:var(--serif)}
    .lb-nav:hover{color:rgba(255,255,255,.7)}
    .lb-prev{left:0}
    .lb-next{right:0}
    .lb-info{position:absolute;bottom:1.8rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:.7rem;letter-spacing:.15em;white-space:nowrap}

    /* ── Responsive ── */
    @media(max-width:1024px){.photo-grid{column-count:2}}
    @media(max-width:640px){
      header{padding:1rem 1.5rem}
      .hero-overlay{padding:2rem}
      .photo-grid{column-count:1;column-gap:0}
      .gallery{padding:3rem 1.5rem 4rem}
      .about{padding:4rem 1.5rem 6rem}
      .menu-btn{display:block}
      nav{position:fixed;top:0;right:0;width:180px;height:100vh;background:var(--bg);flex-direction:column;padding:5rem 2rem;gap:1.5rem;transform:translateX(100%);transition:transform .3s ease;border-left:1px solid var(--border)}
      nav.open{transform:translateX(0)}
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">桂花落</a>
    <button class="menu-btn" aria-label="菜单"><span></span><span></span><span></span></button>
    <nav>
      <a href="#works">作品</a>
      <a href="#about">关于</a>
    </nav>
  </header>

  <section class="hero">
    <img class="hero-img" src="images/hero-01.jpg" alt="桂花落" fetchpriority="high"
         onload="this.classList.add('loaded')">
    <div class="hero-overlay">
      <h1 class="hero-title">桂花落</h1>
      <p class="hero-sub">人闲桂花落，夜静春山空</p>
    </div>
    <div class="scroll-line"></div>
  </section>

  <section class="gallery" id="works">
    <p class="section-label">作 品</p>
    <div class="photo-grid" id="grid"></div>
  </section>

  <section class="about" id="about">
    <p class="section-label">关 于</p>
    <p>
      用镜头记录安静的时刻。<br>
      山间落花，城中留影，人间温暖。<br><br>
      人闲桂花落，夜静春山空。<br>
      月出惊山鸟，时鸣春涧中。
    </p>
  </section>

  <footer>
    <p>© 2026 桂花落 · Photography</p>
  </footer>

  <div class="lb" id="lb">
    <button class="lb-x" aria-label="关闭">✕</button>
    <button class="lb-nav lb-prev" aria-label="上一张">‹</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-nav lb-next" aria-label="下一张">›</button>
    <div class="lb-info" id="lbInfo"></div>
  </div>

  <script>
  const P=[
    {s:'images/gallery-02.jpg',t:'痕',en:'Trace',loc:'自然',y:'2026'},
    {s:'images/gallery-03.jpg',t:'暖',en:'Warmth',loc:'自然',y:'2026'},
    {s:'images/01.jpg',t:'留',en:'Remain',loc:'城市',y:'2026'},
    {s:'images/02.jpg',t:'念',en:'Memories',loc:'人物',y:'2026'}
  ];
  const g=document.getElementById('grid');
  P.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='photo-item';
    d.innerHTML=`<img src="${p.s}" alt="${p.t} · ${p.en}" loading="lazy" decoding="async"><div class="cap"><div><div class="cap-title">${p.t} · ${p.en}</div><div class="cap-meta">${p.loc} / ${p.y}</div></div></div>`;
    d.onclick=()=>openLb(i);
    g.appendChild(d);
  });
  // scroll reveal
  const io=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('show');io.unobserve(x.target)}})},{threshold:.08,rootMargin:'40px'});
  document.querySelectorAll('.photo-item').forEach((el,i)=>{el.style.transitionDelay=`${i*80}ms`;io.observe(el)});
  // lightbox
  let ci=0;
  const lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbInfo=document.getElementById('lbInfo');
  function openLb(i){ci=i;updLb();lb.classList.add('on');document.body.style.overflow='hidden'}
  function closeLb(){lb.classList.remove('on');document.body.style.overflow=''}
  function updLb(){const p=P[ci];lbImg.src=p.s;lbImg.alt=p.t;lbInfo.textContent=`${p.t} · ${p.en}  —  ${p.loc} / ${p.y}`}
  document.querySelector('.lb-x').onclick=closeLb;
  document.querySelector('.lb-prev').onclick=()=>{ci=(ci-1+P.length)%P.length;updLb()};
  document.querySelector('.lb-next').onclick=()=>{ci=(ci+1)%P.length;updLb()};
  lb.onclick=e=>{if(e.target===lb)closeLb()};
  document.onkeydown=e=>{if(!lb.classList.contains('on'))return;if(e.key==='Escape')closeLb();if(e.key==='ArrowLeft'){ci=(ci-1+P.length)%P.length;updLb()}if(e.key==='ArrowRight'){ci=(ci+1)%P.length;updLb()}};
  let tx=0;lb.ontouchstart=e=>{tx=e.touches[0].clientX};lb.ontouchend=e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){d>0?ci=(ci-1+P.length)%P.length:ci=(ci+1)%P.length;updLb()}};
  // auto-hide nav
  let ls=0;const hd=document.querySelector('header');
  window.onscroll=()=>{const s=window.scrollY;hd.classList.toggle('hidden',s>ls&&s>80);ls=s};
  // mobile menu
  const mb=document.querySelector('.menu-btn'),nv=document.querySelector('nav');
  mb.onclick=()=>{mb.classList.toggle('active');nv.classList.toggle('open')};
  nv.querySelectorAll('a').forEach(a=>a.onclick=()=>{mb.classList.remove('active');nv.classList.remove('open')});
  </script>
</body>
</html>
