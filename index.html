<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>桂花落 · Photography</title>
  <meta name="description" content="人闲桂花落，夜静春山空">
  <meta name="theme-color" content="#faf9f7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --text: #2c2c2c;
      --text-dim: #999;
      --accent: #8b7355;
      --border: rgba(0,0,0,0.06);
      --serif: 'Noto Serif SC', 'Songti SC', serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;scroll-snap-type:y mandatory}
    body{font-family:var(--serif);background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    ::selection{background:var(--accent);color:#fff}

    /* Nav */
    header{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(250,249,247,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:transform .4s ease}
    header.hidden{transform:translateY(-100%)}
    .logo{font-size:.95rem;font-weight:400;color:var(--text);text-decoration:none;letter-spacing:.35em}
    nav{display:flex;gap:2rem}
    nav a{font-size:.78rem;color:var(--text-dim);text-decoration:none;letter-spacing:.18em;transition:color .2s;position:relative}
    nav a:hover{color:var(--text)}
    nav a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--accent);transition:width .3s ease}
    nav a:hover::after{width:100%}

    /* Hero -纯文字 */
    .hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;scroll-snap-align:start;position:relative}
    .hero-title{font-size:clamp(2.5rem,8vw,5rem);font-weight:300;color:var(--text);letter-spacing:.5em;text-indent:.5em;opacity:0;transform:translateY(30px);animation:fadeUp 1s ease .3s forwards}
    .hero-sub{font-size:.85rem;font-weight:300;color:var(--text-dim);letter-spacing:.3em;margin-top:1rem;opacity:0;transform:translateY(30px);animation:fadeUp 1s ease .6s forwards}
    .scroll-hint{position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--text-dim);letter-spacing:.15em;opacity:0;animation:fadeUp 1s ease .9s forwards}
    .scroll-hint::before{content:'';display:block;width:1px;height:40px;background:var(--accent);margin:0 auto .5rem;opacity:.3}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

    /* Photo Sections */
    .photo-section{min-height:100vh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;padding:4rem;position:relative;opacity:0;transform:translateY(60px);transition:opacity .8s ease,transform .8s ease}
    .photo-section.show{opacity:1;transform:translateY(0)}
    .photo-section img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:2px;cursor:pointer;transition:transform .4s ease}
    .photo-section img:hover{transform:scale(1.01)}
    .photo-caption{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity .5s ease .3s}
    .photo-section.show .photo-caption{opacity:1}
    .photo-title{font-size:1.1rem;font-weight:300;letter-spacing:.2em}
    .photo-meta{font-size:.72rem;color:var(--text-dim);margin-top:.3rem;letter-spacing:.1em}

    /* Footer */
    footer{padding:3rem;text-align:center;border-top:1px solid var(--border)}
    footer p{font-size:.7rem;color:var(--text-dim);letter-spacing:.15em}

    /* Lightbox */
    .lb{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.97);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s ease}
    .lb.on{opacity:1;pointer-events:all}
    .lb img{max-width:90vw;max-height:90vh;object-fit:contain}
    .lb-x{position:absolute;top:1.5rem;right:2rem;font-size:1.3rem;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer;font-family:var(--serif)}
    .lb-x:hover{color:#fff}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:1.8rem;color:rgba(255,255,255,.25);background:none;border:none;cursor:pointer;padding:2rem;font-family:var(--serif)}
    .lb-nav:hover{color:rgba(255,255,255,.7)}
    .lb-prev{left:0}
    .lb-next{right:0}
    .lb-info{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:.72rem;letter-spacing:.15em}

    /* Responsive */
    @media(max-width:640px){
      header{padding:1rem 1.5rem}
      .hero-title{letter-spacing:.35em}
      .photo-section{padding:2rem}
    }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo">桂花落</a>
    <nav>
      <a href="#p1">作品</a>
      <a href="#about">关于</a>
    </nav>
  </header>

  <section class="hero" id="hero">
    <h1 class="hero-title">桂花落</h1>
    <p class="hero-sub">人闲桂花落，夜静春山空</p>
    <p class="scroll-hint">向下滑动</p>
  </section>

  <section class="photo-section" id="p1" data-index="0">
    <img src="images/gallery-02.jpg" alt="痕 · Trace" loading="lazy">
    <div class="photo-caption">
      <p class="photo-title">痕 · Trace</p>
      <p class="photo-meta">自然 / 2026</p>
    </div>
  </section>

  <section class="photo-section" id="p2" data-index="1">
    <img src="images/gallery-03.jpg" alt="暖 · Warmth" loading="lazy">
    <div class="photo-caption">
      <p class="photo-title">暖 · Warmth</p>
      <p class="photo-meta">自然 / 2026</p>
    </div>
  </section>

  <section class="photo-section" id="p3" data-index="2">
    <img src="images/01.jpg" alt="留 · Remain" loading="lazy">
    <div class="photo-caption">
      <p class="photo-title">留 · Remain</p>
      <p class="photo-meta">城市 / 2026</p>
    </div>
  </section>

  <section class="photo-section" id="p4" data-index="3">
    <img src="images/02.jpg" alt="念 · Memories" loading="lazy">
    <div class="photo-caption">
      <p class="photo-title">念 · Memories</p>
      <p class="photo-meta">人物 / 2026</p>
    </div>
  </section>

  <section class="photo-section" id="about">
    <div style="text-align:center;max-width:500px">
      <p style="font-size:.92rem;line-height:2.2;color:#555;margin-bottom:2rem">
        用镜头记录安静的时刻。<br>
        山间落花，城中留影，人间温暖。
      </p>
      <p style="font-size:.8rem;color:var(--text-dim);letter-spacing:.2em">
        人闲桂花落，夜静春山空<br>
        月出惊山鸟，时鸣春涧中
      </p>
    </div>
  </section>

  <footer>
    <p>© 2026 桂花落 · Photography</p>
  </footer>

  <div class="lb" id="lb">
    <button class="lb-x">✕</button>
    <button class="lb-nav lb-prev">‹</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-nav lb-next">›</button>
    <div class="lb-info" id="lbInfo"></div>
  </div>

  <script>
    const photos=[
      {s:'images/gallery-02.jpg',t:'痕',en:'Trace',loc:'自然',y:'2026'},
      {s:'images/gallery-03.jpg',t:'暖',en:'Warmth',loc:'自然',y:'2026'},
      {s:'images/01.jpg',t:'留',en:'Remain',loc:'城市',y:'2026'},
      {s:'images/02.jpg',t:'念',en:'Memories',loc:'人物',y:'2026'}
    ];

    // Scroll reveal
    const sections=document.querySelectorAll('.photo-section');
    const io=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('show');io.unobserve(x.target)}})},{threshold:.3,rootMargin:'0px'});
    sections.forEach(s=>io.observe(s));

    // Auto-hide nav
    let ls=0;
    window.onscroll=()=>{const s=window.scrollY;
      document.querySelector('header').classList.toggle('hidden',s>ls&&s>100);
      ls=s};

    // Lightbox
    let ci=0;
    const lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbInfo=document.getElementById('lbInfo');
    function open(i){ci=i;lbImg.src=photos[i].s;lbInfo.textContent=photos[i].t+' · '+photos[i].en+' — '+photos[i].loc+' / '+photos[i].y;lb.classList.add('on');document.body.style.overflow='hidden'}
    function close(){lb.classList.remove('on');document.body.style.overflow=''}
    document.querySelector('.lb-x').onclick=close;
    document.querySelector('.lb-prev').onclick=()=>{ci=(ci-1+photos.length)%photos.length;open(ci)};
    document.querySelector('.lb-next').onclick=()=>{ci=(ci+1)%photos.length;open(ci)};
    lb.onclick=e=>{if(e.target===lb)close()};
    document.onkeydown=e=>{if(!lb.classList.contains('on'))return;
      if(e.key==='Escape')close();
      if(e.key==='ArrowLeft'){ci=(ci-1+photos.length)%photos.length;open(ci)}
      if(e.key==='ArrowRight'){ci=(ci+1)%photos.length;open(ci)}};
    let tx=0;lb.ontouchstart=e=>{tx=e.touches[0].clientX};
    lb.ontouchend=e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){d>0?ci=(ci-1+photos.length)%photos.length:ci=(ci+1)%photos.length;open(ci)}};

    // Click photo to open
    document.querySelectorAll('.photo-section img').forEach((img,i)=>{img.onclick=()=>open(i)});
  </script>
</body>
</html>
