<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>春涧 · Photography</title>
  <meta name="description" content="人闲桂花落，夜静春山空 · 个人摄影作品">
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+SC:wght@300;400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #111;
      --dim: #999;
      --light: #ccc;
      --accent: #b08d57;
      --border: rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
    body { font-family: 'Noto Serif SC', serif; background: #fff; color: var(--text); overflow-x: hidden; }

    /* Header */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 2.5rem;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.1rem; color: var(--text);
      text-decoration: none; letter-spacing: 0.25em;
    }
    .nav-links { list-style: none; display: flex; gap: 2rem; }
    .nav-links a {
      font-size: 0.75rem; color: var(--dim); text-decoration: none;
      letter-spacing: 0.12em; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .progress-bar {
      position: fixed; top: 0; left: 0; height: 2px;
      background: var(--accent); z-index: 300;
      width: 0; transition: width 0.1s linear;
    }

    /* Photo pages */
    .photo-page {
      height: 100vh; scroll-snap-align: start;
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }
    .photo-wrap {
      flex: 1; overflow: hidden; position: relative;
    }
    .photo-wrap img {
      width: 100%; height: 100%; object-fit: contain;
      display: block; cursor: zoom-in;
      transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .photo-wrap img:hover { transform: scale(1.02); }
    .photo-meta {
      padding: 1.2rem 2.5rem 1.8rem;
      display: flex; align-items: baseline;
      gap: 1.5rem; border-top: 1px solid var(--border);
      min-height: 64px;
    }
    .photo-title-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 300; font-style: italic;
      color: var(--text); letter-spacing: 0.06em;
      min-width: 160px;
    }
    .photo-location, .photo-year {
      font-size: 0.72rem; color: var(--dim); letter-spacing: 0.12em;
    }
    .photo-sep { color: var(--light); font-size: 0.7rem; }

    /* Loading */
    .loading-screen {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
    }
    .loading-screen p { font-size: 0.8rem; color: var(--dim); letter-spacing: 0.2em; }

    /* Footer */
    .site-footer {
      min-height: 100vh; scroll-snap-align: start;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.8rem;
      padding: 5rem 2rem; text-align: center;
      border-top: 1px solid var(--border);
    }
    .footer-title {
      font-family: 'ZCOOL XiaoWei', serif; font-size: 1.3rem;
      letter-spacing: 0.4em; color: var(--text); text-indent: 0.4em;
    }
    .footer-verse {
      font-size: 0.75rem; color: var(--light); letter-spacing: 0.15em;
    }
    .footer-admin {
      margin-top: 2rem;
      font-size: 0.7rem; color: var(--dim); text-decoration: none;
      letter-spacing: 0.1em; border-bottom: 1px solid var(--border);
      padding-bottom: 1px; transition: all 0.2s;
    }
    .footer-admin:hover { color: var(--accent); border-color: var(--accent); }
    .footer-count {
      font-size: 0.7rem; color: var(--light); letter-spacing: 0.15em;
    }

    /* Page indicator */
    .page-indicator {
      position: fixed; right: 2rem; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 0.5rem; z-index: 200;
    }
    .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--light); cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active { background: var(--accent); height: 16px; border-radius: 2px; }

    /* Mobile */
    @media (max-width: 768px) {
      header { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .photo-meta { padding: 1rem 1.5rem 1.4rem; flex-wrap: wrap; gap: 0.5rem; }
      .photo-title-en { font-size: 0.95rem; min-width: unset; }
      .page-indicator { display: none; }
    }
  
    /* Hero overlay title */
    .hero-overlay {
      position: fixed;
      bottom: 4.5rem; left: 0; right: 0;
      z-index: 150;
      display: flex; flex-direction: column; align-items: center;
      gap: 0.6rem;
      padding: 2.5rem 2rem;
      background: linear-gradient(transparent, rgba(255,255,255,0.7));
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .hero-overlay[style], #heroOverlay[style] { transition: none !important; }
    .hero-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 300;
      color: #111;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
    }
    .hero-sub {
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.25em;
    }
    .hero-scroll-hint {
      position: fixed;
      bottom: 2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem;
      color: var(--light);
      letter-spacing: 0.25em;
      text-transform: lowercase;
      transition: opacity 0.6s ease;
    }
    .hero-scroll-hint::before {
      content: '';
      display: block;
      width: 1px; height: 2rem;
      background: var(--light);
      margin: 0 auto 0.5rem;
    }
    @media (max-width: 768px) {
      .hero-overlay { bottom: 3.5rem; padding: 1.5rem 1rem; }
      .hero-title { font-size: clamp(1.3rem, 6vw, 2rem); }
      .hero-scroll-hint { bottom: 1.5rem; }
    }

</style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<header>
  <a href="#" class="logo">春涧</a>
  <ul class="nav-links">
    <li><a href="#" onclick="scrollToPage(0);return false;">Home</a></li>
  </ul>
</header>
  <div class="hero-overlay" id="heroOverlay">
    <div class="hero-text">
      <h1 class="hero-title">人闲桂花落</h1>
      <p class="hero-sub">夜静春山空</p>
    </div>
    <div class="hero-scroll-hint" id="heroHint">
      <span>scroll</span>
    </div>
  </div>

<div id="photoContainer">
    <section class="photo-page" id="page0" data-index="0">
      <div class="photo-wrap">
        <img src="https://raw.githubusercontent.com/46832632/photo-portfolio/main/images/hero-01.jpg" alt="Stillness" loading="eager"
             onerror="this.parentElement.style.display='none'">
      </div>
      <div class="photo-meta">
        <span class="photo-title-en">Stillness</span><span class="photo-sep">&#183;</span><span class="photo-year">2026</span>
      </div>
    </section>
    <section class="photo-page" id="page1" data-index="1">
      <div class="photo-wrap">
        <img src="https://raw.githubusercontent.com/46832632/photo-portfolio/main/images/gallery-02.jpg" alt="Trace" loading="eager"
             onerror="this.parentElement.style.display='none'">
      </div>
      <div class="photo-meta">
        <span class="photo-title-en">Trace</span><span class="photo-sep">&#183;</span><span class="photo-year">2026</span>
      </div>
    </section>
    <section class="photo-page" id="page2" data-index="2">
      <div class="photo-wrap">
        <img src="https://raw.githubusercontent.com/46832632/photo-portfolio/main/images/gallery-03.jpg" alt="Warmth" loading="lazy"
             onerror="this.parentElement.style.display='none'">
      </div>
      <div class="photo-meta">
        <span class="photo-title-en">Warmth</span><span class="photo-sep">&#183;</span><span class="photo-year">2026</span>
      </div>
    </section>
    <section class="photo-page" id="page3" data-index="3">
      <div class="photo-wrap">
        <img src="https://raw.githubusercontent.com/46832632/photo-portfolio/main/images/01.jpg" alt="Remain" loading="lazy"
             onerror="this.parentElement.style.display='none'">
      </div>
      <div class="photo-meta">
        <span class="photo-title-en">Remain</span><span class="photo-sep">&#183;</span><span class="photo-year">2026</span>
      </div>
    </section>
    <section class="photo-page" id="page4" data-index="4">
      <div class="photo-wrap">
        <img src="https://raw.githubusercontent.com/46832632/photo-portfolio/main/images/02.jpg" alt="Memories" loading="lazy"
             onerror="this.parentElement.style.display='none'">
      </div>
      <div class="photo-meta">
        <span class="photo-title-en">Memories</span><span class="photo-sep">&#183;</span><span class="photo-year">2026</span>
      </div>
    </section>
</div>

<div class="page-indicator" id="pageIndicator"><div class="dot active" onclick="scrollToPage(0)"></div><div class="dot" onclick="scrollToPage(1)"></div><div class="dot" onclick="scrollToPage(2)"></div><div class="dot" onclick="scrollToPage(3)"></div><div class="dot" onclick="scrollToPage(4)"></div></div> id="pageIndicator"><div class="dot active" onclick="scrollToPage(0)"></div><div class="dot" onclick="scrollToPage(1)"></div><div class="dot" onclick="scrollToPage(2)"></div><div class="dot" onclick="scrollToPage(3)"></div><div class="dot" onclick="scrollToPage(4)"></div></div>

<section class="site-footer">
  <p class="footer-title">人闲桂花落</p>
  <p class="footer-verse">夜静春山空 · 月出惊山鸟</p>
  <p class="footer-count" id="footerCount">5 works</p>
  <a href="admin.html" class="footer-admin">Admin →</a>
</section>


<script>(function(){
  var currentPage = 0;
  var isScrolling = false;
  var scrollTimeout = null;
  var totalPages = 0;

  function getPages(){
    return document.querySelectorAll('.photo-page');
  }
  function getDots(){
    return document.querySelectorAll('.dot');
  }
  function getFooter(){
    return document.querySelector('.site-footer');
  }
  function getOverlay(){
    return document.getElementById('heroOverlay');
  }
  function getHint(){
    return document.getElementById('heroHint');
  }
  function getBar(){
    return document.getElementById('progressBar');
  }

  function updateUI(idx){
    var pages = getPages();
    var dots = getDots();
    var n = pages.length;
    if(n === 0) return;
    if(idx < 0) idx = 0;
    if(idx >= n) idx = n - 1;
    currentPage = idx;

    for(var j=0;j<dots.length;j++){
      dots[j].classList.toggle('active', j===currentPage);
    }

    // Progress bar
    var bar = getBar();
    if(bar) bar.style.width = (n>0 ? (currentPage/(n-1)*100) : 0) + '%';

    // Hide hero overlay once scrolled past page 0
    var overlay = getOverlay();
    var hint = getHint();
    if(overlay){
      overlay.style.opacity = (currentPage === 0) ? '1' : '0';
      overlay.style.pointerEvents = (currentPage === 0) ? 'auto' : 'none';
    }
    if(hint){
      hint.style.opacity = (currentPage === 0) ? '1' : '0';
    }
  }

  // ---- IntersectionObserver for reliable snap ----
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting && entry.intersectionRatio >= 0.5){
        var idx = parseInt(entry.target.getAttribute('data-index') || '0', 10);
        updateUI(idx);
      }
    });
  },{
    root: null,
    threshold: 0.5
  });

  function observePages(){
    var pages = getPages();
    totalPages = pages.length;
    observer.disconnect();
    for(var i=0;i<pages.length;i++){
      observer.observe(pages[i]);
    }
    updateUI(0);
  }

  // ---- Wheel snap (prevent over-scroll from going too far) ----
  var lastWheelTime = 0;
  var wheelBusy = false;

  document.addEventListener('wheel', function(e){
    var now = Date.now();
    if(now - lastWheelTime < 900) return; // debounce 900ms
    var pages = getPages();
    if(pages.length === 0) return;

    var direction = e.deltaY > 0 ? 1 : -1;
    var nextIdx = currentPage + direction;
    if(nextIdx < 0 || nextIdx >= pages.length) return;

    e.preventDefault();
    lastWheelTime = now;
    wheelBusy = true;
    pages[nextIdx].scrollIntoView({behavior: 'smooth', block: 'start'});

    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(function(){
      wheelBusy = false;
    }, 900);
  }, {passive: false});

  // ---- Touch swipe support ----
  var touchStartY = 0;
  document.addEventListener('touchstart', function(e){
    touchStartY = e.touches[0].clientY;
  }, {passive: true});

  document.addEventListener('touchend', function(e){
    var pages = getPages();
    if(pages.length === 0) return;
    var delta = touchStartY - e.changedTouches[0].clientY;
    if(Math.abs(delta) < 50) return;
    var nextIdx = currentPage + (delta > 0 ? 1 : -1);
    nextIdx = Math.max(0, Math.min(nextIdx, pages.length - 1));
    if(nextIdx !== currentPage){
      pages[nextIdx].scrollIntoView({behavior: 'smooth', block: 'start'});
    }
  }, {passive: true});

  // ---- Scroll to page (for dots) ----
  window.scrollToPage = function(idx){
    var pages = getPages();
    if(!pages[idx]) return;
    pages[idx].scrollIntoView({behavior: 'smooth', block: 'start'});
  };

  // ---- Initial setup ----
  window.addEventListener('scroll', function(){
    if(wheelBusy) return;
    var st = window.scrollY;
    var pages = getPages();
    var n = pages.length;
    if(n === 0) return;
    var docH = document.documentElement.scrollHeight - window.innerHeight;
    var bar = getBar();
    if(bar) bar.style.width = (docH > 0 ? (st/docH*100) : 0) + '%';
    // Also sync dot
    var active = 0;
    for(var i=0;i<n;i++){
      if(pages[i].offsetTop <= st + 5) active = i;
    }
    var dots = getDots();
    for(var j=0;j<dots.length;j++){
      dots[j].classList.toggle('active', j===active);
    }
  }, {passive: true});

  // Observe when DOM changes
  observePages();
  var mutationObs = new MutationObserver(function(){
    observePages();
  });
  mutationObs.observe(document.getElementById('photoContainer') || document.body, {childList: true, subtree: true});

  updateUI(0);
})();</script>
</body>
</html>
