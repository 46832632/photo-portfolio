<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人闲桂花落 · 夜静春山空</title>
  <meta name="description" content="个人摄影作品集">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    :root{--bg:#fff;--text:#1a1a1a;--dim:#888;--light:#aaa;--accent:#c9a84c}
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;scroll-snap-type:y mandatory}
    body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);line-height:1.8}
    
    header{position:fixed;top:0;left:0;right:0;padding:1.2rem 2.5rem;display:flex;justify-content:space-between;align-items:center;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,.06)}
    .logo{font-size:1rem;letter-spacing:.2em;color:var(--text);text-decoration:none}
    .nav-info{font-size:.8rem;color:var(--dim);letter-spacing:.1em}
    
    .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem;scroll-snap-align:start}
    .hero-title{font-size:clamp(2rem,6vw,4rem);font-weight:400;letter-spacing:.3em;margin-bottom:1rem}
    .hero-subtitle{font-size:1rem;color:var(--dim);letter-spacing:.4em}
    .scroll-hint{position:absolute;bottom:3rem;color:var(--light);font-size:.7rem;letter-spacing:.3em;animation:bounce 2s infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}
    
    .photo{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:5rem 3rem;scroll-snap-align:start}
    .photo-wrap{max-width:900px;width:100%}
    .photo-wrap img{width:100%;max-height:70vh;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.08)}
    .photo-info{text-align:center;margin-top:2rem}
    .photo-num{font-size:.7rem;color:var(--light);letter-spacing:.2em;margin-bottom:.5rem}
    .photo-title{font-size:2rem;font-weight:400;letter-spacing:.1em;margin-bottom:.3rem}
    .photo-sub{color:var(--accent);font-size:.9rem;letter-spacing:.15em;font-style:italic;margin-bottom:.5rem}
    .photo-desc{font-size:.9rem;color:var(--dim)}
    
    footer{min-height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;scroll-snap-align:start;background:#fafaf8}
    .footer-text{font-size:.9rem;color:var(--dim);letter-spacing:.2em}
    
    @media(max-width:768px){
      header{padding:1rem 1.5rem}
      .hero{padding:5rem 1.5rem}
      .photo{padding:4rem 1.2rem}
      .photo-title{font-size:1.6rem}
    }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo">首页</a>
    <span class="nav-info">3 作品</span>
  </header>

  <section class="hero" id="home">
    <h1 class="hero-title">人闲桂花落</h1>
    <p class="hero-subtitle">夜静春山空</p>
    <div class="scroll-hint">向下浏览 ↓</div>
  </section>

  <section class="photo" id="p1">
    <div class="photo-wrap">
      <img src="images/hero-01.jpg" alt="静" loading="lazy">
      <div class="photo-info">
        <p class="photo-num">壹 / 叁</p>
        <h2 class="photo-title">静</h2>
        <p class="photo-sub">Stillness</p>
        <p class="photo-desc">万籁俱寂，唯有灯火未眠</p>
      </div>
    </div>
  </section>

  <section class="photo" id="p2">
    <div class="photo-wrap">
      <img src="images/gallery-02.jpg" alt="痕" loading="lazy">
      <div class="photo-info">
        <p class="photo-num">贰 / 叁</p>
        <h2 class="photo-title">痕</h2>
        <p class="photo-sub">Trace</p>
        <p class="photo-desc">线过留痕，痕即永恒</p>
      </div>
    </div>
  </section>

  <section class="photo" id="p3">
    <div class="photo-wrap">
      <img src="images/gallery-03.jpg" alt="暖" loading="lazy">
      <div class="photo-info">
        <p class="photo-num">叁 / 叁</p>
        <h2 class="photo-title">暖</h2>
        <p class="photo-sub">Warmth</p>
        <p class="photo-desc">一点微光，温暖人间</p>
      </div>
    </div>
  </section>

  <footer>
    <p class="footer-text">人闲桂花落 · 夜静春山空</p>
  </footer>
</body>
</html>
