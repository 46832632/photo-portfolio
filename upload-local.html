<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>春涧中 · 上传</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg-cream: #fafaf8;
  --bg-ghost: #f5f5f3;
  --text: #1a1a1a;
  --text-dim: #888;
  --text-light: #bbb;
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(0,0,0,0.18);
  --shadow: 0 4px 30px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 40px rgba(0,0,0,0.10);
  --accent: #c9a84c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', serif;
  color: var(--text);
  line-height: 1.8;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1.5rem 3rem;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-size: 0.8rem; letter-spacing: 0.35em; color: var(--text);
  text-decoration: none; text-transform: uppercase; font-weight: 400;
  transition: opacity 0.3s;
}
.logo:hover { opacity: 0.45; }
.nav-links { list-style: none; display: flex; gap: 2.5rem; }
.nav-links a {
  font-size: 0.78rem; letter-spacing: 0.2em; color: var(--text-dim);
  text-decoration: none; transition: color 0.3s;
}
.nav-links a:hover { color: var(--text); }
.nav-links a.active { color: var(--text); }
.menu-btn {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; cursor: pointer; padding: 5px;
}
.menu-btn span { display: block; width: 22px; height: 1px; background: var(--text); transition: 0.3s; }
.menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
.menu-btn.active span:nth-child(2) { opacity: 0; }
.menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

/* ── Mobile Nav ── */
.mobile-nav {
  display: none; position: fixed; top: 58px; left: 0; right: 0;
  background: white; padding: 2rem; z-index: 99;
  flex-direction: column; gap: 1.5rem; text-align: center;
  border-top: 1px solid var(--border);
}
.mobile-nav.active { display: flex; }
.mobile-nav a {
  font-size: 0.95rem; letter-spacing: 0.3em; color: var(--text-dim);
  text-decoration: none; transition: color 0.3s;
}
.mobile-nav a:hover { color: var(--text); }

/* ── Main Content ── */
main {
  margin-top: 100px;
  width: 100%; max-width: 580px;
  padding: 3rem 2rem 5rem;
  animation: fadeUp 0.8s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Title ── */
.page-title {
  text-align: center; margin-bottom: 0.5rem;
}
.page-title h1 {
  font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  font-size: clamp(1.8rem, 5vw, 2.4rem); font-weight: 400;
  letter-spacing: 0.2em;
}
.page-title p {
  font-size: 0.75rem; color: var(--text-light);
  letter-spacing: 0.5em; margin-top: 0.6rem;
}

.divider {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, transparent, var(--accent), transparent);
  margin: 2.5rem auto;
}

/* ── Token ── */
.token-section { margin-bottom: 2rem; }
.token-label {
  font-size: 0.7rem; color: var(--text-light);
  letter-spacing: 0.3em; margin-bottom: 0.6rem; text-align: center;
}
.token-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-ghost); border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 4px 2px 14px;
  transition: border-color 0.2s;
}
.token-row:focus-within { border-color: var(--border-hover); }
.token-row input {
  flex: 1; border: none; background: transparent;
  font-size: 13px; font-family: monospace; color: var(--text);
  padding: 10px 0;
}
.token-row input:focus { outline: none; }
.toggle-btn {
  background: none; border: none; cursor: pointer;
  padding: 8px 10px; font-size: 15px; opacity: 0.5;
  transition: opacity 0.2s;
}
.toggle-btn:hover { opacity: 1; }
#tokenStatus { font-size: 11px; margin-top: 6px; text-align: center; }
#tokenStatus.ok  { color: #5a8a5a; }
#tokenStatus.err { color: #c05050; }

/* ── Drop Zone ── */
.drop-zone {
  border: 1.5px dashed var(--border-hover);
  border-radius: 4px; padding: 3.5rem 2rem;
  text-align: center; cursor: pointer;
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  margin-bottom: 1.5rem;
  position: relative; overflow: hidden;
}
.drop-zone:hover, .drop-zone.drag {
  border-color: var(--accent);
  background: var(--bg-cream);
  box-shadow: var(--shadow);
}
.drop-zone.drag::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 8px,
    rgba(201,168,76,0.04) 8px,
    rgba(201,168,76,0.04) 16px
  );
}
.drop-zone-icon {
  font-size: 2rem; margin-bottom: 0.8rem;
  transition: transform 0.3s;
}
.drop-zone:hover .drop-zone-icon { transform: translateY(-4px); }
.drop-zone p { color: var(--text-dim); font-size: 0.85rem; letter-spacing: 0.05em; }
.drop-zone p.main { font-size: 0.9rem; color: var(--text-dim); }
.drop-zone p.hint { font-size: 0.72rem; color: var(--text-light); margin-top: 0.4rem; letter-spacing: 0.1em; }
.drop-zone input { display: none; }

/* ── Preview ── */
.preview-wrap {
  position: relative; margin-bottom: 1.5rem; border-radius: 3px; overflow: hidden;
  box-shadow: var(--shadow); animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.preview-wrap img {
  width: 100%; max-height: 320px; object-fit: contain;
  display: block; background: var(--bg-ghost);
}
.preview-remove {
  position: absolute; top: 10px; right: 10px;
  width: 30px; height: 30px; background: rgba(0,0,0,0.5);
  border: none; border-radius: 50%; color: white;
  font-size: 16px; cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.preview-wrap:hover .preview-remove { opacity: 1; }
.preview-remove:hover { background: rgba(0,0,0,0.75); }

/* ── Form Fields ── */
.form-row {
  display: flex; gap: 12px; margin-bottom: 1rem;
}
.form-row .field { flex: 1; }
.field label {
  display: block; font-size: 0.68rem; color: var(--text-light);
  letter-spacing: 0.25em; margin-bottom: 6px;
}
input[type="text"], input[type="number"], textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 3px; font-size: 14px;
  font-family: 'Noto Serif SC', serif;
  background: var(--bg-cream); color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}
input[type="number"] { text-align: center; }
textarea { resize: vertical; min-height: 72px; }

/* ── Auto Update Checkbox ── */
.checkbox-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 1.5rem;
}
.checkbox-row input[type="checkbox"] {
  width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer;
}
.checkbox-row label {
  font-size: 0.78rem; color: var(--text-dim);
  letter-spacing: 0.05em; cursor: pointer;
}

/* ── Submit Button ── */
.btn-upload {
  width: 100%; padding: 14px;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 3px;
  font-size: 0.85rem; letter-spacing: 0.35em;
  cursor: pointer; font-family: 'Noto Serif SC', serif;
  transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
}
.btn-upload:hover {
  background: #333; box-shadow: 0 6px 24px rgba(0,0,0,0.15);
  transform: translateY(-1px);
}
.btn-upload:active { transform: translateY(0); }
.btn-upload:disabled {
  background: #ccc; cursor: not-allowed;
  transform: none; box-shadow: none;
}
.btn-upload.loading {
  background: var(--text-dim); pointer-events: none;
}

/* ── Progress ── */
.progress-wrap { margin-bottom: 1rem; display: none; }
.progress-wrap.active { display: block; }
.progress-text {
  font-size: 0.72rem; color: var(--text-dim);
  letter-spacing: 0.1em; margin-bottom: 6px;
  display: flex; justify-content: space-between;
}
.progress-bar-track {
  height: 2px; background: var(--bg-ghost); border-radius: 1px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 1px; transition: width 0.3s ease;
  width: 0%;
}

/* ── Log ── */
.log-box {
  margin-top: 1.2rem;
  background: var(--bg-ghost);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 14px;
  max-height: 160px; overflow-y: auto;
  display: none;
}
.log-box.show { display: block; animation: fadeIn 0.3s; }
.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }
.log-entry {
  font-size: 0.75rem; color: var(--text-dim);
  padding: 3px 0; border-bottom: 1px solid var(--border);
  letter-spacing: 0.03em; line-height: 1.6;
  animation: fadeIn 0.3s;
}
.log-entry:last-child { border-bottom: none; }
.log-entry.ok   { color: #5a8a5a; }
.log-entry.err  { color: #c05050; }
.log-entry.info { color: var(--text-light); font-style: italic; }
.log-entry .ts  { color: var(--text-light); margin-right: 6px; font-size: 0.68rem; }

/* ── Footer quote ── */
.footer-quote {
  text-align: center; padding: 2rem;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}
.footer-quote p {
  font-size: 0.75rem; color: var(--text-light);
  letter-spacing: 0.3em; line-height: 2;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  header { padding: 1rem 1.5rem; }
  .nav-links { display: none; }
  .menu-btn { display: flex; }
  main { padding: 5rem 1.2rem 4rem; }
  .form-row { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">桂花落</a>
  <ul class="nav-links">
    <li><a href="index.html">作品</a></li>
    <li><a href="index.html#about">春山空</a></li>
    <li><a href="upload-local.html" class="active">春涧中</a></li>
  </ul>
  <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</header>

<nav class="mobile-nav" id="mobileNav">
  <a href="index.html" onclick="toggleMenu()">作品</a>
  <a href="index.html#about" onclick="toggleMenu()">春山空</a>
  <a href="upload-local.html" onclick="toggleMenu()" class="active">春涧中</a>
</nav>

<main>
  <div class="page-title">
    <h1>春涧中</h1>
    <p>UPLOAD</p>
  </div>

  <div class="divider"></div>

  <!-- Token -->
  <div class="token-section">
    <p class="token-label">GITHUB TOKEN</p>
    <div class="token-row">
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false" />
      <button class="toggle-btn" onclick="toggleToken()" title="显示/隐藏">👁</button>
    </div>
    <p id="tokenStatus"></p>
  </div>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="drop-zone-icon">📷</div>
    <p class="main">点击选择照片 · 或拖拽至此</p>
    <p class="hint">支持 JPG · PNG · WebP</p>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" />
  </div>

  <!-- Preview -->
  <div class="preview-wrap" id="previewWrap" style="display:none">
    <img id="previewImg" src="" alt="预览" />
    <button class="preview-remove" onclick="removePreview()" title="移除">×</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-text">
      <span id="progressLabel">上传中...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-row">
    <div class="field" style="flex:0 0 80px;">
      <label>位置</label>
      <input type="number" id="positionInput" placeholder="末" min="1" max="20" />
    </div>
    <div class="field" style="flex:1;">
      <label>中文标题 <span style="color:#c9a84c">*</span></label>
      <input type="text" id="titleInput" placeholder="如：留白、暖、痕..." maxlength="10" />
    </div>
  </div>

  <div class="field" style="margin-bottom:1rem;">
    <label>英文副标题</label>
    <input type="text" id="subtitleInput" placeholder="自动生成，可修改" />
  </div>

  <div class="field" style="margin-bottom:1.5rem;">
    <label>禅意描述</label>
    <textarea id="descInput" placeholder="自动生成，可修改"></textarea>
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="autoUpdate" checked />
    <label for="autoUpdate">上传后自动添加到首页作品集</label>
  </div>

  <button class="btn-upload" id="uploadBtn" onclick="handleUpload()">上传至 GitHub</button>

  <!-- Log -->
  <div class="log-box" id="logBox"></div>
</main>

<div class="footer-quote">
  <p>月出惊山鸟<br>时鸣春涧中</p>
</div>

<script>
// ── Config ──────────────────────────────────────────
const REPO = '46832632/photo-portfolio';
const BRANCH = 'main';

const EN_MAP = {
  '留白':'still','静':'quiet','暖':'warm','痕':'trace',
  '涌':'surge','念':'memory','透':'clear','寻':'seek',
  '临':'presence','默认':'default','default':'default',
  '澜':'ripple','烁':'shimmer','构':'structure','隅':'corner','尘':'dust'
};
const DESC_TEMPLATES = {
  '留白':'留白是一种艺术，也是一种人生态度。',
  '静':'静不是无声，而是听见内心的声音。',
  '暖':'温暖的光，是城市最后的温柔。',
  '痕':'每一道痕迹，都是时间的笔迹。',
  '涌':'潮起潮落，生活终将继续。',
  '念':'回忆是时间的礼物，照片是记忆的容器。',
  '透':'光穿过缝隙，生命找到出口。',
  '寻':'我们在寻找，也在被发现。',
  '临':'光影即临，瞬息永恒。',
  '澜':'波澜不惊，深流无声。',
  '烁':'霓虹闪烁，城市不眠。',
  '构':'线条交错，几何之美。',
  '隅':'一隅静谧，光影温柔。',
  '尘':'人间烟火，尘世浮华。',
  '默认':'此刻，即永恒。','default':'此刻，即永恒。'
};
const CN_NUM = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖','拾'];

// ── Menu ────────────────────────────────────────────
function toggleMenu() {
  document.getElementById('menuBtn').classList.toggle('active');
  document.getElementById('mobileNav').classList.toggle('active');
}

// ── Token ───────────────────────────────────────────
let savedToken = localStorage.getItem('gh_token') || '';
if (savedToken) {
  document.getElementById('tokenInput').value = savedToken;
  checkToken(savedToken);
}
function toggleToken() {
  const i = document.getElementById('tokenInput');
  i.type = i.type === 'password' ? 'text' : 'password';
}
function checkToken(t) {
  const s = document.getElementById('tokenStatus');
  if (!t) { s.textContent = ''; s.className = ''; return; }
  fetch('https://api.github.com/repos/' + REPO, {
    headers: { 'Authorization': 'Bearer ' + t, 'Accept': 'application/vnd.github.v3+json' }
  }).then(r => {
    if (r.ok) {
      s.textContent = '✓ Token 有效';
      s.className = 'ok';
    } else {
      s.textContent = '✗ Token 无效 (' + r.status + ')';
      s.className = 'err';
    }
  }).catch(() => {
    s.textContent = '✗ 网络错误';
    s.className = 'err';
  });
}
document.getElementById('tokenInput').addEventListener('change', function() {
  localStorage.setItem('gh_token', this.value);
  checkToken(this.value);
});

// ── Auto-fill title → subtitle + desc ───────────────
document.getElementById('titleInput').addEventListener('input', function() {
  const t = this.value.trim();
  if (!document.getElementById('subtitleInput').dataset.userEdited) {
    document.getElementById('subtitleInput').value = EN_MAP[t] || EN_MAP['default'];
  }
  if (!document.getElementById('descInput').dataset.userEdited) {
    document.getElementById('descInput').value = DESC_TEMPLATES[t] || DESC_TEMPLATES['default'];
  }
});
document.getElementById('subtitleInput').addEventListener('input', () =>
  document.getElementById('subtitleInput').dataset.userEdited = '1');
document.getElementById('descInput').addEventListener('input', () =>
  document.getElementById('descInput').dataset.userEdited = '1');

// ── Drag & Drop ─────────────────────────────────────
const dropZone = document.getElementById('dropZone');
['dragenter','dragover'].forEach(e =>
  dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('drag'); }));
['dragleave','drop'].forEach(e =>
  dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('drag'); }));
dropZone.addEventListener('drop', e => {
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

// ── Preview ──────────────────────────────────────────
function handleFile(file) {
  const valid = ['image/jpeg','image/png','image/webp'];
  if (!valid.includes(file.type)) {
    log('不支持的图片格式: ' + file.type, 'err'); return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('previewWrap').style.animation = 'none';
    document.getElementById('previewWrap').offsetHeight; // reflow
    document.getElementById('previewWrap').style.animation = 'fadeIn 0.4s';
  };
  reader.readAsDataURL(file);
  window._currentFile = file;
  log('已选: ' + file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)', 'ok');
}
function removePreview() {
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('fileInput').value = '';
  window._currentFile = null;
}

// ── Log ─────────────────────────────────────────────
function log(msg, type) {
  const el = document.getElementById('logBox');
  el.classList.add('show');
  const now = new Date();
  const ts = now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
  const d = document.createElement('div');
  d.className = 'log-entry ' + (type || '');
  d.innerHTML = `<span class="ts">${ts}</span>${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  if (label) document.getElementById('progressLabel').textContent = label;
}
function showProgress() { document.getElementById('progressWrap').classList.add('active'); }
function hideProgress() { document.getElementById('progressWrap').classList.remove('active'); setProgress(0,''); }

// ── Upload ───────────────────────────────────────────
async function handleUpload() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) { log('请先输入 GitHub Token', 'err'); return; }
  const file = window._currentFile;
  if (!file) { log('请先选择一张照片', 'err'); return; }
  const title = document.getElementById('titleInput').value.trim();
  if (!title) { log('请输入中文标题', 'err'); return; }
  const subtitle = document.getElementById('subtitleInput').value.trim() || EN_MAP['default'];
  const desc = document.getElementById('descInput').value.trim() || DESC_TEMPLATES['default'];
  const autoUpdate = document.getElementById('autoUpdate').checked;

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true; btn.classList.add('loading'); btn.textContent = '上传中...';
  log('开始上传...', 'info');

  try {
    showProgress();
    setProgress(10, '读取文件...');
    const arrayBuffer = await file.arrayBuffer();

    setProgress(30, '编码图片...');
    log('图片大小: ' + (arrayBuffer.byteLength/1024/1024).toFixed(2) + ' MB', 'info');
    const bytes = new Uint8Array(arrayBuffer);
    const CHUNK = 512;
    let binary = '';
    for (let i = 0; i < bytes.length; i += CHUNK) {
      const chunk = bytes.slice(i, Math.min(i+CHUNK, bytes.length));
      binary += String.fromCharCode.apply(null, chunk);
    }
    const base64 = btoa(binary);
    const safeName = title + '_' + Date.now();
    const imgPath = 'images/' + safeName + '.jpg';

    setProgress(50, '推送至 GitHub...');
    log('上传到: ' + imgPath, 'info');

    // 检查是否已存在
    let imgSha;
    const shReq = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + imgPath + '?ref=' + BRANCH, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (shReq.ok) {
      imgSha = (await shReq.json()).sha;
      log('检测到同名文件，将覆盖更新', 'info');
    }

    const imgPayload = {
      message: 'feat: add photo — ' + title,
      content: base64,
      sha: imgSha || undefined,
      branch: BRANCH
    };
    const imgRes = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + imgPath, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(imgPayload)
    });
    if (!imgRes.ok) {
      const err = await imgRes.json().catch(() => ({}));
      throw new Error('图片上传失败 (' + imgRes.status + '): ' + (err.message || imgRes.statusText));
    }

    setProgress(75, '保存元数据...');
    log('✓ 图片上传完成', 'ok');

    // 自动更新首页
    if (autoUpdate) {
      setProgress(85, '更新首页...');
      log('正在更新首页作品集...', 'info');
      await updateHomepage(token, title, subtitle, desc, imgPath);
      log('✓ 首页已更新', 'ok');
    }

    setProgress(100, '完成');
    log('🎉 全部完成！', 'ok');
    log('→ 访问 https://46832632.github.io/photo-portfolio/ 查看', 'info');

    btn.disabled = false; btn.classList.remove('loading'); btn.textContent = '上传至 GitHub';
    setTimeout(hideProgress, 2000);
  } catch(e) {
    log('错误: ' + e.message, 'err');
    btn.disabled = false; btn.classList.remove('loading'); btn.textContent = '上传至 GitHub';
    setTimeout(hideProgress, 500);
  }
}

// ── Update Homepage ─────────────────────────────────
async function updateHomepage(token, title, subtitle, desc, imgPath) {
  const positionInput = document.getElementById('positionInput').value.trim();
  const insertPosition = parseInt(positionInput) || 0;

  const idxReq = await fetch('https://api.github.com/repos/' + REPO + '/contents/index.html?ref=' + BRANCH, {
    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!idxReq.ok) throw new Error('无法读取首页 (' + idxReq.status + ')');
  const idxData = await idxReq.json();
  const idxSha = idxData.sha;
  let idxContent = decodeURIComponent(escape(atob(idxData.content)));

  const photoMatches = idxContent.match(/<section class="photo-section[^"]*"[^>]*id="photo(\d+)"/g) || [];
  const existingNums = photoMatches.map(m => parseInt(m.match(/id="photo(\d+)"/)[1])).sort((a,b)=>a-b);
  const photoCount = existingNums.length;
  const newTotal = photoCount + 1;

  let newNum;
  if (insertPosition > 0 && insertPosition <= newTotal) {
    newNum = insertPosition;
  } else {
    newNum = newTotal;
  }

  // Re-number photos after insertion point
  if (newNum <= photoCount) {
    for (let i = photoCount; i >= newNum; i--) {
      idxContent = idxContent.replace(new RegExp('id="photo' + i + '"', 'g'), 'id="photo' + (i+1) + '"');
      idxContent = idxContent.replace(new RegExp('href="#photo' + i + '"', 'g'), 'href="#photo' + (i+1) + '"');
    }
  }

  const cnNum = CN_NUM[newNum] || String(newNum);
  const totalCn = CN_NUM[newTotal] || String(newTotal);
  const subDisplay = subtitle.charAt(0).toUpperCase() + subtitle.slice(1);

  const newPhotoHtml = `  <section class="photo-section fade-in" id="photo${newNum}">
    <div class="photo-container">
      <div class="photo-wrapper">
        <img src="${imgPath}" alt="${title}" loading="lazy" onclick="openLightbox(this.src)">
      </div>
      <div class="photo-info">
        <div class="camera-params">Sony A7R IV <span>35mm</span> <span>f/2.8</span> <span>1/60s</span> <span>ISO 400</span></div>
        <p class="photo-number">${cnNum} / ${totalCn}</p>
        <h2 class="photo-title">${title}</h2>
        <p class="photo-subtitle">${subDisplay}</p>
        <p class="photo-desc">${desc}</p>
      </div>
    </div>
  </section>

`;

  let insertIdx;
  if (newNum === 1) {
    const heroEnd = idxContent.indexOf('</section>', idxContent.indexOf('id="hero"'));
    insertIdx = heroEnd + '</section>'.length;
  } else if (newNum > photoCount) {
    insertIdx = idxContent.indexOf('<section class="footer"');
  } else {
    const prevEnd = idxContent.indexOf('</section>', idxContent.indexOf('id="photo' + (newNum-1) + '"'));
    insertIdx = prevEnd + '</section>'.length;
  }

  idxContent = idxContent.slice(0, insertIdx) + '\n' + newPhotoHtml + idxContent.slice(insertIdx);

  // Update all denominators
  const totalPattern = /([壹贰叁肆伍陆柒捌玖拾\d]+) \/ [壹贰叁肆伍陆柒捌玖拾\d]+/g;
  idxContent = idxContent.replace(totalPattern, m => m.replace(/ \/ [壹贰叁肆伍陆柒捌玖拾\d]+$/, ' / ' + totalCn));

  const newContentB64 = btoa(unescape(encodeURIComponent(idxContent)));
  const updateRes = await fetch('https://api.github.com/repos/' + REPO + '/contents/index.html', {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: 'auto: add ' + title + ' to homepage at position ' + newNum,
      content: newContentB64, sha: idxSha, branch: BRANCH
    })
  });
  if (!updateRes.ok) {
    const err = await updateRes.json().catch(() => ({}));
    throw new Error('首页更新失败 (' + updateRes.status + '): ' + (err.message || updateRes.statusText));
  }
}
