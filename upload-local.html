<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>春涧中 · 上传</title>
<link rel="preconnect" href="https://fonts.loli.net">
<link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
<link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg-cream: #fafaf8;
  --bg-ghost: #f5f5f3;
  --text: #1a1a1a;
  --text-dim: #888;
  --text-light: #bbb;
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(0,0,0,0.18);
  --shadow: 0 4px 30px rgba(0,0,0,0.06);
  --accent: #c9a84c;
  --success: #5a8a5a;
  --error: #c05050;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', serif;
  color: var(--text);
  line-height: 1.8;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Header */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1.5rem 3rem;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-size: 0.8rem; letter-spacing: 0.35em; color: var(--text);
  text-decoration: none; text-transform: uppercase; font-weight: 400;
}
.nav-links { list-style: none; display: flex; gap: 2.5rem; }
.nav-links a {
  font-size: 0.78rem; letter-spacing: 0.2em; color: var(--text-dim);
  text-decoration: none;
}
.nav-links a.active { color: var(--text); }
.menu-btn { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; }
.menu-btn span { width: 22px; height: 1px; background: var(--text); }

.mobile-nav {
  display: none; position: fixed; top: 58px; left: 0; right: 0;
  background: white; padding: 2rem; z-index: 99;
  flex-direction: column; gap: 1.5rem; text-align: center;
}
.mobile-nav.active { display: flex; }
.mobile-nav a { font-size: 0.95rem; letter-spacing: 0.3em; color: var(--text-dim); text-decoration: none; }

/* Main */
main {
  margin-top: 100px;
  width: 100%; max-width: 640px;
  padding: 3rem 2rem 5rem;
  animation: fadeUp 0.8s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

.page-title { text-align: center; margin-bottom: 0.5rem; }
.page-title h1 { font-family: 'ZCOOL XiaoWei', serif; font-size: clamp(1.8rem, 5vw, 2.4rem); letter-spacing: 0.2em; }
.page-title p { font-size: 0.75rem; color: var(--text-light); letter-spacing: 0.5em; margin-top: 0.6rem; }

.divider {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, transparent, var(--accent), transparent);
  margin: 2.5rem auto;
}

/* Config Section */
.config-section { margin-bottom: 2rem; }
.config-row { display: flex; gap: 10px; margin-bottom: 10px; }
.config-row input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 3px;
  font-size: 13px; font-family: monospace; background: var(--bg-ghost);
}
.config-row input:focus { outline: none; border-color: var(--accent); }
.config-label { font-size: 0.7rem; color: var(--text-light); letter-spacing: 0.3em; margin-bottom: 6px; }
.toggle-btn { background: none; border: none; cursor: pointer; padding: 8px 10px; font-size: 15px; opacity: 0.5; }
.toggle-btn:hover { opacity: 1; }
#configStatus { font-size: 11px; margin-top: 6px; text-align: center; }
#configStatus.ok { color: var(--success); }
#configStatus.err { color: var(--error); }

/* Drop Zone */
.drop-zone {
  border: 1.5px dashed var(--border-hover);
  border-radius: 4px; padding: 3rem 2rem;
  text-align: center; cursor: pointer;
  transition: border-color 0.25s, background 0.25s;
  margin-bottom: 1.5rem; position: relative;
}
.drop-zone:hover, .drop-zone.drag {
  border-color: var(--accent);
  background: var(--bg-cream);
}
.drop-zone-icon { font-size: 2rem; margin-bottom: 0.8rem; }
.drop-zone p { color: var(--text-dim); font-size: 0.85rem; }
.drop-zone .hint { font-size: 0.72rem; color: var(--text-light); margin-top: 0.4rem; }
.drop-zone input { display: none; }

/* Queue */
.queue-section { margin-bottom: 1.5rem; }
.queue-title { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.2em; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.queue-title .count { font-size: 0.7rem; color: var(--text-light); }
.queue-list { max-height: 400px; overflow-y: auto; }
.queue-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px; margin-bottom: 8px;
  background: var(--bg-cream); border: 1px solid var(--border);
  border-radius: 4px; animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.queue-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
.queue-info { flex: 1; min-width: 0; }
.queue-filename { font-size: 0.8rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-size { font-size: 0.7rem; color: var(--text-light); margin-top: 2px; }
.queue-status { font-size: 0.7rem; margin-top: 4px; }
.queue-status.pending { color: var(--text-light); }
.queue-status.uploading { color: var(--accent); }
.queue-status.done { color: var(--success); }
.queue-status.error { color: var(--error); }

.queue-title-input {
  width: 100%; padding: 6px 8px; margin-top: 6px;
  border: 1px solid var(--border); border-radius: 2px;
  font-size: 0.75rem; font-family: inherit;
}
.queue-title-input:focus { outline: none; border-color: var(--accent); }

.queue-remove {
  width: 28px; height: 28px; background: transparent; border: 1px solid var(--border);
  border-radius: 50%; color: var(--text-dim); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.queue-remove:hover { background: var(--error); border-color: var(--error); color: white; }

/* Progress */
.progress-wrap { margin-bottom: 1rem; display: none; }
.progress-wrap.active { display: block; }
.progress-text { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bar-track { height: 3px; background: var(--bg-ghost); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

/* Buttons */
.btn-row { display: flex; gap: 10px; margin-bottom: 1rem; }
.btn {
  flex: 1; padding: 14px;
  border: none; border-radius: 3px;
  font-size: 0.85rem; letter-spacing: 0.25em;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.btn-primary { background: var(--text); color: white; }
.btn-primary:hover { background: #333; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary { background: var(--bg-ghost); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

/* Log */
.log-box {
  margin-top: 1rem;
  background: var(--bg-ghost);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 14px;
  max-height: 200px; overflow-y: auto;
  display: none;
}
.log-box.show { display: block; }
.log-entry { font-size: 0.75rem; color: var(--text-dim); padding: 3px 0; border-bottom: 1px solid var(--border); }
.log-entry:last-child { border-bottom: none; }
.log-entry.ok { color: var(--success); }
.log-entry.err { color: var(--error); }
.log-entry.info { color: var(--text-light); }
.log-entry .ts { color: var(--text-light); margin-right: 6px; font-size: 0.68rem; }

/* Footer */
.footer-quote {
  text-align: center; padding: 2rem;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}
.footer-quote p { font-size: 0.75rem; color: var(--text-light); letter-spacing: 0.3em; line-height: 2; }

/* Responsive */
@media (max-width: 640px) {
  header { padding: 1rem 1.5rem; }
  .nav-links { display: none; }
  .menu-btn { display: flex; }
  main { padding: 5rem 1.2rem 4rem; }
  .config-row { flex-direction: column; }
  .queue-item { flex-wrap: wrap; }
  .queue-thumb { width: 48px; height: 48px; }
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">桂花落</a>
  <ul class="nav-links">
    <li><a href="index.html">作品</a></li>
    <li><a href="index.html#about">春山空</a></li>
    <li><a href="upload-local.html" class="active">春涧中</a></li>
  </ul>
  <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
</header>

<nav class="mobile-nav" id="mobileNav">
  <a href="index.html">作品</a>
  <a href="index.html#about">春山空</a>
  <a href="upload-local.html" class="active">春涧中</a>
</nav>

<main>
  <div class="page-title">
    <h1>春涧中</h1>
    <p>UPLOAD</p>
  </div>

  <div class="divider"></div>

  <!-- Cloudflare Config -->
  <div class="config-section">
    <div class="config-label">CLOUDFLARE ACCOUNT ID</div>
    <div class="config-row">
      <input type="text" id="accountIdInput" placeholder="例如：e70a1b5220669c3275adf9625c919a94" autocomplete="off" />
    </div>
    
    <div class="config-label" style="margin-top:12px">CLOUDFLARE API TOKEN</div>
    <div class="config-row">
      <input type="password" id="tokenInput" placeholder="填写你申请的 Cloudflare Token" autocomplete="off" spellcheck="false" />
      <button class="toggle-btn" onclick="toggleToken()" title="显示/隐藏">👁</button>
    </div>
    <p id="configStatus"></p>
  </div>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="drop-zone-icon">📷</div>
    <p>点击选择照片 · 或拖拽至此</p>
    <p class="hint">支持多选 · JPG/PNG/WebP · 自动压缩</p>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple />
  </div>

  <!-- Queue -->
  <div class="queue-section" id="queueSection" style="display:none">
    <div class="queue-title">
      <span>待上传队列</span>
      <span class="count" id="queueCount">0 张</span>
    </div>
    <div class="queue-list" id="queueList"></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-text">
      <span id="progressLabel">准备上传...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="uploadBtn" onclick="startUpload()" disabled>开始上传</button>
    <button class="btn btn-secondary" id="clearBtn" onclick="clearQueue()" disabled>清空队列</button>
  </div>

  <!-- Log -->
  <div class="log-box" id="logBox"></div>
</main>

<div class="footer-quote">
  <p>月出惊山鸟<br>时鸣春涧中</p>
</div>

<script>
// Config
let accountId = sessionStorage.getItem('cf_account_id') || '';
let apiToken = sessionStorage.getItem('cf_api_token') || '';
const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

// Queue
let queue = [];
let uploading = false;

// Init
if (accountId) document.getElementById('accountIdInput').value = accountId;
if (apiToken) document.getElementById('tokenInput').value = apiToken;

// Menu
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('menuBtn').classList.toggle('active');
  document.getElementById('mobileNav').classList.toggle('active');
});

// Token toggle
function toggleToken() {
  const i = document.getElementById('tokenInput');
  i.type = i.type === 'password' ? 'text' : 'password';
}

// Save config
document.getElementById('accountIdInput').addEventListener('change', function() {
  accountId = this.value.trim();
  sessionStorage.setItem('cf_account_id', accountId);
  validateConfig();
});
document.getElementById('tokenInput').addEventListener('change', function() {
  apiToken = this.value.trim();
  sessionStorage.setItem('cf_api_token', apiToken);
  validateConfig();
});

function validateConfig() {
  const status = document.getElementById('configStatus');
  if (accountId && apiToken) {
    status.textContent = '✓ 配置完整';
    status.className = 'ok';
  } else if (accountId || apiToken) {
    status.textContent = '请补充完整配置';
    status.className = 'err';
  } else {
    status.textContent = '';
    status.className = '';
  }
  updateButtons();
}
validateConfig();

// Drag & Drop
const dropZone = document.getElementById('dropZone');
['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('drag'); }));
['dragleave','drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('drag'); }));
dropZone.addEventListener('drop', e => {
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files.length) addFiles(e.target.files);
});

// Add files to queue
async function addFiles(files) {
  const valid = ['image/jpeg','image/png','image/webp'];
  for (const file of files) {
    if (!valid.includes(file.type)) {
      log('跳过不支持的格式: ' + file.name, 'err');
      continue;
    }
    
    // Compress if needed
    let processedFile = file;
    if (file.size > MAX_FILE_SIZE) {
      log('压缩中: ' + file.name, 'info');
      try {
        processedFile = await compressImage(file);
        log('压缩完成: ' + (file.size/1024/1024).toFixed(1) + 'MB → ' + (processedFile.size/1024/1024).toFixed(1) + 'MB', 'ok');
      } catch(e) {
        log('压缩失败: ' + file.name, 'err');
        continue;
      }
    }
    
    // Create preview
    const preview = await createPreview(processedFile);
    
    queue.push({
      file: processedFile,
      originalName: file.name,
      title: file.name.replace(/\.[^.]+$/, '').slice(0, 10),
      preview: preview,
      status: 'pending',
      id: null,
      error: null
    });
  }
  
  renderQueue();
  updateButtons();
}

// Compress image
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    
    img.onload = () => {
      URL.revokeObjectURL(url);
      
      let width = img.width;
      let height = img.height;
      const maxDim = 2048;
      
      if (width > maxDim || height > maxDim) {
        if (width > height) {
          height = Math.round(height * maxDim / width);
          width = maxDim;
        } else {
          width = Math.round(width * maxDim / height);
          height = maxDim;
        }
      }
      
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      
      let quality = 0.85;
      const tryCompress = () => {
        canvas.toBlob(blob => {
          if (blob.size <= MAX_FILE_SIZE || quality <= 0.3) {
            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg', lastModified: Date.now() }));
          } else {
            quality -= 0.1;
            tryCompress();
          }
        }, 'image/jpeg', quality);
      };
      tryCompress();
    };
    
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = url;
  });
}

// Create preview
function createPreview(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

// Render queue
function renderQueue() {
  const section = document.getElementById('queueSection');
  const list = document.getElementById('queueList');
  const count = document.getElementById('queueCount');
  
  if (queue.length === 0) {
    section.style.display = 'none';
    return;
  }
  
  section.style.display = 'block';
  count.textContent = queue.length + ' 张';
  
  list.innerHTML = queue.map((item, index) => `
    <div class="queue-item" data-index="${index}">
      <img src="${item.preview}" class="queue-thumb" alt="预览" />
      <div class="queue-info">
        <div class="queue-filename">${item.originalName}</div>
        <div class="queue-size">${(item.file.size/1024).toFixed(0)} KB</div>
        <div class="queue-status ${item.status}">${getStatusText(item.status)}${item.id ? ' · ' + item.id : ''}${item.error ? ' · ' + item.error : ''}</div>
        <input type="text" class="queue-title-input" placeholder="标题（可选）" value="${item.title}" 
               onchange="queue[${index}].title = this.value" ${item.status === 'done' ? 'disabled' : ''} />
      </div>
      <button class="queue-remove" onclick="removeItem(${index})" ${item.status === 'uploading' || item.status === 'done' ? 'disabled' : ''}>×</button>
    </div>
  `).join('');
}

function getStatusText(status) {
  switch(status) {
    case 'pending': return '等待上传';
    case 'uploading': return '上传中...';
    case 'done': return '✓ 已完成';
    case 'error': return '✗ 失败';
    default: return '';
  }
}

function removeItem(index) {
  queue.splice(index, 1);
  renderQueue();
  updateButtons();
}

function clearQueue() {
  queue = [];
  renderQueue();
  updateButtons();
  log('队列已清空', 'info');
}

function updateButtons() {
  const uploadBtn = document.getElementById('uploadBtn');
  const clearBtn = document.getElementById('clearBtn');
  const hasConfig = accountId && apiToken;
  const hasItems = queue.length > 0;
  const hasPending = queue.some(item => item.status === 'pending');
  
  uploadBtn.disabled = !hasConfig || !hasPending || uploading;
  clearBtn.disabled = !hasItems || uploading;
}

// Log
function log(msg, type) {
  const el = document.getElementById('logBox');
  el.classList.add('show');
  const now = new Date();
  const ts = now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
  const d = document.createElement('div');
  d.className = 'log-entry ' + (type || '');
  d.innerHTML = `<span class="ts">${ts}</span>${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// Progress
function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  if (label) document.getElementById('progressLabel').textContent = label;
}

function showProgress() { document.getElementById('progressWrap').classList.add('active'); }
function hideProgress() { document.getElementById('progressWrap').classList.remove('active'); setProgress(0, ''); }

// Upload
async function startUpload() {
  if (!accountId || !apiToken) {
    log('请先填写 Account ID 和 Token', 'err');
    return;
  }
  
  const pendingItems = queue.filter(item => item.status === 'pending');
  if (pendingItems.length === 0) {
    log('没有待上传的图片', 'err');
    return;
  }
  
  uploading = true;
  updateButtons();
  showProgress();
  
  let completed = 0;
  const total = pendingItems.length;
  
  for (const item of pendingItems) {
    item.status = 'uploading';
    renderQueue();
    
    try {
      const result = await uploadToCloudflare(item.file, item.title);
      item.status = 'done';
      item.id = result.id;
      log('✓ ' + item.originalName + ' → ' + result.id, 'ok');
    } catch(e) {
      item.status = 'error';
      item.error = e.message;
      log('✗ ' + item.originalName + ': ' + e.message, 'err');
    }
    
    completed++;
    setProgress(Math.round(completed / total * 100), `上传中 ${completed}/${total}`);
    renderQueue();
  }
  
  uploading = false;
  updateButtons();
  
  const successCount = queue.filter(item => item.status === 'done').length;
  log(`🎉 完成！成功 ${successCount}/${total}`, 'ok');
  
  setTimeout(hideProgress, 2000);
}

// Upload to Cloudflare Images
async function uploadToCloudflare(file, title) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('metadata', JSON.stringify({ title: title }));
  
  const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}/images/v1`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiToken}`
    },
    body: formData
  });
  
  if (!response.ok) {
    const error = await response.json().catch(() => ({}));
    throw new Error(error.errors?.[0]?.message || `HTTP ${response.status}`);
  }
  
  const data = await response.json();
  if (!data.success) {
    throw new Error(data.errors?.[0]?.message || '上传失败');
  }
  
  return {
    id: data.result.id,
    filename: data.result.filename
  };
}
</script>
</body>
</html>
