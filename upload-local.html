<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>春涧中 · 上传</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;color:#1a1a1a;line-height:1.8;min-height:100vh;display:flex;flex-direction:column;align-items:center;background:#fff}
header{position:fixed;top:0;left:0;right:0;z-index:100;width:100%;padding:1.2rem 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.08)}
.logo{font-size:.75rem;letter-spacing:.3em;text-decoration:none;color:#1a1a1a;text-transform:uppercase}
.nav{display:flex;gap:2rem}
.nav a{font-size:.75rem;letter-spacing:.15em;color:#888;text-decoration:none}
.nav a.active{color:#1a1a1a}
main{margin-top:90px;width:100%;max-width:580px;padding:2.5rem 1.5rem 4rem;animation:fadeUp .7s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:2.2rem;text-align:center;letter-spacing:.15em;margin-bottom:.4rem}
.sub{font-size:.68rem;color:#bbb;letter-spacing:.5em;text-align:center;margin-bottom:2rem}
.divider{width:1px;height:36px;background:linear-gradient(to bottom,transparent,#c9a84c,transparent);margin:0 auto 2rem}
.card{background:#fafaf8;border:1px solid rgba(0,0,0,.08);border-radius:6px;padding:1.5rem;margin-bottom:1.2rem}
.row{margin-bottom:1rem}
label{display:block;font-size:.68rem;color:#bbb;letter-spacing:.2em;margin-bottom:.5rem}
input{width:100%;padding:9px 12px;border:1px solid rgba(0,0,0,.1);border-radius:3px;font-size:.85rem;font-family:monospace;background:#fff}
input:focus{outline:none;border-color:#c9a84c}
.tip{font-size:.65rem;color:#bbb;margin-top:.4rem;line-height:1.6}
.drop{border:1.5px dashed rgba(0,0,0,.15);border-radius:5px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1.2rem;background:#fff}
.drop:hover{border-color:#c9a84c;background:#fafaf8}
.icon{font-size:2rem;margin-bottom:.4rem}
.drop p{font-size:.82rem;color:#888}
.drop .tip2{font-size:.65rem;color:#bbb;margin-top:.3rem}
.drop input{display:none}
.queue{margin-bottom:1.2rem;display:none}
.queue.show{display:block}
.queue-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:.5rem;border-bottom:1px solid rgba(0,0,0,.08);margin-bottom:.6rem}
.queue-head span{font-size:.68rem;color:#888;letter-spacing:.15em}
.item{display:flex;gap:10px;padding:10px;margin-bottom:.5rem;background:#fafaf8;border:1px solid rgba(0,0,0,.08);border-radius:4px;flex-wrap:wrap}
.thumb{width:60px;height:60px;object-fit:cover;border-radius:3px;flex-shrink:0;align-self:center}
.info{flex:1;min-width:0;align-self:center}
.name{font-size:.78rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sz{font-size:.65rem;color:#bbb}
.stat{font-size:.65rem;margin-top:4px;font-weight:600}
.stat.p{color:#bbb}.stat.u{color:#c9a84c}.stat.d{color:#5a8a5a}.stat.e{color:#c05050}
.rm{width:26px;height:26px;border-radius:50%;border:1px solid rgba(0,0,0,.1);background:transparent;color:#888;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:center}
.rm:hover{background:#c05050;border-color:#c05050;color:#fff}
.rm:disabled{opacity:.3;cursor:not-allowed}
.prog{margin-bottom:1rem;display:none}
.prog.show{display:block}
.prog-t{font-size:.68rem;color:#888;margin-bottom:5px;display:flex;justify-content:space-between}
.bar{height:3px;background:#f5f5f3;border-radius:2px;overflow:hidden}
.fill{height:100%;background:#c9a84c;transition:width .3s;width:0}
.btn-row{display:flex;gap:8px;margin-bottom:.8rem}
.btn{flex:1;padding:13px;border:none;border-radius:3px;font-size:.8rem;letter-spacing:.15em;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-p{background:#1a1a1a;color:#fff}
.btn-p:hover{background:#333}
.btn-p:disabled{background:#ccc;cursor:not-allowed}
.btn-s{background:#f5f5f3;color:#1a1a1a;border:1px solid rgba(0,0,0,.08)}
.btn-s:hover{border-color:#c9a84c}
.btn-s:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:1rem;background:#f5f5f3;border:1px solid rgba(0,0,0,.08);border-radius:3px;padding:10px 12px;max-height:160px;overflow-y:auto;font-size:.68rem;display:none}
.log.show{display:block}
.l{color:#888;padding:2px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.l:last-child{border-bottom:none}
.l.ok{color:#5a8a5a}.l.er{color:#c05050}.l.inf{color:#bbb}
.ts{color:#bbb;margin-right:5px;font-size:.62rem}
footer{text-align:center;padding:1.5rem;border-top:1px solid rgba(0,0,0,.06);margin-top:auto;width:100%}
footer p{font-size:.68rem;color:#bbb;letter-spacing:.3em;line-height:2}
@media(max-width:600px){header{padding:1rem 1.2rem}.nav{display:none}main{padding:4.5rem 1rem 3rem}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">桂 花 落</a>
  <nav class="nav">
    <a href="index.html">作品</a>
    <a href="index.html#about">春山空</a>
    <a href="upload-local.html" class="active">春涧中</a>
  </nav>
</header>
<main>
  <h1>春涧中</h1>
  <p class="sub">CLOUDFLARE PAGES + GITHUB IMAGES</p>
  <div class="divider"></div>
  <div class="card">
    <div class="row">
      <label>GITHUB TOKEN（上传图片到 GitHub）</label>
      <input type="password" id="gh" placeholder="ghp_xxxxxxxx" autocomplete="off">
    </div>
    <p class="tip">图片存 GitHub（国内可访问） · Token 仅浏览器本地使用，不会上传</p>
  </div>
  <div class="drop" id="drop">
    <div class="icon">📷</div>
    <p>点击选择照片 · 支持多选</p>
    <p class="tip2">JPG / PNG / WebP / HEIC · 自动压缩</p>
    <input type="file" id="fi" accept="image/*" multiple>
  </div>
  <div class="queue" id="qsec">
    <div class="queue-head"><span>待上传</span><span id="qcnt">0 张</span></div>
    <div id="qlist"></div>
  </div>
  <div class="prog" id="prog">
    <div class="prog-t"><span id="plbl">上传中...</span><span id="ppct">0%</span></div>
    <div class="bar"><div class="fill" id="pfill"></div></div>
  </div>
  <div class="btn-row">
    <button class="btn-p" id="upbtn" onclick="start()" disabled>上传</button>
    <button class="btn-s" id="clbtn" onclick="clear()">清空</button>
  </div>
  <div class="log" id="logbox"></div>
</main>
<footer><p>月出惊山鸟<br>时鸣春涧中</p></footer>
<script>
const R="46832632/photo-portfolio",B="main",BASE="https://raw.githubusercontent.com/"+R+"/"+B+"/images/",MAX=10*1024*1024;
let gt=sessionStorage.getItem("gh_t")||"",q=[],up=false;
if(gt)document.getElementById("gh").value=gt;
document.getElementById("gh").addEventListener("change",function(){gt=this.value.trim();sessionStorage.setItem("gh_t",gt);upd()});
var drop=document.getElementById("drop");
["dragenter","dragover"].forEach(function(ev){drop.addEventListener(ev,function(e){e.preventDefault();drop.style.borderColor="#c9a84c";drop.style.background="#fafaf8"})});
["dragleave","drop"].forEach(function(ev){drop.addEventListener(ev,function(e){e.preventDefault();drop.style.borderColor="";drop.style.background=""})});
drop.addEventListener("drop",function(e){if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files)});
document.getElementById("fi").addEventListener("change",function(e){if(e.target.files.length)addFiles(e.target.files)});

async function addFiles(files){
  for(var i=0;i<files.length;i++){
    var file=files[i];
    if(!file.type.startsWith("image/")){log("非图片: "+file.name,"er");continue;}
    var f=file;
    var bytes=await file.slice(0,12).arrayBuffer().then(function(b){return new Uint8Array(b)});
    var isJpeg=bytes[0]===0xFF&&bytes[1]===0xD8&&bytes[2]===0xFF;
    if(!isJpeg&&typeof heic2any!=="undefined"){
      log("HEIC转换: "+file.name,"inf");
      try{
        var blob=await heic2any({blob:file,toType:"image/jpeg",quality:.88});
        f=new File([blob],file.name.replace(/\.[^.]+$/,".jpg"),{type:"image/jpeg"});
        log("HEIC完成: "+(f.size/1024/1024).toFixed(1)+"MB","ok");
      }catch(err){log("HEIC失败: "+file.name,"er");continue;}
    }else if(!isJpeg){log("不支持格式: "+file.name,"er");continue;}
    if(f.size>MAX){f=await compress(f)}
    var prev=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result)};r.readAsDataURL(f)});
    q.push({f:f,prev:prev,title:file.name.replace(/\.[^.]+$/,"").slice(0,8),status:"pending",url:null,error:null});
    log("添加: "+file.name+" ("+(f.size/1024/1024).toFixed(1)+"MB)","ok");
  }
  render();upd();
}

function compress(file){
  return new Promise(function(res,rej){
    var img=new Image(),url=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(url);
      var w=img.width,h=img.height,mx=2048;
      if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}
      var c=document.createElement("canvas");c.width=w;c.height=h;
      var ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
      var qq=.85;
      function go(){
        c.toBlob(function(b){
          if(!b){rej(new Error("canvas fail"));return;}
          if(b.size<=MAX||qq<=.3)res(new File([b],file.name.replace(/\.[^.]+$/,".jpg"),{type:"image/jpeg"}));
          else{qq-=.15;go();}
        },qq>0?qq:.3,"image/jpeg");
      }
      go();
    };
    img.onerror=function(){rej(new Error("load fail"))};
    img.src=url;
  });
}

function render(){
  var sec=document.getElementById("qsec");
  sec.className=q.length?"queue show":"queue";
  document.getElementById("qcnt").textContent=q.filter(function(i){return i.status==="pending"}).length+" 张待上传";
  document.getElementById("qlist").innerHTML=q.map(function(item,i){
    var sm={pending:"p",uploading:"u",done:"d",error:"e"};
    var tm={pending:"等待上传",uploading:"上传中...",done:"✓ 已上传",error:"✗ "+item.error};
    var st=sm[item.status]||"p",txt=tm[item.status]||item.status;
    return '<div class="item"><img src="'+item.prev+'" class="thumb"><div class="info"><div class="name">'+item.title+'</div><div class="sz">'+(item.f.size/1024/1024).toFixed(1)+'MB</div><div class="stat '+st+'">'+txt+'</div></div><button class="rm" onclick="rm('+i+')"'+(item.status==="uploading"?' disabled':'')+'>×</button></div>';
  }).join("");
}

function rm(idx){q.splice(idx,1);render();upd()}
function clear(){q=[];render();upd();log("已清空","inf")}

function upd(){
  document.getElementById("upbtn").disabled=!gt||!q.some(function(i){return i.status==="pending"})||up;
  document.getElementById("clbtn").disabled=!q.length||up;
}

function log(msg,type){
  var el=document.getElementById("logbox");
  el.className="log show";
  var d=document.createElement("div");d.className="l "+(type||"");
  var t=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
  d.innerHTML="<span class=ts>"+t+"</span>"+msg;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

function setP(pct,label){
  var bar=document.getElementById("prog");
  bar.className="prog show";
  document.getElementById("pfill").style.width=pct+"%";
  document.getElementById("ppct").textContent=pct+"%";
  if(label)document.getElementById("plbl").textContent=label;
}

async function start(){
  if(!gt){log("请先填写GitHub Token","er");return;}
  var pending=q.filter(function(i){return i.status==="pending"});
  if(!pending.length){log("没有待上传","er");return;}
  up=true;upd();
  var done=0;
  for(var j=0;j<pending.length;j++){
    var item=pending[j];
    item.status="uploading";render();
    setP(Math.round(++done/pending.length*90),"上传中 "+done+"/"+pending.length);
    try{
      var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(",")[1])};r.readAsDataURL(item.f)});
      var ts=Date.now(),name=item.title+"_"+ts+".jpg",path="images/"+name;
      var sha=null;
      try{var sr=await fetch("https://api.github.com/repos/"+R+"/contents/"+path+"?ref="+B,{headers:{"Authorization":"Bearer "+gt,"Accept":"application/vnd.github.v3+json"}});if(sr.ok)sha=(await sr.json()).sha;}catch(e){}
      var r=await fetch("https://api.github.com/repos/"+R+"/contents/"+path,{
        method:"PUT",headers:{"Authorization":"Bearer "+gt,"Content-Type":"application/json"},
        body:JSON.stringify({message:"feat: "+item.title,content:b64,sha:sha,branch:B})
      });
      if(!r.ok){var err=await r.json().catch(function(){});throw new Error((err.message||r.status)+(r.status===401?" Token无效":""));}
      item.status="done";item.url=BASE+encodeURIComponent(path);
      log("✓ "+item.title+" → "+name+" ("+(item.f.size/1024/1024).toFixed(1)+"MB)","ok");
      log("  链接: "+item.url,"inf");
    }catch(err){item.status="error";item.error=err.message;log("✗ "+item.title+": "+err.message,"er");}
    render();setP(Math.round(done/pending.length*100),"完成 "+done+"/"+pending.length);
  }
  up=false;upd();document.getElementById("prog").className="prog";
  log("🎉 成功 "+q.filter(function(i){return i.status==="done"}).length+"/"+pending.length,"ok");
}

(function(){var s=document.createElement("script");s.src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js";s.onerror=function(){log("HEIC库未加载，HEIC请另存为JPEG后上传","inf")};document.head.appendChild(s)})();
upd();
</script>
</body>
</html>
