<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>春涧中 · 上传</title>
<link rel="preconnect" href="https://fonts.loli.net">
<link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--cream:#fafaf8;--ghost:#f5f5f3;--text:#1a1a1a;--dim:#888;--light:#bbb;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);--accent:#c9a84c;--ok:#5a8a5a;--err:#c05050}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;color:var(--text);line-height:1.8;min-height:100vh;display:flex;flex-direction:column;align-items:center;background:var(--bg)}
header{position:fixed;top:0;left:0;right:0;z-index:100;width:100%;padding:1.2rem 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{font-size:.75rem;letter-spacing:.3em;text-decoration:none;color:var(--text);text-transform:uppercase}
.nav{list-style:none;display:flex;gap:2rem}
.nav a{font-size:.75rem;letter-spacing:.15em;color:var(--dim);text-decoration:none}
.nav a.active{color:var(--text)}
main{margin-top:90px;width:100%;max-width:580px;padding:2.5rem 1.5rem 4rem;animation:fadeUp .7s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:2.2rem;text-align:center;letter-spacing:.15em;margin-bottom:.4rem}
.sub{font-size:.68rem;color:var(--light);letter-spacing:.5em;margin-bottom:2rem;text-align:center}
.divider{width:1px;height:36px;background:linear-gradient(to bottom,transparent,var(--accent),transparent);margin:0 auto 2rem}
.card{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:1.5rem;margin-bottom:1.2rem}
.row{margin-bottom:1rem}
.row:last-child{margin-bottom:0}
label{display:block;font-size:.68rem;color:var(--light);letter-spacing:.2em;margin-bottom:.5rem}
input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:3px;font-size:.85rem;font-family:monospace;background:var(--bg)}
input:focus{outline:none;border-color:var(--accent)}
.tip{font-size:.65rem;color:var(--light);margin-top:.4rem;line-height:1.6}
.drop{border:1.5px dashed var(--border2);border-radius:5px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1.2rem}
.drop:hover{border-color:var(--accent);background:var(--cream)}
.icon{font-size:2rem;margin-bottom:.4rem}
.drop p{font-size:.82rem;color:var(--dim)}
.drop .tip2{font-size:.65rem;color:var(--light);margin-top:.3rem}
.drop input{display:none}
.queue{margin-bottom:1.2rem;display:none}
.queue.on{display:block}
.queue-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:.5rem;border-bottom:1px solid var(--border);margin-bottom:.6rem}
.queue-head span{font-size:.68rem;color:var(--dim);letter-spacing:.15em}
.item{display:flex;gap:10px;padding:10px;margin-bottom:.5rem;background:var(--cream);border:1px solid var(--border);border-radius:4px;animation:fadeIn .2s;flex-wrap:wrap}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.thumb{width:60px;height:60px;object-fit:cover;border-radius:3px;flex-shrink:0;align-self:center}
.info{flex:1;min-width:0;align-self:center}
.name{font-size:.78rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sz{font-size:.65rem;color:var(--light);margin-top:2px}
.stat{font-size:.65rem;margin-top:4px;font-weight:600}
.stat.p{color:var(--light)}.stat.u{color:var(--accent)}.stat.d{color:var(--ok)}.stat.e{color:var(--err)}
.field{width:100%;padding:5px 8px;margin-top:5px;border:1px solid var(--border);border-radius:2px;font-size:.72rem;font-family:inherit;background:var(--bg)}
.field:focus{outline:none;border-color:var(--accent)}
.field::placeholder{color:var(--light)}
.pos{display:flex;align-items:center;gap:6px;margin-top:6px}
.pos label{font-size:.65rem;color:var(--light);margin:0;white-space:nowrap}
.pos input{width:54px;padding:3px 6px;text-align:center;font-size:.72rem;flex-shrink:0}
.pos .hint{font-size:.6rem;color:var(--light)}
.rm{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:center}
.rm:hover{background:var(--err);border-color:var(--err);color:#fff}
.rm:disabled{opacity:.3;cursor:not-allowed}
.prog{margin-bottom:1rem;display:none}
.prog.on{display:block}
.prog-t{font-size:.68rem;color:var(--dim);margin-bottom:5px;display:flex;justify-content:space-between}
.bar{height:3px;background:var(--ghost);border-radius:2px;overflow:hidden}
.fill{height:100%;background:var(--accent);transition:width .3s}
.btn-row{display:flex;gap:8px;margin-bottom:.8rem}
.btn{flex:1;padding:13px;border:none;border-radius:3px;font-size:.8rem;letter-spacing:.15em;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-p{background:var(--text);color:#fff}
.btn-p:hover{background:#333}
.btn-p:disabled{background:#ccc;cursor:not-allowed}
.btn-s{background:var(--ghost);color:var(--text);border:1px solid var(--border)}
.btn-s:hover{border-color:var(--accent)}
.btn-s:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:1rem;background:var(--ghost);border:1px solid var(--border);border-radius:3px;padding:10px 12px;max-height:160px;overflow-y:auto;font-size:.68rem;display:none}
.log.on{display:block}
.l{color:var(--dim);padding:2px 0;border-bottom:1px solid var(--border)}
.l:last-child{border-bottom:none}
.l.ok{color:var(--ok)}.l.er{color:var(--err)}.l.inf{color:var(--light)}
.ts{color:var(--light);margin-right:5px;font-size:.62rem}
footer{text-align:center;padding:1.5rem;border-top:1px solid var(--border);margin-top:auto;width:100%}
footer p{font-size:.68rem;color:var(--light);letter-spacing:.3em;line-height:2}
@media(max-width:600px){header{padding:1rem 1.2rem}.nav{display:none}main{padding:4.5rem 1rem 3rem}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">桂 花 落</a>
  <ul class="nav">
    <li><a href="index.html">作品</a></li>
    <li><a href="index.html#about">春山空</a></li>
    <li><a href="upload-local.html" class="active">春涧中</a></li>
  </ul>
</header>
<main>
  <h1>春涧中</h1>
  <p class="sub">GITHUB IMAGES · CLOUDFLARE PAGES</p>
  <div class="divider"></div>
  <div class="card">
    <div class="row">
      <label>GITHUB TOKEN（上传图片到 GitHub）</label>
      <input type="password" id="ghToken" placeholder="ghp_xxxxxxxx" autocomplete="off">
    </div>
    <p class="tip">图片存 GitHub（国内可访问） · Token 仅浏览器本地使用</p>
  </div>
  <div class="drop" id="dropZone">
    <div class="icon">📷</div>
    <p>点击选择照片 · 支持多选</p>
    <p class="tip2">JPG / PNG / WebP · 自动压缩（最大 10MB）</p>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>
  <div class="queue" id="queueSection">
    <div class="queue-head">
      <span>待上传</span>
      <span id="queueCount">0 张</span>
    </div>
    <div id="queueList"></div>
  </div>
  <div class="prog" id="progressBar">
    <div class="prog-t">
      <span id="progLabel">上传中...</span>
      <span id="progPct">0%</span>
    </div>
    <div class="bar"><div class="fill" id="progFill"></div></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-p" id="uploadBtn" onclick="startUpload()" disabled>上传到 GitHub</button>
    <button class="btn btn-s" id="clearBtn" onclick="clearQueue()" disabled>清空</button>
  </div>
  <div class="log" id="logBox"></div>
</main>
<footer>
  <p>月出惊山鸟<br>时鸣春涧中</p>
</footer>
<script>
const REPO = "46832632/photo-portfolio";
const BRANCH = "main";
const IMG_BASE = "https://raw.githubusercontent.com/" + REPO + "/" + BRANCH + "/images/";
const MAX_SIZE = 10 * 1024 * 1024;
const NAME_MAX = 24;

let ghToken = sessionStorage.getItem("gh_t") || "";
let queue = [], uploading = false;

if (ghToken) document.getElementById("ghToken").value = ghToken;
document.getElementById("ghToken").addEventListener("change", function() {
  ghToken = this.value.trim();
  sessionStorage.setItem("gh_t", ghToken);
  updateBtns();
});

// Drag & Drop
var dropZone = document.getElementById("dropZone");
["dragenter","dragover"].forEach(function(ev){
  dropZone.addEventListener(ev, function(e){ e.preventDefault(); dropZone.style.borderColor="var(--accent)"; dropZone.style.background="var(--cream)"; });
});
["dragleave","drop"].forEach(function(ev){
  dropZone.addEventListener(ev, function(e){ e.preventDefault(); dropZone.style.borderColor=""; dropZone.style.background=""; });
});
dropZone.addEventListener("drop", function(e){
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});
document.getElementById("fileInput").addEventListener("change", function(e){
  if (e.target.files.length) addFiles(e.target.files);
});

async function addFiles(files) {
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    if (!file.type.startsWith("image/")) { log("非图片: " + file.name, "er"); continue; }

    var f = file;
    // Check JPEG header
    var bytes = await file.slice(0,12).arrayBuffer().then(function(b){ return new Uint8Array(b); });
    var isJpeg = bytes[0]===0xFF && bytes[1]===0xD8 && bytes[2]===0xFF;
    if (!isJpeg && typeof heic2any !== "undefined") {
      log("HEIC转换中: " + file.name, "inf");
      try {
        var blob = await heic2any({blob:file, toType:"image/jpeg", quality:.88});
        f = new File([blob], file.name.replace(/.[^.]+$/,".jpg"), {type:"image/jpeg"});
        log("HEIC完成: " + (f.size/1024/1024).toFixed(1)+"MB", "ok");
      } catch(err) { log("HEIC失败: " + file.name, "er"); continue; }
    } else if (!isJpeg) { log("不支持格式: " + file.name, "er"); continue; }

    // Compress if > 10MB
    if (f.size > MAX_SIZE) {
      log("压缩中: " + (f.size/1024/1024).toFixed(1)+"MB", "inf");
      f = await compressImg(f);
    }

    // Preview
    var preview = await new Promise(function(res,rej){
      var r = new FileReader();
      r.onload = function(e){ res(e.target.result); };
      r.readAsDataURL(f);
    });

    // Derive title from filename
    var rawTitle = file.name.replace(/.[^.]+$/,"").replace(/[_-s]+/g,"").slice(0, NAME_MAX);
    if (!rawTitle) rawTitle = "photo";

    queue.push({
      f: f,
      preview: preview,
      title: rawTitle,
      position: 0,
      status: "pending",
      url: null,
      error: null
    });
    log("添加: " + file.name + " (" + (f.size/1024/1024).toFixed(1)+"MB)", "ok");
  }
  render();
  updateBtns();
}

function compressImg(file) {
  return new Promise(function(res,rej){
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(url);
      var w = img.width, h = img.height;
      var mx = 2048;
      if (w > mx || h > mx) {
        if (w > h) { h = Math.round(h * mx / w); w = mx; }
        else { w = Math.round(w * mx / h); h = mx; }
      }
      var c = document.createElement("canvas");
      c.width = w; c.height = h;
      var ctx = c.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      var q = .85;
      function tryCompress() {
        c.toBlob(function(b){
          if (!b) { rej(new Error("canvas error")); return; }
          if (b.size <= MAX_SIZE || q <= .3) {
            res(new File([b], file.name.replace(/.[^.]+$/,".jpg"), {type:"image/jpeg"}));
          } else { q -= .15; tryCompress(); }
        }, "image/jpeg", q > 0 ? q : .3);
      }
      tryCompress();
    };
    img.onerror = function(){ rej(new Error("load error")); };
    img.src = url;
  });
}

function render() {
  var sec = document.getElementById("queueSection");
  if (queue.length === 0) { sec.className = "queue"; return; }
  sec.className = "queue on";
  document.getElementById("queueCount").textContent = queue.filter(function(i){return i.status==="pending";}).length + " 张待上传";
  var html = "";
  for (var i = 0; i < queue.length; i++) {
    var item = queue[i];
    var stMap = {pending:"p",uploading:"u",done:"d",error:"e"};
    var txtMap = {pending:"等待上传",uploading:"上传中...",done:"✓ 已上传",error:"✗ "+item.error};
    var st = stMap[item.status] || "p";
    var txt = txtMap[item.status] || item.status;
    html += '<div class="item">';
    html += '<img src="' + item.preview + '" class="thumb">';
    html += '<div class="info">';
    html += '<div class="name">' + item.title + '</div>';
    html += '<div class="sz">' + (item.f.size/1024/1024).toFixed(1) + 'MB</div>';
    html += '<div class="stat ' + st + '">' + txt + (item.url ? ' · ' + item.url.split("/").pop() : '') + '</div>';
    if (item.status !== "done") {
      html += '<input class="field" placeholder="标题（24字以内）" value="' + item.title + '" onchange="queue['+i+'].title=this.value.slice(0,'+NAME_MAX+')">';
      html += '<div class="pos"><label>插入位置</label><input type="number" min="0" value="' + (item.position||'') + '" placeholder="末尾" onchange="queue['+i+'].position=parseInt(this.value)||0"><span class="hint">0或空=末尾</span></div>';
    }
    html += '</div>';
    html += '<button class="rm" onclick="removeItem('+i+')"' + (item.status==="uploading"?' disabled':'') +'>×</button>';
    html += '</div>';
  }
  document.getElementById("queueList").innerHTML = html;
}

function removeItem(i) { queue.splice(i,1); render(); updateBtns(); }
function clearQueue() { queue=[]; render(); updateBtns(); log("已清空", "inf"); }

function updateBtns() {
  document.getElementById("uploadBtn").disabled = !ghToken || !queue.some(function(i){return i.status==="pending";}) || uploading;
  document.getElementById("clearBtn").disabled = !queue.length || uploading;
}

function log(msg, type) {
  var el = document.getElementById("logBox");
  el.className = "log on";
  var d = document.createElement("div");
  d.className = "l " + (type||"");
  var t = new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
  d.innerHTML = "<span class=ts>"+t+"</span>" + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setProg(pct, label) {
  var bar = document.getElementById("progressBar");
  bar.className = "prog on";
  document.getElementById("progFill").style.width = pct + "%";
  document.getElementById("progPct").textContent = pct + "%";
  if (label) document.getElementById("progLabel").textContent = label;
}

async function startUpload() {
  if (!ghToken) { log("请先填写 GitHub Token", "er"); return; }
  var pending = queue.filter(function(i){return i.status==="pending";});
  if (!pending.length) { log("没有待上传", "er"); return; }
  uploading = true;
  updateBtns();
  var done = 0;

  for (var j = 0; j < pending.length; j++) {
    var item = pending[j];
    item.status = "uploading";
    render();
    setProg(Math.round(++done/pending.length*90), "上传中 " + done + "/" + pending.length);

    try {
      // Read as base64
      var b64 = await new Promise(function(res,rej){
        var r = new FileReader();
        r.onload = function(e){ res(e.target.result.split(",")[1]); };
        r.onerror = rej;
        r.readAsDataURL(item.f);
      });

      // Generate unique filename: title + timestamp + index
      var ts = Date.now();
      var safeTitle = item.title.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, "_").slice(0, NAME_MAX);
      if (!safeTitle) safeTitle = "photo";
      var name = safeTitle + "_" + ts + ".jpg";
      var path = "images/" + name;

      // Check existing SHA
      var sha = null;
      try {
        var sr = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path+"?ref="+BRANCH, {
          headers: {"Authorization":"Bearer "+ghToken, "Accept":"application/vnd.github.v3+json"}
        });
        if (sr.ok) sha = (await sr.json()).sha;
      } catch(e) {}

      // Upload
      var r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path, {
        method: "PUT",
        headers: {"Authorization":"Bearer "+ghToken, "Content-Type":"application/json"},
        body: JSON.stringify({message:"feat: add photo - " + item.title, content:b64, sha:sha, branch:BRANCH})
      });

      if (!r.ok) {
        var errData = await r.json().catch(function(){});
        throw new Error((errData.message||r.status) + (r.status===401?" Token无效":""));
      }

      item.status = "done";
      item.url = IMG_BASE + encodeURIComponent(path);
      log("✓ " + item.title + " → " + name + " (" + (item.f.size/1024/1024).toFixed(1)+"MB)", "ok");
      log("  链接: " + item.url, "inf");
    } catch(err) {
      item.status = "error";
      item.error = err.message;
      log("✗ " + item.title + ": " + err.message, "er");
    }

    render();
    setProg(Math.round(done/pending.length*100), "完成 " + done + "/" + pending.length);
  }

  uploading = false;
  updateBtns();
  document.getElementById("progressBar").className = "prog";
  var okCount = queue.filter(function(i){return i.status==="done";}).length;
  log("🎉 成功 " + okCount + "/" + pending.length, "ok");
}

// Load heic2any
(function(){
  var s = document.createElement("script");
  s.src = "https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js";
  s.onerror = function(){ log("HEIC转换库未加载，HEIC请另存为JPEG后上传", "inf"); };
  document.head.appendChild(s);
})();

updateBtns();
</script>
</body>
</html>
